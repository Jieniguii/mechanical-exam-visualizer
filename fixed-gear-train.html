<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>定轴轮系传动比 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch6-geartrain.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>定轴轮系传动比 <span class="version-badge">v1.0</span></h1>
  <p>多级外啮合定轴轮系传动比计算与动画演示</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
/* ===== 定轴轮系传动比 v1.0 ===== */
const RAD = Math.PI / 180;
const ALPHA = 20 * RAD;

// ===== 状态 =====
const state = {
  numGears: 3,
  teeth: [20, 30, 40, 25, 35], // 最多5个齿轮的齿数
  theta: 0,
  speed: 0.4,
  inputRPM: 960,
  showPitch: true,
  showLabels: true,
};

// ===== Canvas + 动画 =====
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
const anim = Mech.createAnimator(
  dt => { state.theta += state.speed * dt; },
  () => draw()
);

// ===== 齿轮几何 =====
function gearParams(z, m, alpha) {
  const r = m * z / 2;
  const rb = r * Math.cos(alpha);
  const ra = r + m;
  const rf = r - 1.25 * m;
  return { z, m, r, rb, ra, rf, alpha };
}

function generateGearProfile(z, m, alpha) {
  const { r, rb, ra, rf } = gearParams(z, m, alpha);
  const invAlpha = Math.tan(alpha) - alpha;
  const toothAngle = 2 * Math.PI / z;
  const halfTooth = Math.PI / (2 * z);
  const psiMax = Math.acos(Math.min(1, rb / Math.max(rb + 0.01, ra)));
  const steps = 16;
  const points = [];
  for (let i = 0; i < z; i++) {
    const center = i * toothAngle;
    for (let s = 0; s <= steps; s++) {
      const psi = (s / steps) * psiMax;
      const ri = rb / Math.cos(psi);
      const angle = center - halfTooth - invAlpha + (Math.tan(psi) - psi);
      points.push({ x: ri * Math.cos(angle), y: ri * Math.sin(angle) });
    }
    const rightTopAngle = center - halfTooth - invAlpha + (Math.tan(psiMax) - psiMax);
    const leftTopAngle = center + halfTooth + invAlpha - (Math.tan(psiMax) - psiMax);
    for (let s = 1; s <= 4; s++) {
      const angle = rightTopAngle + (leftTopAngle - rightTopAngle) * s / 4;
      points.push({ x: ra * Math.cos(angle), y: ra * Math.sin(angle) });
    }
    for (let s = steps; s >= 0; s--) {
      const psi = (s / steps) * psiMax;
      const ri = rb / Math.cos(psi);
      const angle = center + halfTooth + invAlpha - (Math.tan(psi) - psi);
      points.push({ x: ri * Math.cos(angle), y: ri * Math.sin(angle) });
    }
    const leftBaseAngle = center + halfTooth + invAlpha;
    const nextRightBaseAngle = (i + 1) * toothAngle - halfTooth - invAlpha;
    if (rf < rb) {
      points.push({ x: rf * Math.cos(leftBaseAngle), y: rf * Math.sin(leftBaseAngle) });
      for (let s = 1; s <= 4; s++) {
        const angle = leftBaseAngle + (nextRightBaseAngle - leftBaseAngle) * s / 4;
        points.push({ x: rf * Math.cos(angle), y: rf * Math.sin(angle) });
      }
      points.push({ x: rb * Math.cos(nextRightBaseAngle), y: rb * Math.sin(nextRightBaseAngle) });
    } else {
      points.push({ x: rf * Math.cos(leftBaseAngle), y: rf * Math.sin(leftBaseAngle) });
      for (let s = 1; s <= 4; s++) {
        const angle = leftBaseAngle + (nextRightBaseAngle - leftBaseAngle) * s / 4;
        points.push({ x: rf * Math.cos(angle), y: rf * Math.sin(angle) });
      }
    }
  }
  return points;
}

// ===== 传动比计算 =====
function calcTrainRatio() {
  const n = state.numGears;
  const m = n - 1; // 外啮合次数
  const sign = Math.pow(-1, m); // (-1)^m
  const zFirst = state.teeth[0];
  const zLast = state.teeth[n - 1];
  const i_total = sign * zLast / zFirst;

  // 各级传动比
  const stages = [];
  let cumulative = 1;
  for (let k = 0; k < n - 1; k++) {
    const stageSign = -1; // 外啮合
    const stageRatio = stageSign * state.teeth[k + 1] / state.teeth[k];
    stages.push({
      from: k + 1,
      to: k + 2,
      ratio: stageRatio,
      absRatio: Math.abs(stageRatio),
    });
    cumulative *= stageRatio;
  }

  // 各齿轮转速(相对)
  const rpms = [state.inputRPM];
  for (let k = 0; k < n - 1; k++) {
    rpms.push(rpms[k] * (-state.teeth[k] / state.teeth[k + 1]));
  }

  return { n, m, sign, zFirst, zLast, i_total, stages, rpms, cumulative };
}

// ===== 绘制齿轮 =====
function drawGearFilled(cx, cy, profile, scale, fillColor, strokeColor, rotation) {
  if (profile.length < 3) return;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.beginPath();
  ctx.moveTo(profile[0].x * scale, -profile[0].y * scale);
  for (let i = 1; i < profile.length; i++)
    ctx.lineTo(profile[i].x * scale, -profile[i].y * scale);
  ctx.closePath();
  ctx.fillStyle = fillColor; ctx.fill();
  ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.5; ctx.stroke();
  // 中心孔
  const holeR = Math.max(4, 6 * scale);
  ctx.beginPath(); ctx.arc(0, 0, holeR, 0, Math.PI * 2);
  ctx.fillStyle = '#0f1117'; ctx.fill();
  ctx.strokeStyle = strokeColor; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, Math.max(2, 2 * scale), 0, Math.PI * 2);
  ctx.fillStyle = strokeColor; ctx.fill();
  ctx.restore();
}

// ===== 绘制旋转方向箭头 =====
function drawRotArrow(cx, cy, radius, clockwise, color) {
  if (radius < 12) return;
  const startAngle = clockwise ? -0.5 : Math.PI + 0.5;
  const endAngle = clockwise ? 1.5 : Math.PI - 1.5;
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, radius, startAngle, endAngle, !clockwise); ctx.stroke();
  // 箭头
  const tipAngle = endAngle;
  const tipX = cx + radius * Math.cos(tipAngle);
  const tipY = cy + radius * Math.sin(tipAngle);
  const dirAngle = clockwise ? tipAngle + Math.PI / 2 : tipAngle - Math.PI / 2;
  const sz = 6;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - sz * Math.cos(dirAngle - 0.5), tipY - sz * Math.sin(dirAngle - 0.5));
  ctx.lineTo(tipX - sz * Math.cos(dirAngle + 0.5), tipY - sz * Math.sin(dirAngle + 0.5));
  ctx.closePath(); ctx.fill();
}

// ===== 主绘制 =====
function draw() {
  const { w, h } = getDimensions();
  ctx.clearRect(0, 0, w, h);
  const C = Mech.colors;
  const result = calcTrainRatio();
  const n = state.numGears;

  // 计算模数（自适应缩放）
  const m = 2;

  // 计算齿轮中心和缩放
  const params_arr = [];
  for (let i = 0; i < n; i++) {
    params_arr.push(gearParams(state.teeth[i], m, ALPHA));
  }

  // 齿轮水平排列，相邻齿轮外啮合，中心距 = r1 + r2
  // 布局：从左到右
  const centers = [];
  let xPos = 0;
  for (let i = 0; i < n; i++) {
    if (i === 0) {
      centers.push({ x: 0, y: 0 });
    } else {
      const a = params_arr[i - 1].r + params_arr[i].r;
      xPos += a;
      centers.push({ x: xPos, y: 0 });
    }
  }

  // 计算总体边界
  const totalW = centers[n - 1].x + params_arr[n - 1].ra * 2;
  const totalH = Math.max(...params_arr.map(p => p.ra)) * 2.2;
  const scale = Math.min((w * 0.92) / totalW, (h * 0.85) / totalH) * 0.85;

  // 居中偏移
  const offsetX = (w - centers[n - 1].x * scale) / 2;
  const offsetY = h / 2;

  // 各齿轮角度
  const angles = [state.theta];
  for (let i = 1; i < n; i++) {
    // 外啮合：反向旋转，速比 z_from/z_to
    const ratio = -state.teeth[i - 1] / state.teeth[i];
    // 相位补偿：使齿轮在接触点正确啮合
    const phaseOffset = (i % 2 === 1) ? Math.PI / state.teeth[i] : 0;
    angles.push(angles[i - 1] * (state.teeth[i - 1] / state.teeth[i]) * (-1) + phaseOffset);
  }

  // 齿轮颜色
  const gearColors = [
    { fill: 'rgba(99,102,241,0.15)', stroke: 'rgba(99,102,241,0.75)' },
    { fill: 'rgba(52,211,153,0.15)', stroke: 'rgba(52,211,153,0.75)' },
    { fill: 'rgba(249,115,22,0.15)', stroke: 'rgba(249,115,22,0.75)' },
    { fill: 'rgba(168,85,247,0.15)', stroke: 'rgba(168,85,247,0.75)' },
    { fill: 'rgba(251,191,36,0.15)', stroke: 'rgba(251,191,36,0.75)' },
  ];

  // 画中心连线
  const screenCenters = centers.map(c => ({
    sx: offsetX + c.x * scale,
    sy: offsetY - c.y * scale
  }));

  // 虚线连接各齿轮中心
  for (let i = 0; i < n - 1; i++) {
    Mech.draw.dashedLine(ctx, screenCenters[i].sx, screenCenters[i].sy,
      screenCenters[i + 1].sx, screenCenters[i + 1].sy,
      { color: 'rgba(100,116,139,0.3)', width: 1, dash: [4, 4] });
  }

  // 分度圆
  if (state.showPitch) {
    for (let i = 0; i < n; i++) {
      const sx = screenCenters[i].sx, sy = screenCenters[i].sy;
      const rPx = params_arr[i].r * scale;
      Mech.draw.circle(ctx, sx, sy, rPx, {
        color: gearColors[i].stroke.replace('0.75', '0.3'),
        width: 1, dash: [5, 4]
      });
    }
  }

  // 绘制各齿轮
  const profiles = [];
  for (let i = 0; i < n; i++) {
    profiles.push(generateGearProfile(state.teeth[i], m, ALPHA));
  }

  for (let i = 0; i < n; i++) {
    const sx = screenCenters[i].sx, sy = screenCenters[i].sy;
    drawGearFilled(sx, sy, profiles[i], scale,
      gearColors[i].fill, gearColors[i].stroke, angles[i]);
  }

  // 标注齿数和方向
  if (state.showLabels) {
    for (let i = 0; i < n; i++) {
      const sx = screenCenters[i].sx, sy = screenCenters[i].sy;
      const raPx = params_arr[i].ra * scale;

      // 齿数标注（齿轮上方）
      Mech.draw.text(ctx, `z${i + 1}=${state.teeth[i]}`, sx, sy - raPx - 14,
        { color: gearColors[i].stroke, font: 'bold 12px sans-serif' });

      // 方向箭头
      const clockwise = (i % 2 === 0); // 偶数齿轮顺时针，奇数逆时针（外啮合交替反向）
      const arrowR = Math.min(raPx * 0.55, 28);
      if (arrowR > 10) {
        drawRotArrow(sx, sy, arrowR, clockwise, gearColors[i].stroke);
        // ω标注
        const omegaLabel = clockwise ? 'ω ↻' : 'ω ↺';
        Mech.draw.text(ctx, omegaLabel, sx, sy + raPx + 18,
          { color: gearColors[i].stroke, font: '11px sans-serif' });
      }

      // 齿轮编号
      Mech.draw.text(ctx, `${i + 1}`, sx, sy + 2,
        { color: 'rgba(228,228,231,0.6)', font: 'bold 14px sans-serif' });
    }
  }

  // 绘制啮合点标记
  for (let i = 0; i < n - 1; i++) {
    const a = params_arr[i].r + params_arr[i + 1].r;
    const meshX = screenCenters[i].sx + (params_arr[i].r / a) * (screenCenters[i + 1].sx - screenCenters[i].sx);
    const meshY = screenCenters[i].sy;
    Mech.draw.point(ctx, meshX, meshY, { color: '#fbbf24', r: 3 });
  }

  // 更新信息面板
  updateInfoPanel(result);
  updateTip(result);
}

// ===== 信息面板更新 =====
const ui = {};

function updateInfoPanel(result) {
  const C = Mech.colors;
  const { n, m, sign, zFirst, zLast, i_total, stages, rpms } = result;

  // 传动比公式
  ui.formulaVal.textContent = `i₁${n} = (-1)${m % 2 === 0 ? '' : '³'} × z${n}/z₁`;
  ui.signVal.textContent = sign > 0 ? '同向 (+)' : '反向 (−)';
  ui.signVal.style.color = sign > 0 ? '#34d399' : '#f87171';
  ui.meshVal.textContent = m;

  // 总传动比
  ui.totalVal.textContent = i_total.toFixed(3);
  ui.totalVal.style.color = sign > 0 ? '#34d399' : '#f97316';

  // 末轮转速
  const lastRPM = rpms[n - 1];
  ui.rpmVal.textContent = Math.abs(lastRPM).toFixed(1) + ' r/min';
  ui.rpmVal.style.color = lastRPM > 0 ? '#34d399' : '#f97316';
  ui.dirVal.textContent = lastRPM > 0 ? '与首轮同向 ↻' : '与首轮反向 ↺';
  ui.dirVal.style.color = lastRPM > 0 ? '#34d399' : '#f97316';

  // 各级传动比
  let stagesHtml = '';
  stages.forEach((s, idx) => {
    const color = idx % 2 === 0 ? 'var(--accent)' : 'var(--success)';
    stagesHtml += `<div class="info-item">
      <div class="label">第${idx + 1}级 (z${s.from}→z${s.to})</div>
      <div class="value" style="color:${color};font-size:13px">${s.ratio.toFixed(3)}</div>
    </div>`;
  });
  ui.stagesGrid.innerHTML = stagesHtml;
}

function updateTip(result) {
  const { n, m, sign, i_total, zFirst, zLast } = result;
  let text = `定轴轮系传动比公式：i₁${n} = (-1)^m × zₙ/z₁，其中 m 为外啮合次数。\n`;
  text += `当前 m = ${m}（${n}个齿轮，${n-1}次外啮合），(-1)^m = ${sign > 0 ? '+1（同向）' : '-1（反向）'}。\n`;
  text += `i₁${n} = ${sign > 0 ? '' : '−'}${zLast}/${zFirst} = ${i_total.toFixed(3)}`;
  if (Math.abs(i_total) > 1) {
    text += `\n该轮系为减速传动（|i| > 1），末轮转速低于首轮。`;
  } else if (Math.abs(i_total) < 1) {
    text += `\n该轮系为增速传动（|i| < 1），末轮转速高于首轮。`;
  } else {
    text += `\n传动比 |i| = 1，首轮与末轮转速相同。`;
  }
  ui.tip.textContent = text;
}

// ===== UI 构建 =====
const sidebar = document.getElementById('sidebar');

// 面板1：齿轮数量
const countPanel = Mech.ui.panel(sidebar, '齿轮数量');
ui.numSlider = Mech.ui.sidebarSlider(countPanel, {
  label: '齿轮数量', min: 3, max: 5, value: 3, step: 1,
  onChange: v => {
    state.numGears = v;
    rebuildTeethSliders();
    draw();
  }
});

// 面板2：各齿轮齿数（动态）
const teethPanel = Mech.ui.panel(sidebar, '各齿轮齿数');
const teethSliders = [];

function rebuildTeethSliders() {
  // 清除旧滑块
  teethPanel.querySelectorAll('.slider-group').forEach(el => el.remove());
  teethSliders.length = 0;

  for (let i = 0; i < state.numGears; i++) {
    const sl = Mech.ui.sidebarSlider(teethPanel, {
      label: `z${i + 1} (齿轮${i + 1}齿数)`,
      min: 10, max: 80, value: state.teeth[i], step: 1,
      onChange: v => { state.teeth[i] = v; draw(); }
    });
    teethSliders.push(sl);
  }
}
rebuildTeethSliders();

// 面板3：输入参数
const inputPanel = Mech.ui.panel(sidebar, '输入参数');
ui.rpmSlider = Mech.ui.sidebarSlider(inputPanel, {
  label: '首轮转速 (r/min)', min: 60, max: 3000, value: 960, step: 10,
  onChange: v => { state.inputRPM = v; draw(); }
});

// 面板4：显示选项
const optPanel = Mech.ui.panel(sidebar, '显示选项');
Mech.ui.checkbox(optPanel, {
  label: '分度圆', checked: true,
  onChange: v => { state.showPitch = v; draw(); }
});
Mech.ui.checkbox(optPanel, {
  label: '齿数/方向标注', checked: true,
  onChange: v => { state.showLabels = v; draw(); }
});

// 面板5：传动比信息
const infoPanel = Mech.ui.panel(sidebar, '传动比计算');

const infoHeader = document.createElement('div');
infoHeader.className = 'info-grid';
infoHeader.innerHTML = `
  <div class="info-item"><div class="label">公式</div><div class="value" id="formulaVal" style="color:var(--text);font-size:12px">—</div></div>
  <div class="info-item"><div class="label">方向</div><div class="value" id="signVal" style="font-size:12px">—</div></div>
  <div class="info-item"><div class="label">外啮合 m</div><div class="value" id="meshVal" style="color:var(--warning)">—</div></div>
  <div class="info-item"><div class="label">总传动比</div><div class="value" id="totalVal" style="color:var(--accent)">—</div></div>
  <div class="info-item"><div class="label">末轮转速</div><div class="value" id="rpmVal" style="color:var(--success)">—</div></div>
  <div class="info-item"><div class="label">末轮方向</div><div class="value" id="dirVal" style="font-size:12px">—</div></div>
`;
infoPanel.appendChild(infoHeader);
ui.formulaVal = infoHeader.querySelector('#formulaVal');
ui.signVal = infoHeader.querySelector('#signVal');
ui.meshVal = infoHeader.querySelector('#meshVal');
ui.totalVal = infoHeader.querySelector('#totalVal');
ui.rpmVal = infoHeader.querySelector('#rpmVal');
ui.dirVal = infoHeader.querySelector('#dirVal');

// 各级传动比
ui.stagesGrid = document.createElement('div');
ui.stagesGrid.className = 'info-grid';
infoPanel.appendChild(ui.stagesGrid);

// 面板6：知识点
const tipPanel = Mech.ui.panel(sidebar, '知识点提示');
ui.tip = document.createElement('div');
ui.tip.className = 'tip';
ui.tip.style.whiteSpace = 'pre-wrap';
tipPanel.appendChild(ui.tip);

// ===== 工具栏 =====
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, {
  text: '⏸ 暂停', variant: 'primary',
  onClick: () => {
    if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
    else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
  }
});
Mech.ui.button(toolbar, {
  text: '重置', variant: 'secondary',
  onClick: () => {
    state.theta = 0;
    state.numGears = 3;
    state.teeth = [20, 30, 40, 25, 35];
    state.inputRPM = 960;
    ui.numSlider.set(3);
    rebuildTeethSliders();
    ui.rpmSlider.set(960);
    draw();
  }
});
Mech.ui.slider(toolbar, {
  label: '转速', min: 0.05, max: 2, value: 0.4, step: 0.05,
  format: v => v.toFixed(2) + 'x',
  onChange: v => { state.speed = v; }
});

// ===== 启动 =====
window.addEventListener('resize', () => draw());
anim.play();
console.log('定轴轮系传动比 v1.0 loaded');
</script>
</body>
</html>
