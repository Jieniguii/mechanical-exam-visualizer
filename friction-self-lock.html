<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>摩擦角与自锁条件 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch7-force.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>摩擦角与自锁条件 <span class="version-badge">v1.0</span></h1>
  <p>斜面物块受力分析与自锁判定 — 机械考研可视化学习</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
/* ===== 常量 ===== */
const DEG = 180 / Math.PI;
const RAD = Math.PI / 180;
const G_ACC = 9.8;

/* ===== 模块状态 ===== */
const params = { f: 0.3, alpha: 20, mass: 5, speed: 1 };
let showForce = true;
let showFrictionAngle = true;
let showTotalReaction = true;
let slideT = 0;   // 归一化滑移量 0~1
let slideV = 0;   // 滑移速度

/* ===== Canvas + 动画器 ===== */
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
const anim = Mech.createAnimator(
  dt => {
    const alphaRad = params.alpha * RAD;
    const phiRad = Math.atan(params.f);
    const isSelfLock = alphaRad <= phiRad;
    if (!isSelfLock) {
      const netAccel = Math.sin(alphaRad) - params.f * Math.cos(alphaRad);
      slideV += netAccel * dt * params.speed * 2.5;
      slideT += slideV * dt * params.speed;
      if (slideT > 0.65) { slideT = 0; slideV = 0; }
    } else {
      slideT = 0; slideV = 0;
    }
  },
  () => draw()
);

/* ===== 辅助：绘制力箭头 ===== */
function drawForceArrow(fromX, fromY, toX, toY, color, label, side) {
  const dx = toX - fromX, dy = toY - fromY;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 2) return;
  ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY);
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
  Mech.draw.arrow(ctx, fromX, fromY, toX, toY, { color, size: 10 });
  if (label) {
    const angle = Math.atan2(dy, dx);
    const mx = (fromX + toX) / 2, my = (fromY + toY) / 2;
    const off = side || 15;
    ctx.fillStyle = color; ctx.font = '12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, mx - Math.sin(angle) * off, my + Math.cos(angle) * off);
  }
}

/* ===== 主绘制 ===== */
function draw() {
  const { w, h } = getDimensions();
  ctx.clearRect(0, 0, w, h);
  const C = Mech.colors;
  const alphaRad = params.alpha * RAD;
  const phiRad = Math.atan(params.f);
  const isSelfLock = alphaRad <= phiRad;
  const tanA = Math.tan(alphaRad);
  const G = params.mass * G_ACC;

  /* --- 网格 --- */
  Mech.draw.grid(ctx, w * 0.35, h * 0.75, w, h, 1);

  /* --- 斜面几何 --- */
  const margin = 50;
  const Bx = margin + 30, By = h - margin;
  const maxD1 = w - margin - Bx - 20;
  const maxD2 = tanA > 0.01 ? (By - margin - 10) / tanA : maxD1;
  const d = Math.max(80, Math.min(maxD1, maxD2, 550));
  const Rx = Bx + d, Ry = By;
  const Tx = Rx, Ty = By - d * tanA;
  const planeLen = d / Math.cos(alphaRad);

  /* --- 地面线 + 斜杠 --- */
  Mech.draw.dashedLine(ctx, Bx - 20, By, Rx + 50, By, { color: C.hinge, width: 1.5, dash: [6, 4] });
  for (let i = 0; i < Math.floor((Rx + 50 - Bx + 20) / 16); i++) {
    const hx = Bx - 10 + i * 16;
    ctx.beginPath(); ctx.moveTo(hx, By); ctx.lineTo(hx - 7, By + 7);
    ctx.strokeStyle = C.hinge; ctx.lineWidth = 1; ctx.stroke();
  }

  /* --- 斜面三角形 --- */
  ctx.beginPath(); ctx.moveTo(Bx, By); ctx.lineTo(Tx, Ty); ctx.lineTo(Rx, Ry); ctx.closePath();
  ctx.fillStyle = isSelfLock ? 'rgba(52,211,153,0.06)' : 'rgba(248,113,113,0.06)'; ctx.fill();
  // 斜面表面高亮
  ctx.beginPath(); ctx.moveTo(Bx, By); ctx.lineTo(Tx, Ty);
  ctx.strokeStyle = isSelfLock ? 'rgba(52,211,153,0.55)' : 'rgba(248,113,113,0.55)';
  ctx.lineWidth = 5; ctx.stroke();
  // 其余两边
  ctx.beginPath(); ctx.moveTo(Bx, By); ctx.lineTo(Rx, Ry); ctx.lineTo(Tx, Ty);
  ctx.strokeStyle = C.hinge; ctx.lineWidth = 1.5; ctx.stroke();
  // 直角标记
  const ms = 10;
  ctx.beginPath(); ctx.moveTo(Rx - ms, Ry); ctx.lineTo(Rx - ms, Ry - ms); ctx.lineTo(Rx, Ry - ms);
  ctx.strokeStyle = C.hinge; ctx.lineWidth = 1; ctx.stroke();

  /* --- 底角弧 α --- */
  const arcR = 42;
  Mech.draw.arc(ctx, Bx, By, arcR, -alphaRad, 0, false, { color: C.warning, width: 2 });
  const la = -alphaRad / 2;
  Mech.draw.text(ctx, 'α', Bx + (arcR + 14) * Math.cos(la), By + (arcR + 14) * Math.sin(la),
    { color: C.warning, font: '14px sans-serif' });

  /* --- 方向向量 --- */
  const cosA = Math.cos(alphaRad), sinA = Math.sin(alphaRad);
  const upHill  = { x: cosA, y: -sinA };
  const outNorm = { x: -sinA, y: -cosA };

  /* --- 物块 --- */
  const bW = 44, bH = 30, hw = bW / 2;
  const basePos = planeLen * 0.55;
  const curPos = basePos * (1 - slideT);
  const clampedPos = Math.max(hw + 8, Math.min(planeLen - hw - 8, curPos));
  const surfX = Bx + clampedPos * upHill.x;
  const surfY = By + clampedPos * upHill.y;
  const cx = surfX + (bH / 2) * outNorm.x;
  const cy = surfY + (bH / 2) * outNorm.y;

  const corners = [
    { x: surfX - hw * upHill.x, y: surfY - hw * upHill.y },
    { x: surfX + hw * upHill.x, y: surfY + hw * upHill.y },
    { x: surfX + hw * upHill.x + bH * outNorm.x, y: surfY + hw * upHill.y + bH * outNorm.y },
    { x: surfX - hw * upHill.x + bH * outNorm.x, y: surfY - hw * upHill.y + bH * outNorm.y },
  ];
  ctx.beginPath(); ctx.moveTo(corners[0].x, corners[0].y);
  for (let i = 1; i < 4; i++) ctx.lineTo(corners[i].x, corners[i].y);
  ctx.closePath();
  ctx.fillStyle = isSelfLock ? 'rgba(52,211,153,0.18)' : 'rgba(248,113,113,0.18)'; ctx.fill();
  ctx.strokeStyle = isSelfLock ? '#34d399' : '#f87171'; ctx.lineWidth = 2; ctx.stroke();
  Mech.draw.text(ctx, 'm', cx, cy, { color: C.text, font: 'bold 13px sans-serif', baseline: 'middle' });

  /* --- 力学箭头 --- */
  if (showForce) {
    const N = G * cosA;
    const F = G * cosA * params.f;
    const gVis = Math.min(85, h * 0.2);
    const fs = gVis / G;

    drawForceArrow(cx, cy, cx, cy + G * fs, '#f97316', `G=${G.toFixed(1)}N`, 18);
    drawForceArrow(cx, cy, cx + N * fs * outNorm.x, cy + N * fs * outNorm.y, '#3b82f6', `N=${N.toFixed(1)}N`, 18);
    drawForceArrow(cx, cy, cx + F * fs * upHill.x, cy + F * fs * upHill.y, '#a855f7', `F=${F.toFixed(1)}N`, -18);
  }

  /* --- 摩擦角 φ 弧 --- */
  if (showFrictionAngle) {
    const phiDeg = phiRad * DEG;
    const nAngle = Math.atan2(outNorm.y, outNorm.x);
    const fAngle = Math.atan2(upHill.y, upHill.x);
    let aDiff = fAngle - nAngle;
    while (aDiff > Math.PI) aDiff -= 2 * Math.PI;
    while (aDiff < -Math.PI) aDiff += 2 * Math.PI;
    const rAngle = nAngle + (aDiff > 0 ? phiRad : -phiRad);
    const phiArcR = 30;
    if (aDiff > 0) {
      Mech.draw.arc(ctx, cx, cy, phiArcR, nAngle, rAngle, false, { color: C.purple, width: 2 });
    } else {
      Mech.draw.arc(ctx, cx, cy, phiArcR, rAngle, nAngle, false, { color: C.purple, width: 2 });
    }
    const midA = (nAngle + rAngle) / 2;
    Mech.draw.text(ctx, `φ=${phiDeg.toFixed(1)}°`,
      cx + (phiArcR + 16) * Math.cos(midA), cy + (phiArcR + 16) * Math.sin(midA),
      { color: C.purple, font: '11px sans-serif' });
  }

  /* --- 全反力 R --- */
  if (showTotalReaction) {
    const N = G * cosA, F = G * cosA * params.f;
    const gVis = Math.min(85, h * 0.2), fs = gVis / G;
    const Rvx = N * outNorm.x + F * upHill.x;
    const Rvy = N * outNorm.y + F * upHill.y;
    const Rmag = Math.sqrt(Rvx * Rvx + Rvy * Rvy);
    const rLen = Rmag * fs;
    if (rLen > 5) {
      drawForceArrow(cx, cy, cx + rLen * Rvx / Rmag, cy + rLen * Rvy / Rmag, '#6366f1', `R=${Rmag.toFixed(1)}N`, 22);
    }
  }

  /* --- 状态指示 --- */
  ctx.save();
  const stX = w - 24, stY = 26;
  ctx.beginPath(); ctx.arc(stX - 56, stY, 7, 0, Math.PI * 2);
  ctx.fillStyle = isSelfLock ? '#34d399' : '#f87171'; ctx.fill();
  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillStyle = isSelfLock ? '#34d399' : '#f87171';
  ctx.fillText(isSelfLock ? '自锁 ✓' : '滑动 ✗', stX, stY);
  ctx.restore();

  /* --- 更新信息面板 --- */
  const phiDeg = phiRad * DEG;
  const N = G * cosA, F = G * cosA * params.f, slideF = G * sinA;
  ui.infoPhi.textContent = phiDeg.toFixed(1) + '°';
  ui.infoCondition.textContent = isSelfLock ? 'α ≤ φ → 自锁 ✓' : 'α > φ → 滑动 ✗';
  ui.infoCondition.style.color = isSelfLock ? '#34d399' : '#f87171';
  ui.infoFriction.textContent = F.toFixed(1) + ' N';
  ui.infoSlide.textContent = slideF.toFixed(1) + ' N';
  ui.tip.textContent = isSelfLock
    ? `当前 α=${params.alpha}° ≤ φ=${phiDeg.toFixed(1)}°，满足自锁条件。物块在重力作用下不会沿斜面下滑，最大静摩擦力足以平衡下滑分力。自锁在工程中广泛应用，如螺旋千斤顶、斜面夹紧机构等。`
    : `当前 α=${params.alpha}° > φ=${phiDeg.toFixed(1)}°，不满足自锁条件。下滑力 Gsinα=${slideF.toFixed(1)}N > 最大摩擦力 fGcosα=${F.toFixed(1)}N，物块将沿斜面下滑。需减小倾角或增大摩擦系数才能实现自锁。`;
}

/* ===== UI 构建 ===== */
const ui = {};

// 工具栏
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, {
  text: '⏸ 暂停', variant: 'primary',
  onClick: () => {
    if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
    else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
  }
});
Mech.ui.button(toolbar, { text: '◀', variant: 'secondary',
  onClick: () => { params.alpha = Math.max(0, params.alpha - 1); resetSlide(); ui.sliders.alpha.set(params.alpha); draw(); }
});
Mech.ui.button(toolbar, { text: '▶', variant: 'secondary',
  onClick: () => { params.alpha = Math.min(89, params.alpha + 1); resetSlide(); ui.sliders.alpha.set(params.alpha); draw(); }
});
Mech.ui.button(toolbar, { text: '重置', variant: 'secondary',
  onClick: () => {
    params.f = 0.3; params.alpha = 20; params.mass = 5; params.speed = 1;
    slideT = 0; slideV = 0;
    ui.sliders.f.set(0.3); ui.sliders.alpha.set(20); ui.sliders.mass.set(5);
    draw();
  }
});
Mech.ui.slider(toolbar, {
  label: '速度', min: 0.1, max: 3, value: 1, step: 0.1,
  format: v => v.toFixed(1) + 'x', onChange: v => { params.speed = v; }
});

function resetSlide() { slideT = 0; slideV = 0; }
function checkSlideReset() {
  const aR = params.alpha * RAD, pR = Math.atan(params.f);
  if (aR <= pR) resetSlide();
}

// 侧边栏
const sidebar = document.getElementById('sidebar');

// 参数面板
const paramPanel = Mech.ui.panel(sidebar, '参数调节');
ui.sliders = {};
ui.sliders.f = Mech.ui.sidebarSlider(paramPanel, {
  label: '摩擦系数 f', min: 0.05, max: 1.0, value: 0.3, step: 0.01,
  format: v => v.toFixed(2), onChange: v => { params.f = v; checkSlideReset(); draw(); }
});
ui.sliders.alpha = Mech.ui.sidebarSlider(paramPanel, {
  label: '斜面倾角 α (°)', min: 0, max: 89, value: 20, step: 1,
  format: v => v + '°', onChange: v => { params.alpha = v; checkSlideReset(); draw(); }
});
ui.sliders.mass = Mech.ui.sidebarSlider(paramPanel, {
  label: '物块质量 m (kg)', min: 1, max: 50, value: 5, step: 0.5,
  format: v => v.toFixed(1), onChange: v => { params.mass = v; draw(); }
});

// 显示选项面板
const dispPanel = Mech.ui.panel(sidebar, '显示选项');
Mech.ui.checkbox(dispPanel, { label: '显示受力分析', checked: true, onChange: v => { showForce = v; draw(); } });
Mech.ui.checkbox(dispPanel, { label: '显示摩擦角', checked: true, onChange: v => { showFrictionAngle = v; draw(); } });
Mech.ui.checkbox(dispPanel, { label: '显示全反力', checked: true, onChange: v => { showTotalReaction = v; draw(); } });

// 实时信息面板
const infoP = Mech.ui.panel(sidebar, '实时信息');
const infoRefs = Mech.ui.infoPanel(infoP, [
  { id: 'infoPhi', label: '摩擦角 φ = arctan(f)' },
  { id: 'infoCondition', label: '自锁条件判断' },
  { id: 'infoFriction', label: '摩擦力 F = fGcosα' },
  { id: 'infoSlide', label: '下滑力 = Gsinα' },
]);
Object.assign(ui, infoRefs);

// 知识点面板
const tipPanel = Mech.ui.panel(sidebar, '知识点提示');
ui.tip = document.createElement('div');
ui.tip.className = 'tip';
tipPanel.appendChild(ui.tip);

/* ===== 启动 ===== */
window.addEventListener('resize', () => draw());
anim.play();
draw();
console.log('friction-self-lock v1.0 loaded');
</script>
</body>
</html>
