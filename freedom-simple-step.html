<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>简单自由度分步解题 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
<style>
.step-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.step-dot {
  flex: 1;
  min-width: 28px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.3s;
}
.step-dot.active { background: var(--accent); }
.step-dot.done { background: var(--success); }
.step-desc {
  padding: 10px 12px;
  background: rgba(99, 102, 241, 0.06);
  border: 1px solid rgba(99, 102, 241, 0.12);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 10px;
  min-height: 44px;
}
.step-desc .highlight { color: var(--warning); font-weight: 600; }
.step-desc .green { color: var(--success); font-weight: 600; }
.step-desc .blue { color: var(--accent); font-weight: 600; }
.step-desc .orange { color: var(--orange); font-weight: 600; }
.step-desc .cyan { color: #06b6d4; font-weight: 600; }
.step-nav {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.step-nav .btn { flex: 1; }
.problem-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.problem-tab {
  padding: 5px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.problem-tab.active {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(99, 102, 241, 0.08);
}
.problem-tab:hover { border-color: var(--accent); }
.formula-display {
  padding: 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  line-height: 2;
  text-align: center;
  margin-top: 10px;
}
.formula-display .row { display: block; }
.formula-display .dim { color: var(--text-dim); }
.formula-display .result { color: var(--success); font-weight: 700; font-size: 18px; }
</style>
</head>
<body>
<a href="ch1-structure.html" class="back-btn">&larr; 返回章节</a>

<div class="header">
  <h1>简单自由度分步解题 <span class="version-badge">v1.1</span></h1>
  <p>系统引导式逐步标注 &mdash; 掌握标准解题流程</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
/* ===== 简单自由度分步解题 v1.1 ===== */
/* 改进：凸轮机构画法对齐教材标准（偏心圆凸轮+基圆+统一从动件外观+剖面线机架） */

var { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));

// ===== 题目数据 =====
var problems = [
  {
    name: '铰链四杆机构',
    n: 3, PL: 4, PH: 0, F: 1, driving: 1,
    frame: [{x: 120, y: 240, label: 'A'}, {x: 380, y: 240, label: 'D'}],
    links: [
      {from: 0, to: 1, x1: 120, y1: 240, x2: 190, y2: 110, label: '2', partId: 2},
      {from: 1, to: 2, x1: 190, y1: 110, x2: 320, y2: 140, label: '3', partId: 3},
      {from: 3, to: 2, x1: 380, y1: 240, x2: 320, y2: 140, label: '4', partId: 4},
    ],
    pairs: [
      {x: 120, y: 240, label: 'A', type: 'low', parts: '1,2', isRevolute: true},
      {x: 190, y: 110, label: 'B', type: 'low', parts: '2,3', isRevolute: true},
      {x: 320, y: 140, label: 'C', type: 'low', parts: '3,4', isRevolute: true},
      {x: 380, y: 240, label: 'D', type: 'low', parts: '1,4', isRevolute: true},
    ],
    drawExtra: function(ctx, sc) {
      // 机架 — 剖面线（细斜线）
      var ax = 120, dx = 380, y = 240;
      // 机架杆
      Mech.draw.dashedLine(ctx, ax, y, dx, y, {color: Mech.colors.hinge, width: 2, dash: [6,4]});
      // 剖面线
      ctx.strokeStyle = Mech.colors.hinge;
      ctx.lineWidth = 1;
      for (var i = 0; i < 14; i++) {
        var x = ax + 10 + i * 18;
        if (x > dx - 5) break;
        ctx.beginPath();
        ctx.moveTo(x, y + 1);
        ctx.lineTo(x - 6, y + 7);
        ctx.stroke();
      }
      Mech.draw.text(ctx, '1', 250, 260, {color: Mech.colors.hinge, font: '12px sans-serif'});
    }
  },
  {
    name: '凸轮机构',
    n: 2, PL: 2, PH: 1, F: 1, driving: 1,
    frame: [{x: 200, y: 290, label: 'O'}],
    links: [
      // 凸轮（偏心圆）— profileCx/Cy 是轮廓圆心，cx/cy 是转轴中心
      {isCam: true, cx: 200, cy: 290, profileCx: 212, profileCy: 272, r: 42, baseR: 23, label: '2', partId: 2},
      // 从动件（平底）— 绿色统一外观
      {isFollower: true, type: 'flat', cx: 210, contactY: 230, stemTopY: 155, flatW: 26, label: '3', partId: 3},
    ],
    pairs: [
      {x: 200, y: 290, label: 'O', type: 'low', parts: '1,2', isRevolute: true},
      {x: 210, y: 192, label: '', type: 'low', parts: '1,3', isPrismatic: true, guideDir: 'vertical'},
      {x: 210, y: 230, label: 'T', type: 'high', parts: '2,3'},
    ],
    drawExtra: function(ctx, sc) {
      var cx = 210, guideHW = 16;
      var gL = cx - guideHW, gR = cx + guideHW;
      var gTop = 145, gBot = 242;

      // 导路外框（两条竖线）
      ctx.strokeStyle = Mech.colors.hinge;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(gL, gTop); ctx.lineTo(gL, gBot);
      ctx.moveTo(gR, gTop); ctx.lineTo(gR, gBot);
      ctx.stroke();

      // 剖面线（斜线表示机架固定）
      ctx.lineWidth = 1;
      for (var i = 0; i < 8; i++) {
        var y = gTop + 6 + i * 12;
        if (y > gBot - 4) break;
        ctx.beginPath();
        ctx.moveTo(gL, y); ctx.lineTo(gL - 5, y + 5);
        ctx.moveTo(gR, y); ctx.lineTo(gR + 5, y + 5);
        ctx.stroke();
      }
      // 底线
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(gL - 5, gBot); ctx.lineTo(gR + 5, gBot);
      ctx.stroke();

      // 机架标签
      Mech.draw.text(ctx, '1', gL - 10, gTop + 12, {color: Mech.colors.hinge, font: '11px sans-serif', align: 'right'});
    }
  },
];

// ===== 状态 =====
var problemIdx = 0;
var stepIdx = 0;

function getProblem() { return problems[problemIdx]; }

function getMaxStep() {
  var p = getProblem();
  return p.links.length + p.pairs.length + 2;
}

function getStepInfo() {
  var p = getProblem();
  var nParts = p.links.length;
  var nPairs = p.pairs.length;

  if (stepIdx === 0) return {phase: 'start', text: '点击"下一步"开始解题。题目：计算图示' + p.name + '的自由度。'};
  if (stepIdx <= nParts) {
    var idx = stepIdx - 1;
    var part = p.links[idx];
    var partName = part.label || ('part ' + part.partId);
    var partDesc = part.isCam ? '凸轮' : (part.isFollower ? '从动件' : '构件');
    return {phase: 'parts', idx: idx, text: 'Step 1: 识别活动构件 (' + stepIdx + '/' + nParts + ')<br>' + partDesc + ' <span class="blue">' + partName + '</span>，活动构件数 n = ' + stepIdx};
  }
  if (stepIdx <= nParts + nPairs) {
    var idx2 = stepIdx - nParts - 1;
    var pair = p.pairs[idx2];
    var typeName = pair.type === 'low' ? '低副' : '高副';
    var pairCount = stepIdx - nParts;
    var colorClass = pair.type === 'low' ? 'cyan' : 'orange';
    var pairDetail = '';
    if (pair.type === 'low') {
      pairDetail = pair.isRevolute ? '转动副' : '移动副';
    } else {
      pairDetail = '高副';
    }
    return {phase: 'pairs', idx: idx2, text: 'Step 2: 标记运动副 (' + pairCount + '/' + nPairs + ')<br>运动副 <span class="' + colorClass + '">' + (pair.label || '(移动副)') + '</span> = <span class="' + colorClass + '">' + pairDetail + '</span>（构件' + pair.parts + '）'};
  }
  if (stepIdx === nParts + nPairs + 1) {
    return {phase: 'formula', text: 'Step 3: 代入公式<br>F = 3n - 2P<sub>L</sub> - P<sub>H</sub> = 3 x ' + p.n + ' - 2 x ' + p.PL + ' - ' + p.PH + ' = ' + (3*p.n) + ' - ' + (2*p.PL) + ' - ' + p.PH + ' = <span class="green">' + p.F + '</span>'};
  }
  return {phase: 'conclusion', text: 'Step 4: 判断<br>F = <span class="green">' + p.F + '</span>，原动件数 = ' + p.driving + '。F = 原动件数，机构具有确定运动。'};
}

// ===== 绘制 =====
var REF_W = 460, REF_H = 340;
function draw() {
  var dims = getDimensions();
  var w = dims.w, h = dims.h;
  var C = Mech.colors;
  ctx.clearRect(0, 0, w, h);

  var p = getProblem();
  var info = getStepInfo();

  // 缩放自适应
  var padX = 20, padY = 40;
  var sx = (w - padX * 2) / REF_W;
  var sy = (h - padY * 2) / REF_H;
  var sc = Math.min(sx, sy);
  var ox = (w - REF_W * sc) / 2;
  var oy = (h - REF_H * sc) / 2;

  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(sc, sc);

  // 网格
  Mech.draw.grid(ctx, REF_W * 0.4, REF_H * 0.42, REF_W, REF_H, 1);

  // Draw extra (frame symbols etc)
  if (p.drawExtra) p.drawExtra(ctx, 1);

  // Draw all links
  for (var i = 0; i < p.links.length; i++) {
    var link = p.links[i];
    var highlighted = (info.phase === 'parts' && info.idx >= i) ||
                       (info.phase === 'pairs' || info.phase === 'formula' || info.phase === 'conclusion');

    if (link.isCam) {
      // ===== 凸轮绘制（偏心圆 + 基圆）=====
      var camColor = highlighted ? C.accent : 'rgba(99,102,241,0.3)';
      var camWidth = highlighted ? 3.5 : 2;

      // 基圆（细点画线）— 以转轴为中心
      if (highlighted) {
        ctx.setLineDash([8, 4]);
        Mech.draw.circle(ctx, link.cx, link.cy, link.baseR, {color: camColor, width: 1.2});
        ctx.setLineDash([]);
        // 基圆标签
        Mech.draw.text(ctx, 'r0', link.cx + link.baseR + 4, link.cy - 4, {color: camColor, font: '10px sans-serif', align: 'left'});
      }

      // 凸轮轮廓（粗实线）— 以偏心圆圆心画
      ctx.beginPath();
      ctx.arc(link.profileCx, link.profileCy, link.r, 0, Math.PI * 2);
      ctx.strokeStyle = camColor;
      ctx.lineWidth = camWidth;
      ctx.stroke();
      if (highlighted) {
        ctx.fillStyle = 'rgba(99,102,241,0.06)';
        ctx.fill();
        // 偏心线（转轴到轮廓圆心）
        Mech.draw.dashedLine(ctx, link.cx, link.cy, link.profileCx, link.profileCy, {color: camColor, width: 1, dash: [3,3]});
        // 标签
        Mech.draw.text(ctx, link.label, link.profileCx + link.r + 8, link.profileCy + 4, {color: camColor, font: 'bold 12px sans-serif', align: 'left'});
      }

    } else if (link.isFollower) {
      // ===== 从动件绘制（平底 + 统一绿色外观）=====
      var fColor = highlighted ? '#34d399' : 'rgba(52,211,153,0.3)';
      var fWidth = highlighted ? 3 : 2;
      var flatW = link.flatW || 26;
      var contactY = link.contactY;
      var stemTopY = link.stemTopY;

      // 平底：横线
      ctx.strokeStyle = fColor;
      ctx.lineWidth = fWidth + 1;
      ctx.beginPath();
      ctx.moveTo(link.cx - flatW/2, contactY);
      ctx.lineTo(link.cx + flatW/2, contactY);
      ctx.stroke();

      // 两端短竖
      ctx.lineWidth = fWidth;
      ctx.beginPath();
      ctx.moveTo(link.cx - flatW/2, contactY);
      ctx.lineTo(link.cx - flatW/2, contactY + 7);
      ctx.moveTo(link.cx + flatW/2, contactY);
      ctx.lineTo(link.cx + flatW/2, contactY + 7);
      ctx.stroke();

      // 直杆
      ctx.lineWidth = fWidth;
      ctx.beginPath();
      ctx.moveTo(link.cx, contactY);
      ctx.lineTo(link.cx, stemTopY);
      ctx.stroke();

      if (highlighted) {
        Mech.draw.text(ctx, link.label, link.cx + flatW/2 + 10, (contactY + stemTopY) / 2, {color: fColor, font: 'bold 12px sans-serif', align: 'left'});
        // 接触点（黄色小圆点）
        Mech.draw.point(ctx, link.cx, contactY, {color: '#fbbf24', r: 3});
      }

    } else {
      // ===== 普通杆件 =====
      var color = highlighted ? C.accent : 'rgba(99,102,241,0.3)';
      var width = highlighted ? 4 : 2.5;
      Mech.draw.link(ctx, link.x1, link.y1, link.x2, link.y2, {color: color, width: width, label: highlighted ? link.label : ''});
    }
  }

  // Draw all pairs with distinct styles
  var lowPairColor = '#06b6d4';
  for (var j = 0; j < p.pairs.length; j++) {
    var pair = p.pairs[j];
    var pairHi = (info.phase === 'pairs' && info.idx >= j) ||
                 (info.phase === 'formula' || info.phase === 'conclusion');

    if (pairHi) {
      if (pair.type === 'low' && (pair.isRevolute || (!pair.isPrismatic))) {
        // 转动低副：空心圆 ○（教材标准）+ cyan虚线圆高亮
        // 先画空心圆
        ctx.beginPath();
        ctx.arc(pair.x, pair.y, 6, 0, Math.PI * 2);
        ctx.strokeStyle = lowPairColor;
        ctx.lineWidth = 2;
        ctx.stroke();
        // cyan 虚线圆（标注圈）
        ctx.save();
        ctx.shadowColor = lowPairColor;
        ctx.shadowBlur = 6;
        ctx.setLineDash([4, 3]);
        Mech.draw.circle(ctx, pair.x, pair.y, 11, {color: lowPairColor, width: 1.5});
        ctx.setLineDash([]);
        ctx.restore();
        // 中心点
        Mech.draw.point(ctx, pair.x, pair.y, {color: lowPairColor, r: 2});

      } else if (pair.type === 'low' && pair.isPrismatic) {
        // 移动低副：虚线垂直于导路方向
        ctx.save();
        ctx.shadowColor = lowPairColor;
        ctx.shadowBlur = 6;
        ctx.setLineDash([4, 3]);
        ctx.strokeStyle = lowPairColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (pair.guideDir === 'vertical') {
          // 导路垂直 → 虚线水平
          ctx.moveTo(pair.x - 22, pair.y);
          ctx.lineTo(pair.x + 22, pair.y);
        } else {
          ctx.moveTo(pair.x, pair.y - 20);
          ctx.lineTo(pair.x, pair.y + 20);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
        // 中心点
        Mech.draw.point(ctx, pair.x, pair.y, {color: lowPairColor, r: 2});
        // 滑块矩形
        if (pair.guideDir === 'vertical') {
          ctx.strokeStyle = lowPairColor;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(pair.x - 8, pair.y - 5, 16, 10);
        }

      } else if (pair.type === 'high') {
        // 高副：橙色点 + 光环 + 公法线 n-n
        ctx.save();
        ctx.shadowColor = C.orange;
        ctx.shadowBlur = 10;
        Mech.draw.point(ctx, pair.x, pair.y, {color: C.orange, r: 4.5});
        ctx.restore();
        Mech.draw.circle(ctx, pair.x, pair.y, 9, {color: C.orange, width: 1.5});
        // 公法线 n-n（短虚线）
        Mech.draw.dashedLine(ctx, pair.x - 18, pair.y - 12, pair.x + 18, pair.y + 12, {color: C.orange, width: 1, dash: [4,3]});
        Mech.draw.text(ctx, 'n', pair.x + 20, pair.y + 14, {color: C.orange, font: '10px sans-serif', align: 'left'});
      }
    } else {
      // 未高亮：灰色铰链点
      Mech.draw.hinge(ctx, pair.x, pair.y, {color: 'rgba(161,161,170,0.3)', r: 4});
    }

    // 标签
    if (pairHi && pair.label) {
      var lblColor = pair.type === 'low' ? lowPairColor : C.orange;
      Mech.draw.text(ctx, pair.label, pair.x + 14, pair.y - 14, {color: lblColor, font: 'bold 12px sans-serif', align: 'left'});

      // 运动副类型标注
      var typeText;
      if (pair.type === 'low') {
        typeText = pair.isRevolute ? 'PL(转动)' : 'PL(移动)';
      } else {
        typeText = 'PH';
      }
      var typeColor = pair.type === 'low' ? lowPairColor : C.orange;
      Mech.draw.text(ctx, typeText, pair.x + 14, pair.y + 4, {color: typeColor, font: '10px sans-serif', align: 'left'});
    }
  }

  // 固定铰支座
  for (var k = 0; k < p.frame.length; k++) {
    var fp = p.frame[k];
    Mech.draw.hingedSupport(ctx, fp.x, fp.y);
  }

  ctx.restore();

  // 公式区域（右下角，不受缩放影响）
  if (info.phase === 'formula' || info.phase === 'conclusion') {
    drawFormulaBox(w, h, p);
  }

  // 题目标题
  Mech.draw.text(ctx, p.name, w * 0.5, 24, {color: C.textDim, font: '13px sans-serif', align: 'center'});
}

function drawFormulaBox(w, h, p) {
  var C = Mech.colors;
  var bw = 220, bh = 100;
  var bx = w - bw - 12, by = h - bh - 12;

  ctx.fillStyle = 'rgba(26, 29, 39, 0.92)';
  roundRect2(bx, by, bw, bh, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(99,102,241,0.2)';
  ctx.lineWidth = 1;
  roundRect2(bx, by, bw, bh, 10);
  ctx.stroke();

  var cx = bx + bw / 2;
  var yy = by + 22;

  Mech.draw.text(ctx, 'F = 3n - 2PL - PH', cx, yy, {color: C.text, font: '13px sans-serif'});
  yy += 22;
  Mech.draw.text(ctx, '= 3 x ' + p.n + ' - 2 x ' + p.PL + ' - ' + p.PH, cx, yy, {color: C.textDim, font: '13px sans-serif'});
  yy += 22;
  Mech.draw.text(ctx, '= ' + (3*p.n) + ' - ' + (2*p.PL) + ' - ' + p.PH, cx, yy, {color: C.textDim, font: '13px sans-serif'});
  yy += 22;
  var fColor = p.F > 0 ? C.return : C.warning;
  ctx.fillStyle = fColor;
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('F = ' + p.F, cx, yy);
}

function roundRect2(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== UI =====
var sidebar = document.getElementById('sidebar');
var toolbar = document.getElementById('toolbar');

// Problem tabs
var tabPanel = Mech.ui.panel(sidebar, '题目选择');
var tabContainer = document.createElement('div');
tabContainer.className = 'problem-tabs';
tabPanel.appendChild(tabContainer);

problems.forEach(function(prob, i) {
  var tab = document.createElement('div');
  tab.className = 'problem-tab' + (i === 0 ? ' active' : '');
  tab.textContent = prob.name;
  tab.addEventListener('click', function() {
    problemIdx = i;
    stepIdx = 0;
    document.querySelectorAll('.problem-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    updateUI();
    draw();
  });
  tabContainer.appendChild(tab);
});

// Step progress
var stepPanel = Mech.ui.panel(sidebar, '解题进度');
var progressContainer = document.createElement('div');
progressContainer.className = 'step-progress';
stepPanel.appendChild(progressContainer);

var stepDesc = document.createElement('div');
stepDesc.className = 'step-desc';
stepPanel.appendChild(stepDesc);

var stepNav = document.createElement('div');
stepNav.className = 'step-nav';
stepPanel.appendChild(stepNav);

var prevBtn = Mech.ui.button(stepNav, {
  text: '上一步', variant: 'secondary',
  onClick: function() {
    if (stepIdx > 0) { stepIdx--; updateUI(); draw(); }
  }
});
var nextBtn = Mech.ui.button(stepNav, {
  text: '下一步', variant: 'primary',
  onClick: function() {
    if (stepIdx < getMaxStep()) { stepIdx++; updateUI(); draw(); }
  }
});

// Formula display
var formulaPanel = Mech.ui.panel(sidebar, '计算过程');
var formulaDisplay = document.createElement('div');
formulaDisplay.className = 'formula-display';
formulaPanel.appendChild(formulaDisplay);

function updateUI() {
  var p = getProblem();
  var info = getStepInfo();
  var maxStep = getMaxStep();

  // Progress dots
  progressContainer.innerHTML = '';
  for (var i = 0; i <= maxStep; i++) {
    var dot = document.createElement('div');
    dot.className = 'step-dot';
    if (i < stepIdx) dot.classList.add('done');
    if (i === stepIdx) dot.classList.add('active');
    progressContainer.appendChild(dot);
  }

  // Step description
  stepDesc.innerHTML = info.text;

  // Buttons
  prevBtn.style.opacity = stepIdx === 0 ? '0.4' : '1';
  prevBtn.style.pointerEvents = stepIdx === 0 ? 'none' : 'auto';
  nextBtn.style.opacity = stepIdx >= maxStep ? '0.4' : '1';
  nextBtn.style.pointerEvents = stepIdx >= maxStep ? 'none' : 'auto';
  if (stepIdx >= maxStep) {
    nextBtn.textContent = '已完成';
  } else {
    nextBtn.textContent = '下一步';
  }

  // Formula
  if (info.phase === 'formula' || info.phase === 'conclusion') {
    var html = '<span class="row">F = 3n - 2P<sub>L</sub> - P<sub>H</sub></span>';
    html += '<span class="row dim">= 3 x ' + p.n + ' - 2 x ' + p.PL + ' - ' + p.PH + '</span>';
    html += '<span class="row dim">= ' + (3*p.n) + ' - ' + (2*p.PL) + ' - ' + p.PH + '</span>';
    html += '<span class="row result">F = ' + p.F + '</span>';
    if (info.phase === 'conclusion') {
      html += '<span class="row dim" style="font-size:12px">原动件数 = ' + p.driving + ' = F, 机构有确定运动</span>';
    }
    formulaDisplay.innerHTML = html;
  } else {
    formulaDisplay.innerHTML = '<span class="row dim">完成标注后显示计算过程...</span>';
  }
}

window.addEventListener('resize', function() { draw(); });
updateUI();
draw();
console.log('freedom-simple-step v1.1 loaded');
</script>
