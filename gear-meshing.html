<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>渐开线齿轮啮合交互演示 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch5-gear.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>渐开线齿轮啮合交互演示 <span class="version-badge">v2.0</span></h1>
  <p>调节齿数与模数，观察标准直齿圆柱齿轮的啮合传动</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
        <div id="legend" style="padding:0 14px 8px;"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
const DEG = 180 / Math.PI;
const RAD = Math.PI / 180;
const ALPHA = 20 * RAD;

// ===== 模块状态 =====
const params = { z1: 20, z2: 30, m: 4 };
let theta1 = 0;
let speed = 0.1;
const show = { pitch: true, base: true, addDed: true, loa: true, pressure: false };

// ===== Canvas + 动画 =====
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
const anim = Mech.createAnimator(
  dt => { theta1 += speed * 1.2 * dt; },
  () => draw()
);

// ===== 齿轮几何（模块特有）=====
function gearParams(z, m, alpha) {
  const r = m * z / 2;
  const rb = r * Math.cos(alpha);
  const ra = r + m;
  const rf = r - 1.25 * m;
  const p = Math.PI * m;
  const s = Math.PI * m / 2;
  return { z, m, r, rb, ra, rf, p, s, alpha };
}

function generateGearProfile(z, m, alpha) {
  const { r, rb, ra, rf } = gearParams(z, m, alpha);
  const invAlpha = Math.tan(alpha) - alpha;
  const toothAngle = 2 * Math.PI / z;
  const halfTooth = Math.PI / (2 * z);
  const psiMax = Math.acos(Math.min(1, rb / Math.max(rb + 0.01, ra)));
  const steps = 18;
  const points = [];
  for (let i = 0; i < z; i++) {
    const center = i * toothAngle;
    for (let s = 0; s <= steps; s++) {
      const psi = (s / steps) * psiMax;
      const ri = rb / Math.cos(psi);
      const angle = center - halfTooth - invAlpha + (Math.tan(psi) - psi);
      points.push({ x: ri * Math.cos(angle), y: ri * Math.sin(angle) });
    }
    const rightTopAngle = center - halfTooth - invAlpha + (Math.tan(psiMax) - psiMax);
    const leftTopAngle = center + halfTooth + invAlpha - (Math.tan(psiMax) - psiMax);
    for (let s = 1; s <= 4; s++) {
      const angle = rightTopAngle + (leftTopAngle - rightTopAngle) * s / 4;
      points.push({ x: ra * Math.cos(angle), y: ra * Math.sin(angle) });
    }
    for (let s = steps; s >= 0; s--) {
      const psi = (s / steps) * psiMax;
      const ri = rb / Math.cos(psi);
      const angle = center + halfTooth + invAlpha - (Math.tan(psi) - psi);
      points.push({ x: ri * Math.cos(angle), y: ri * Math.sin(angle) });
    }
    const leftBaseAngle = center + halfTooth + invAlpha;
    const nextRightBaseAngle = (i + 1) * toothAngle - halfTooth - invAlpha;
    if (rf < rb) {
      points.push({ x: rf * Math.cos(leftBaseAngle), y: rf * Math.sin(leftBaseAngle) });
      for (let s = 1; s <= 4; s++) {
        const angle = leftBaseAngle + (nextRightBaseAngle - leftBaseAngle) * s / 4;
        points.push({ x: rf * Math.cos(angle), y: rf * Math.sin(angle) });
      }
      points.push({ x: rb * Math.cos(nextRightBaseAngle), y: rb * Math.sin(nextRightBaseAngle) });
    } else {
      points.push({ x: rf * Math.cos(leftBaseAngle), y: rf * Math.sin(leftBaseAngle) });
      for (let s = 1; s <= 4; s++) {
        const angle = leftBaseAngle + (nextRightBaseAngle - leftBaseAngle) * s / 4;
        points.push({ x: rf * Math.cos(angle), y: rf * Math.sin(angle) });
      }
    }
  }
  return points;
}

function calcContactRatio(z1, z2, m, alpha) {
  const p1 = gearParams(z1, m, alpha), p2 = gearParams(z2, m, alpha);
  const a = p1.r + p2.r;
  const g1 = Math.sqrt(Math.max(0, p1.ra * p1.ra - p1.rb * p1.rb));
  const g2 = Math.sqrt(Math.max(0, p2.ra * p2.ra - p2.rb * p2.rb));
  const pb = Math.PI * m * Math.cos(alpha);
  return Math.max(0, (g1 + g2 - a * Math.sin(alpha)) / pb);
}

// ===== 布局计算 =====
function getScale() {
  const { w, h } = getDimensions();
  const p1 = gearParams(params.z1, params.m, ALPHA);
  const p2 = gearParams(params.z2, params.m, ALPHA);
  const a = p1.r + p2.r;
  const maxR = Math.max(p1.ra, p2.ra);
  const totalW = a * 1.3, totalH = maxR * 2.0;
  const scale = Math.min(w / totalW, h / totalH);
  return { scale, cx: w / 2, cy: h / 2, centerDist: a * scale, p1, p2 };
}

// ===== 绘制 =====
function drawGearFilled(cx, cy, profile, scale, fillColor, strokeColor, rotation) {
  if (profile.length < 3) return;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.beginPath();
  ctx.moveTo(profile[0].x * scale, -profile[0].y * scale);
  for (let i = 1; i < profile.length; i++)
    ctx.lineTo(profile[i].x * scale, -profile[i].y * scale);
  ctx.closePath();
  ctx.fillStyle = fillColor; ctx.fill();
  ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.5; ctx.stroke();
  // 中心孔
  const holeR = 6 * scale;
  ctx.beginPath(); ctx.arc(0, 0, holeR, 0, Math.PI * 2);
  ctx.fillStyle = '#0f1117'; ctx.fill();
  ctx.strokeStyle = strokeColor; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, 2 * scale, 0, Math.PI * 2);
  ctx.fillStyle = strokeColor; ctx.fill();
  ctx.restore();
}

function drawRadiusAnnotation(cx, cy, radiusPx, label, color, scale, angle) {
  if (angle == null) angle = Math.PI * 0.35;
  const nx = cx + radiusPx * Math.cos(angle);
  const ny = cy - radiusPx * Math.sin(angle);
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1.2;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nx, ny); ctx.stroke();
  const arrowLen = 7 * scale;
  const headAngle = Math.atan2(cy - ny, cx - nx);
  ctx.beginPath();
  ctx.moveTo(nx, ny);
  ctx.lineTo(nx + arrowLen * Math.cos(headAngle - 0.4), ny + arrowLen * Math.sin(headAngle - 0.4));
  ctx.lineTo(nx + arrowLen * Math.cos(headAngle + 0.4), ny + arrowLen * Math.sin(headAngle + 0.4));
  ctx.closePath(); ctx.fill();
  const midX = (cx + nx) / 2, midY = (cy + ny) / 2;
  ctx.font = `${Math.max(10, 11 * Math.min(scale, 1.2))}px sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(label, midX + 6 * Math.cos(angle + Math.PI/2), midY - 6 * Math.sin(angle + Math.PI/2) - 2);
  ctx.restore();
}

function drawLineOfAction(cx1, cy1, cx2, cy2, p1, p2, scale) {
  const C = Mech.colors;
  const a = p1.r + p2.r;
  const pitchX = cx1 + (p1.r / a) * (cx2 - cx1);
  const centerAngle = Math.atan2(cy2 - cy1, cx2 - cx1);
  const loaAngle = centerAngle + (Math.PI / 2 - ALPHA);
  const dx = Math.cos(loaAngle), dy = Math.sin(loaAngle);
  const sinA = Math.sin(ALPHA), cosA = Math.cos(ALPHA);
  const g1 = Math.sqrt(Math.max(0, p1.ra * p1.ra - p1.rb * p1.rb));
  const g2 = Math.sqrt(Math.max(0, p2.ra * p2.ra - p2.rb * p2.rb));
  const sB1 = p2.r * sinA - g2;
  const sB2 = -p1.r * sinA + g1;
  const Lpath = sB2 - sB1;
  const pb = Math.PI * p1.m * cosA;
  const epsilon = Lpath / pb;

  // 理论啮合线（虚线）
  const extLen = (g1 + g2) * 1.3;
  Mech.draw.dashedLine(ctx, pitchX - dx * extLen * scale, cy1 - dy * extLen * scale,
    pitchX + dx * extLen * scale, cy1 + dy * extLen * scale,
    { color: 'rgba(248,113,113,0.25)', width: 1, dash: [6, 4] });
  // 实际啮合线段（加粗）
  Mech.draw.dashedLine(ctx, pitchX + sB1 * dx * scale, cy1 + sB1 * dy * scale,
    pitchX + sB2 * dx * scale, cy1 + sB2 * dy * scale,
    { color: 'rgba(248,113,113,0.6)', width: 2, dash: [4, 3] });

  // N₁、N₂ 极限点
  const sN1 = -p1.rb * sinA, sN2 = p2.rb * sinA;
  const n1x = pitchX + sN1 * dx * scale, n1y = cy1 + sN1 * dy * scale;
  Mech.draw.point(ctx, n1x, n1y, { color: C.purple, r: 3 });
  Mech.draw.text(ctx, 'N₁', n1x + 8, n1y - 6, { color: C.purple, align: 'left' });
  const n2x = pitchX + sN2 * dx * scale, n2y = cy1 + sN2 * dy * scale;
  Mech.draw.point(ctx, n2x, n2y, { color: C.purple, r: 3 });
  Mech.draw.text(ctx, 'N₂', n2x - 8, n2y + 14, { color: C.purple, align: 'right' });

  // 啮合点（接触点）
  const phase = ((p1.rb * theta1) % pb + pb) % pb;
  for (let k = 0; ; k++) {
    const pos = sB1 + phase + k * pb;
    if (pos > sB2 + 0.001) break;
    if (pos >= sB1 - 0.001) {
      const cpx = pitchX + pos * dx * scale, cpy = cy1 + pos * dy * scale;
      Mech.draw.point(ctx, cpx, cpy, { color: '#ef4444', r: 2 });
      ctx.strokeStyle = 'rgba(239,68,68,0.35)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(cpx, cpy, 3.5, 0, Math.PI * 2); ctx.stroke();
    }
  }
  return { pitchX, loaAngle, epsilon };
}

function drawPressureAngle(cx1, cy1, pitchX, scale) {
  // 公切线
  const tangentLen = 30 * scale;
  Mech.draw.dashedLine(ctx, pitchX, cy1 - tangentLen, pitchX, cy1 + tangentLen,
    { color: 'rgba(251,191,36,0.7)', width: 1.5, dash: [3, 3] });
  // 压力角弧
  const arcR = 25 * scale;
  Mech.draw.arc(ctx, pitchX, cy1, arcR, Math.PI / 2 - ALPHA, Math.PI / 2, false,
    { color: Mech.colors.warning, width: 1.5 });
  const labelAngle = Math.PI / 2 - ALPHA / 2;
  Mech.draw.text(ctx, 'α', pitchX + (arcR + 12) * Math.cos(labelAngle), cy1 + (arcR + 12) * Math.sin(labelAngle),
    { color: Mech.colors.warning, font: '11px sans-serif' });
}

function draw() {
  const { w, h } = getDimensions();
  ctx.clearRect(0, 0, w, h);
  const { scale, cx, cy, centerDist, p1, p2 } = getScale();
  const C = Mech.colors;

  const cx1 = cx - centerDist / 2, cy1 = cy;
  const cx2 = cx + centerDist / 2, cy2 = cy;
  const theta2 = -theta1 * params.z1 / params.z2 + Math.PI / params.z2;
  const profile1 = generateGearProfile(params.z1, params.m, ALPHA);
  const profile2 = generateGearProfile(params.z2, params.m, ALPHA);

  // 分度圆
  if (show.pitch) {
    Mech.draw.circle(ctx, cx1, cy1, p1.r * scale, { color: 'rgba(99,102,241,0.35)', width: 1, dash: [6, 4] });
    Mech.draw.circle(ctx, cx2, cy2, p2.r * scale, { color: 'rgba(52,211,153,0.35)', width: 1, dash: [6, 4] });
    drawRadiusAnnotation(cx1, cy1, p1.r * scale, `r₁=${p1.r.toFixed(1)}`, 'rgba(99,102,241,0.8)', scale, Math.PI * 0.35);
    drawRadiusAnnotation(cx2, cy2, p2.r * scale, `r₂=${p2.r.toFixed(1)}`, 'rgba(52,211,153,0.8)', scale, Math.PI * 0.35);
  }
  // 基圆
  if (show.base) {
    Mech.draw.circle(ctx, cx1, cy1, p1.rb * scale, { color: 'rgba(251,191,36,0.25)', width: 1, dash: [4, 4] });
    Mech.draw.circle(ctx, cx2, cy2, p2.rb * scale, { color: 'rgba(251,191,36,0.25)', width: 1, dash: [4, 4] });
    drawRadiusAnnotation(cx1, cy1, p1.rb * scale, `Rb₁=${p1.rb.toFixed(1)}`, 'rgba(251,191,36,0.7)', scale, -Math.PI * 0.2);
    drawRadiusAnnotation(cx2, cy2, p2.rb * scale, `Rb₂=${p2.rb.toFixed(1)}`, 'rgba(251,191,36,0.7)', scale, -Math.PI * 0.2);
  }
  // 齿顶圆/齿根圆
  if (show.addDed) {
    Mech.draw.circle(ctx, cx1, cy1, p1.ra * scale, { color: 'rgba(99,102,241,0.15)', width: 1, dash: [2, 4] });
    Mech.draw.circle(ctx, cx1, cy1, p1.rf * scale, { color: 'rgba(99,102,241,0.15)', width: 1, dash: [2, 4] });
    Mech.draw.circle(ctx, cx2, cy2, p2.ra * scale, { color: 'rgba(52,211,153,0.15)', width: 1, dash: [2, 4] });
    Mech.draw.circle(ctx, cx2, cy2, p2.rf * scale, { color: 'rgba(52,211,153,0.15)', width: 1, dash: [2, 4] });
  }

  // 齿轮齿廓
  drawGearFilled(cx1, cy1, profile1, scale, 'rgba(99,102,241,0.12)', 'rgba(99,102,241,0.7)', theta1);
  drawGearFilled(cx2, cy2, profile2, scale, 'rgba(52,211,153,0.12)', 'rgba(52,211,153,0.7)', theta2);

  // 啮合线
  let loaInfo = null;
  if (show.loa) {
    loaInfo = drawLineOfAction(cx1, cy1, cx2, cy2, p1, p2, scale);
    if (show.pressure) drawPressureAngle(cx1, cy1, loaInfo.pitchX, scale);
  }

  // 中心距连线
  Mech.draw.dashedLine(ctx, cx1, cy1, cx2, cy2, { color: 'rgba(100,116,139,0.3)', width: 1, dash: [4, 4] });

  // 圆心标记
  ctx.strokeStyle = 'rgba(99,102,241,0.8)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx1 - 5*scale, cy1); ctx.lineTo(cx1 + 5*scale, cy1);
  ctx.moveTo(cx1, cy1 - 5*scale); ctx.lineTo(cx1, cy1 + 5*scale); ctx.stroke();
  ctx.strokeStyle = 'rgba(52,211,153,0.8)';
  ctx.beginPath(); ctx.moveTo(cx2 - 5*scale, cy2); ctx.lineTo(cx2 + 5*scale, cy2);
  ctx.moveTo(cx2, cy2 - 5*scale); ctx.lineTo(cx2, cy2 + 5*scale); ctx.stroke();

  Mech.draw.text(ctx, 'O₁', cx1, cy1 + 16 * scale, { color: 'rgba(99,102,241,0.9)', font: 'bold 12px sans-serif' });
  Mech.draw.text(ctx, 'O₂', cx2, cy2 + 16 * scale, { color: 'rgba(52,211,153,0.9)', font: 'bold 12px sans-serif' });
  Mech.draw.text(ctx, `a = ${(p1.r + p2.r).toFixed(1)}`, cx, cy - 10 * scale, { color: '#64748b', font: '11px sans-serif' });

  // 旋转方向箭头
  if (anim.isPlaying()) {
    const arrowR1 = Math.min(p1.rf * scale - 8, 25);
    const arrowR2 = Math.min(p2.rf * scale - 8, 25);
    if (arrowR1 > 10) {
      ctx.strokeStyle = 'rgba(228,228,231,0.45)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx1, cy1, arrowR1, -0.3, 1.2); ctx.stroke();
      const tipAngle = 1.2, tipX = cx1 + arrowR1 * Math.cos(tipAngle), tipY = cy1 + arrowR1 * Math.sin(tipAngle);
      const bAngle = tipAngle - 0.28, spread = 2 * scale;
      ctx.fillStyle = 'rgba(228,228,231,0.8)';
      ctx.beginPath(); ctx.moveTo(tipX, tipY);
      ctx.lineTo(cx1 + (arrowR1+spread)*Math.cos(bAngle), cy1 + (arrowR1+spread)*Math.sin(bAngle));
      ctx.lineTo(cx1 + (arrowR1-spread)*Math.cos(bAngle), cy1 + (arrowR1-spread)*Math.sin(bAngle));
      ctx.closePath(); ctx.fill();
    }
    if (arrowR2 > 10) {
      ctx.strokeStyle = 'rgba(228,228,231,0.45)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx2, cy2, arrowR2, Math.PI + 0.3, Math.PI - 1.2, true); ctx.stroke();
      const tipAngle = Math.PI - 1.2, tipX = cx2 + arrowR2 * Math.cos(tipAngle), tipY = cy2 + arrowR2 * Math.sin(tipAngle);
      const bAngle = tipAngle + 0.28, spread = 2 * scale;
      ctx.fillStyle = 'rgba(228,228,231,0.8)';
      ctx.beginPath(); ctx.moveTo(tipX, tipY);
      ctx.lineTo(cx2 + (arrowR2+spread)*Math.cos(bAngle), cy2 + (arrowR2+spread)*Math.sin(bAngle));
      ctx.lineTo(cx2 + (arrowR2-spread)*Math.cos(bAngle), cy2 + (arrowR2-spread)*Math.sin(bAngle));
      ctx.closePath(); ctx.fill();
    }
  }

  // 更新信息面板
  updateInfo(p1, p2, loaInfo);
}

// ===== 信息面板更新 =====
function updateInfo(p1, p2, loaInfo) {
  const a = p1.r + p2.r;
  const epsilon = loaInfo ? loaInfo.epsilon : calcContactRatio(params.z1, params.z2, params.m, ALPHA);
  const ratio = params.z2 / params.z1;
  ui.infoRatio.textContent = ratio.toFixed(2);
  ui.infoCenter.textContent = a.toFixed(1);
  ui.infoEpsilon.textContent = epsilon.toFixed(3);
  ui.infoEpsilon.style.color = epsilon < 1 ? '#f87171' : epsilon < 1.2 ? '#fbbf24' : '#34d399';
  ui.infoR.textContent = `${p1.r.toFixed(1)} / ${p2.r.toFixed(1)}`;
  ui.infoRb.textContent = `${p1.rb.toFixed(1)} / ${p2.rb.toFixed(1)}`;

  const zMin = Math.ceil(2 / (Math.sin(ALPHA) * Math.sin(ALPHA)));
  const hasUndercut = params.z1 < zMin || params.z2 < zMin;
  ui.undercutWarn.style.display = hasUndercut ? 'inline-block' : 'none';

  if (hasUndercut) {
    ui.tip.textContent = `⚠️ 齿数小于z_min=${zMin}（α=20°），会产生根切。避免方法：①增加齿数 ②正变位。标准齿轮不根切条件：z ≥ z_min = 2/sin²α = ${zMin}。`;
  } else if (epsilon < 1) {
    ui.tip.textContent = `⚠️ 重合度ε=${epsilon.toFixed(3)} < 1，无法连续传动！增大齿数可提高ε，一般要求ε ≥ 1.2。`;
  } else if (epsilon < 1.2) {
    ui.tip.textContent = `重合度ε=${epsilon.toFixed(3)}偏小。ε为同时啮合齿对数均值，越大越平稳。增大齿数可提高ε。`;
  } else {
    ui.tip.textContent = `正确啮合条件：m₁=m₂，α₁=α₂。传动比i=z₂/z₁=${ratio.toFixed(2)}，中心距a=${a.toFixed(1)}。重合度ε=${epsilon.toFixed(3)}，渐开线齿轮具有可分性（中心距微变时i不变）。`;
  }
}

// ===== UI 构建 =====
const ui = {};

// 工具栏
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, {
  text: '⏸ 暂停', variant: 'primary',
  onClick: () => {
    if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
    else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
  }
});
Mech.ui.button(toolbar, {
  text: '重置', variant: 'secondary',
  onClick: () => {
    theta1 = 0;
    params.z1 = 20; params.z2 = 30; params.m = 4;
    ui.slZ1.set(20); ui.slZ2.set(30); ui.slM.set(4);
    draw();
  }
});
Mech.ui.slider(toolbar, {
  label: '转速', min: 0.02, max: 5, value: 0.1, step: 0.02,
  format: v => v.toFixed(2) + 'x',
  onChange: v => { speed = v; }
});

// 侧边栏
const sidebar = document.getElementById('sidebar');

// 齿轮参数面板
const paramPanel = Mech.ui.panel(sidebar, '齿轮参数');
ui.slZ1 = Mech.ui.sidebarSlider(paramPanel, {
  label: 'z₁ (齿轮1齿数)', min: 8, max: 60, value: 20,
  onChange: v => { params.z1 = v; draw(); }
});
ui.slZ2 = Mech.ui.sidebarSlider(paramPanel, {
  label: 'z₂ (齿轮2齿数)', min: 8, max: 60, value: 30,
  onChange: v => { params.z2 = v; draw(); }
});
ui.slM = Mech.ui.sidebarSlider(paramPanel, {
  label: 'm (模数)', min: 2, max: 8, value: 4, step: 0.5,
  onChange: v => { params.m = v; draw(); }
});

// 显示选项面板
const optPanel = Mech.ui.panel(sidebar, '显示选项');
Mech.ui.checkbox(optPanel, { label: '分度圆 + 半径标注', checked: true, onChange: v => { show.pitch = v; draw(); } });
Mech.ui.checkbox(optPanel, { label: '基圆 + 半径标注', checked: true, onChange: v => { show.base = v; draw(); } });
Mech.ui.checkbox(optPanel, { label: '齿顶圆/齿根圆', checked: true, onChange: v => { show.addDed = v; draw(); } });
Mech.ui.checkbox(optPanel, { label: '啮合线', checked: true, onChange: v => { show.loa = v; draw(); } });
Mech.ui.checkbox(optPanel, { label: '压力角标注', checked: false, onChange: v => { show.pressure = v; draw(); } });

// 啮合信息面板
const infoPanel = Mech.ui.panel(sidebar, '啮合信息');

infoHeader.style.marginBottom = '8px';
