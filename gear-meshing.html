<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渐开线齿轮合交互演示 — 机械考研可视化</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e4e4e7; --text2: #9ca3af; --accent: #6366f1;
    --accent2: #818cf8; --green: #34d399; --red: #f87171;
    --amber: #fbbf24; --blue: #60a5fa;
  }
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  .app { max-width: 1200px; margin:0 auto; padding:16px; }
  header { text-align:center; padding:20px 0 12px; position:relative; }
  header h1 {
    font-size:22px; font-weight:600;
    background: linear-gradient(135deg, var(--accent2), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color:transparent;
    background-clip: text;
  }
  header p { font-size:13px; color:var(--text2); margin-top:4px; }
  .back-btn {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text2); text-decoration: none; font-size: 13px;
    padding: 6px 14px; border-radius: 6px; background: rgba(255,255,255,0.05);
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.12); color: var(--accent2); }
  .main-layout {
    display: grid; grid-template-columns: 1fr 300px;
    gap:16px; margin-top:12px;
  }
  @media (max-width:768px) {
    .main-layout { grid-template-columns:1fr; }
    .back-btn { position: static; display: inline-block; margin-bottom: 8px; transform: none; }
  }
  .canvas-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; position:relative;
  }
  .canvas-card canvas { width:100%; display:block; cursor:grab; }
  .canvas-card canvas:active { cursor:grabbing; }
  .canvas-toolbar {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px; border-top:1px solid var(--border); flex-wrap:wrap;
  }
  .btn {
    background:var(--accent); color:#fff; border:none;
    padding:7px 16px; border-radius:8px; font-size:13px;
    cursor:pointer; transition:background 0.2s; font-weight:500;
  }
  .btn:hover { background:var(--accent2); }
  .btn.outline {
    background:transparent; border:1px solid var(--border); color:var(--text2);
  }
  .btn.outline:hover { border-color:var(--accent); color:var(--accent2); }
  .speed-label { font-size:12px; color:var(--text2); margin-left:auto; }
  .sidebar { display:flex; flex-direction:column; gap:12px; }
  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:14px;
  }
  .panel-title { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--text); }
  .slider-group { margin-bottom:10px; }
  .slider-header {
    display:flex; justify-content:space-between;
    align-items:center; margin-bottom:4px;
  }
  .slider-label { font-size:13px; color:var(--text2); }
  .slider-value { font-size:13px; font-weight:600; color:var(--accent2); min-width:36px; text-align:right; }
  input[type="range"] {
    width:100%; height:6px; -webkit-appearance:none; appearance:none;
    background:var(--border); border-radius:3px; outline:none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:18px; height:18px; border-radius:50%;
    background:var(--accent); cursor:pointer; border:2px solid var(--bg);
  }
  input[type="range"]::-moz-range-thumb {
    width:18px; height:18px; border-radius:50%;
    background:var(--accent); cursor:pointer; border:2px solid var(--bg);
  }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .info-item {
    background:rgba(99,102,241,0.08); border-radius:8px; padding:8px 10px;
  }
  .info-item .label { font-size:11px; color:var(--text2); margin-bottom:2px; }
  .info-item .value { font-size:14px; font-weight:600; }
  .tip {
    font-size:12px; color:var(--text2); line-height:1.6;
    padding:10px; background:rgba(99,102,241,0.06);
    border-radius:8px; border-left:3px solid var(--accent); margin-top:4px;
  }
  .toggle-row {
    display:flex; align-items:center; gap:6px;
    margin-bottom:6px; cursor:pointer; font-size:12px; color:var(--text2);
  }
  .toggle-row input[type="checkbox"] {
    accent-color:var(--accent); width:15px; height:15px; cursor:pointer;
  }
  .warning-badge {
    display:inline-block; padding:2px 8px; border-radius:4px;
    font-size:11px; font-weight:600; background:rgba(248,113,113,0.15);
    color:var(--red); margin-left:6px;
  }
  .legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; }
  .legend-item {
    display:flex; align-items:center; gap:4px;
    font-size:11px; color:var(--text2);
  }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .legend-line { width:16px; height:2px; border-radius:1px; }
  footer { text-align:center; padding:20px 0; font-size:12px; color:var(--text2); }
</style>
</head>
<body>
<div class="app">
  <header>
    <a href="ch5-gear.html" class="back-btn">← 返回章节</a>
    <h1>渐开线齿轮啮合交互演示</h1>
    <p>调节齿数与模数，观察标准直齿圆柱齿轮的合传动</p>
  </header>

  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <canvas id="gearCanvas"></canvas>
        <div class="canvas-toolbar">
          <button class="btn" id="playBtn">暂停</button>
          <button class="btn outline" id="resetBtn">重置</button>
          <span class="speed-label">
            转速
            <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="0.5" style="width:80px;vertical-align:middle;margin-left:4px;">
          </span>
        </div>
        <div style="padding:0 14px 8px;">
          <div class="legend">
            <span class="legend-item"><span class="legend-dot" style="background:#6366f1"></span>齿轮1</span>
            <span class="legend-item"><span class="legend-dot" style="background:#34d399"></span>齿轮2</span>
            <span class="legend-item"><span class="legend-line" style="background:#f87171"></span>啮合线</span>
            <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>啮合点</span>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">齿轮参数</div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">z₁ (齿轮1齿数)</span>
            <span class="slider-value" id="valZ1">20</span>
          </div>
          <input type="range" id="sliderZ1" min="8" max="60" value="20">
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">z₂ (齿轮2齿数)</span>
            <span class="slider-value" id="valZ2">30</span>
          </div>
          <input type="range" id="sliderZ2" min="8" max="60" value="30">
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">m (模数)</span>
            <span class="slider-value" id="valM">4</span>
          </div>
          <input type="range" id="sliderM" min="2" max="8" step="0.5" value="4">
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">显示选项</div>
        <label class="toggle-row"><input type="checkbox" id="showPitch" checked> 分度圆</label>
        <label class="toggle-row"><input type="checkbox" id="showBase" checked> 基圆</label>
        <label class="toggle-row"><input type="checkbox" id="showAddDed" checked> 齿顶圆/齿根圆</label>
        <label class="toggle-row"><input type="checkbox" id="showLineOfAction" checked> 啮合线 + 啮合点</label>
        <label class="toggle-row"><input type="checkbox" id="showPressureAngle" checked> 压力角标注</label>
      </div>

      <div class="panel">
        <div class="panel-title">啮合信息 <span id="undercutWarn" class="warning-badge" style="display:none">根切</span></div>
        <div class="info-grid">
          <div class="info-item">
            <div class="label">传动比 i</div>
            <div class="value" id="infoRatio" style="color:var(--accent2)">—</div>
          </div>
          <div class="info-item">
            <div class="label">中心距 a</div>
            <div class="value" id="infoCenter" style="color:var(--green)">—</div>
          </div>
          <div class="info-item">
            <div class="label">重合度 ε</div>
            <div class="value" id="infoEpsilon" style="color:var(--amber)">—</div>
          </div>
          <div class="info-item">
            <div class="label">压力角 α</div>
            <div class="value" id="infoAlpha" style="color:var(--blue)">20°</div>
          </div>
          <div class="info-item">
            <div class="label">r₁ / r₂</div>
            <div class="value" id="infoR" style="color:var(--text2);font-size:12px">—</div>
          </div>
          <div class="info-item">
            <div class="label">r<sub>b1</sub> / r<sub>b2</sub></div>
            <div class="value" id="infoRb" style="color:var(--text2);font-size:12px">—</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">知识点提示</div>
        <div class="tip" id="tipText">
          渐开线齿轮的齿廓由基圆上的渐开线构成。标准直齿圆柱齿轮的压力角α=20°，模数m为标准值。正确合条件：两齿轮的模数和压力角分别相等。
        </div>
      </div>
    </div>
  </div>

  <footer>机械考研可视化学习平台 · 齿轮合演示</footer>
</div>

<script>
// ===== 渐开线齿轮啮合 — 教材标准图示 =====
const DEG = 180 / Math.PI;
const RAD = Math.PI / 180;
const ALPHA = 20 * RAD;

let z1 = 20, z2 = 30, m = 4;
let theta1 = 0;
let playing = true;
let speed = 0.5;

const canvas = document.getElementById('gearCanvas');
const ctx = canvas.getContext('2d');

const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const speedSlider = document.getElementById('speedSlider');

const sliders = {
  z1: document.getElementById('sliderZ1'),
  z2: document.getElementById('sliderZ2'),
  m: document.getElementById('sliderM'),
};
const vals = {
  z1: document.getElementById('valZ1'),
  z2: document.getElementById('valZ2'),
  m: document.getElementById('valM'),
};

// ===== 齿轮几何计算 =====
function gearParams(z, m, alpha) {
  const r = m * z / 2;
  const rb = r * Math.cos(alpha);
  const ra = r + m;
  const rf = r - 1.25 * m;
  return { z, m, r, rb, ra, rf, alpha };
}

function generateGearProfile(z, m, alpha) {
  const { r, rb, ra, rf } = gearParams(z, m, alpha);
  const invAlpha = Math.tan(alpha) - alpha;
  const toothAngle = 2 * Math.PI / z;
  const halfTooth = Math.PI / (2 * z);
  const psiMax = Math.acos(Math.min(1, rb / Math.max(rb + 0.01, ra)));
  const steps = 18;
  const points = [];
  for (let i = 0; i < z; i++) {
    const center = i * toothAngle;
    for (let s = 0; s <= steps; s++) {
      const psi = (s / steps) * psiMax;
      const ri = rb / Math.cos(psi);
      const angle = center - halfTooth - invAlpha + (Math.tan(psi) - psi);
      points.push({ x: ri * Math.cos(angle), y: ri * Math.sin(angle) });
    }
    const rightTopAngle = center - halfTooth - invAlpha + (Math.tan(psiMax) - psiMax);
    const leftTopAngle = center + halfTooth + invAlpha - (Math.tan(psiMax) - psiMax);
    for (let s = 1; s <= 4; s++) {
      const angle = rightTopAngle + (leftTopAngle - rightTopAngle) * s / 4;
      points.push({ x: ra * Math.cos(angle), y: ra * Math.sin(angle) });
    }
    for (let s = steps; s >= 0; s--) {
      const psi = (s / steps) * psiMax;
      const ri = rb / Math.cos(psi);
      const angle = center + halfTooth + invAlpha - (Math.tan(psi) - psi);
      points.push({ x: ri * Math.cos(angle), y: ri * Math.sin(angle) });
    }
    const leftBaseAngle = center + halfTooth + invAlpha;
    const nextCenter = (i + 1) * toothAngle;
    const nextRightBaseAngle = nextCenter - halfTooth - invAlpha;
    if (rf < rb) {
      points.push({ x: rf * Math.cos(leftBaseAngle), y: rf * Math.sin(leftBaseAngle) });
      for (let s = 1; s <= 4; s++) {
        const angle = leftBaseAngle + (nextRightBaseAngle - leftBaseAngle) * s / 4;
        points.push({ x: rf * Math.cos(angle), y: rf * Math.sin(angle) });
      }
      points.push({ x: rb * Math.cos(nextRightBaseAngle), y: rb * Math.sin(nextRightBaseAngle) });
    } else {
      points.push({ x: rf * Math.cos(leftBaseAngle), y: rf * Math.sin(leftBaseAngle) });
      for (let s = 1; s <= 4; s++) {
        const angle = leftBaseAngle + (nextRightBaseAngle - leftBaseAngle) * s / 4;
        points.push({ x: rf * Math.cos(angle), y: rf * Math.sin(angle) });
      }
    }
  }
  return points;
}

function calcContactRatio(z1, z2, m, alpha) {
  const p1 = gearParams(z1, m, alpha);
  const p2 = gearParams(z2, m, alpha);
  const a = p1.r + p2.r;
  const g1 = Math.sqrt(Math.max(0, p1.ra * p1.ra - p1.rb * p1.rb));
  const g2 = Math.sqrt(Math.max(0, p2.ra * p2.ra - p2.rb * p2.rb));
  const pb = Math.PI * m * Math.cos(alpha);
  const epsilon = (g1 + g2 - a * Math.sin(alpha)) / pb;
  return Math.max(0, epsilon);
}

// ===== 绘制辅助 =====
function resizeCanvas() {
  const container = canvas.parentElement;
  const w = container.clientWidth;
  const h = Math.max(420, Math.min(580, w * 0.75));
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawCircle(cx, cy, radius, color, dash) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.setLineDash(dash || []);
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawGearFilled(cx, cy, profile, scale, fillColor, strokeColor, rotation) {
  if (profile.length < 3) return;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.beginPath();
  ctx.moveTo(profile[0].x * scale, -profile[0].y * scale);
  for (let i = 1; i < profile.length; i++) {
    ctx.lineTo(profile[i].x * scale, -profile[i].y * scale);
  }
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  const holeR = Math.max(3, 4 * scale);
  ctx.beginPath();
  ctx.arc(0, 0, holeR, 0, Math.PI * 2);
  ctx.fillStyle = '#0f1117';
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// ===== 主绘制函数 =====
function draw() {
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  ctx.clearRect(0, 0, W, H);

  const p1 = gearParams(z1, m, ALPHA);
  const p2 = gearParams(z2, m, ALPHA);
  const a = p1.r + p2.r;

  // === 视图：聚焦啮合区域 ===
  const maxRa = Math.max(p1.ra, p2.ra);
  const meshHalfW = maxRa + 1.5 * m;
  const meshHalfH = maxRa * 0.88;
  const scale = Math.min(W / (meshHalfW * 2 * 1.12), H / (meshHalfH * 2 * 1.12));
  const cx = W / 2;
  const cy = H / 2;

  const cx1 = cx - (a * scale) / 2;
  const cy1 = cy;
  const cx2 = cx + (a * scale) / 2;
  const cy2 = cy;

  const theta2 = -theta1 * z1 / z2 + Math.PI / z2;

  const profile1 = generateGearProfile(z1, m, ALPHA);
  const profile2 = generateGearProfile(z2, m, ALPHA);

  const showPitch = document.getElementById('showPitch').checked;
  const showBase = document.getElementById('showBase').checked;
  const showAddDed = document.getElementById('showAddDed').checked;
  const showLoa = document.getElementById('showLineOfAction').checked;
  const showPA = document.getElementById('showPressureAngle').checked;

  // 节点P坐标
  const pitchX = cx1 + (p1.r / a) * (cx2 - cx1);
  const pitchY = cy1;
  const clipX = pitchX; // 裁剪分界线

  // 啮合信息
  const sinA = Math.sin(ALPHA), cosA = Math.cos(ALPHA);
  const g1 = Math.sqrt(Math.max(0, p1.ra * p1.ra - p1.rb * p1.rb));
  const g2 = Math.sqrt(Math.max(0, p2.ra * p2.ra - p2.rb * p2.rb));
  const pb = Math.PI * p1.m * cosA;
  // N1, N2: 啮合线与基圆切点（从P出发沿啮合线方向）
  // N1在P的齿轮1侧（左侧），N2在P的齿轮2侧（右侧）
  const sN1 = -p1.r * sinA; // P到N1的距离（负=左侧）
  const sN2 = p2.r * sinA;  // P到N2的距离（正=右侧）
  // B1, B2: 实际啮合段端点（啮合线与齿顶圆交点）
  const sB1 = p2.r * sinA - g2; // P的左侧
  const sB2 = -p1.r * sinA + g1; // P的右侧
  const Lpath = sB2 - sB1;
  const epsilon = Lpath / pb;

  // 啮合线方向（与中心连线夹角 = π/2 - α，从齿轮1指向齿轮2方向逆时针转）
  const centerAngle = Math.atan2(cy2 - cy1, cx2 - cx1); // = 0（水平向右）
  const loaAngle = centerAngle - (Math.PI / 2 - ALPHA); // 啮合线方向角
  const dx = Math.cos(loaAngle);
  const dy = Math.sin(loaAngle);

  // ===== 1. 完整齿轮轮廓（极淡参考） =====
  ctx.globalAlpha = 0.06;
  drawCircle(cx1, cy1, p1.ra * scale, '#6366f1', [3, 5]);
  drawCircle(cx2, cy2, p2.ra * scale, '#34d399', [3, 5]);
  ctx.globalAlpha = 1;

  // ===== 2. 齿轮1：裁剪右半 =====
  ctx.save();
  ctx.beginPath();
  ctx.rect(clipX - 4, 0, W - clipX + 8, H);
  ctx.clip();
  drawGearFilled(cx1, cy1, profile1, scale,
    'rgba(99,102,241,0.13)', 'rgba(99,102,241,0.75)', theta1);
  ctx.restore();

  // ===== 3. 齿轮2：裁剪左半 =====
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, clipX + 4, H);
  ctx.clip();
  drawGearFilled(cx2, cy2, profile2, scale,
    'rgba(52,211,153,0.13)', 'rgba(52,211,153,0.75)', theta2);
  ctx.restore();

  // ===== 4. 分度圆 =====
  if (showPitch) {
    drawCircle(cx1, cy1, p1.r * scale, 'rgba(99,102,241,0.3)', [6, 4]);
    drawCircle(cx2, cy2, p2.r * scale, 'rgba(52,211,153,0.3)', [6, 4]);
  }

  // ===== 5. 基圆 =====
  if (showBase) {
    drawCircle(cx1, cy1, p1.rb * scale, 'rgba(251,191,24,0.2)', [4, 4]);
    drawCircle(cx2, cy2, p2.rb * scale, 'rgba(251,191,24,0.2)', [4, 4]);
  }

  // ===== 6. 齿顶圆/齿根圆 =====
  if (showAddDed) {
    drawCircle(cx1, cy1, p1.ra * scale, 'rgba(99,102,241,0.12)', [2, 4]);
    drawCircle(cx1, cy1, p1.rf * scale, 'rgba(99,102,241,0.1)', [2, 4]);
    drawCircle(cx2, cy2, p2.ra * scale, 'rgba(52,211,153,0.12)', [2, 4]);
    drawCircle(cx2, cy2, p2.rf * scale, 'rgba(52,211,153,0.1)', [2, 4]);
  }

  // ===== 7. 啮合线 + 标注 =====
  if (showLoa) {
    // 理论啮合线 N1-N2（细虚线）
    ctx.strokeStyle = 'rgba(248,113,113,0.35)';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(pitchX + sN1 * dx * scale, pitchY + sN1 * dy * scale);
    ctx.lineTo(pitchX + sN2 * dx * scale, pitchY + sN2 * dy * scale);
    ctx.stroke();
    ctx.setLineDash([]);

    // 实际啮合段 B1-B2（加粗高亮）
    ctx.strokeStyle = 'rgba(248,113,113,0.6)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    ctx.moveTo(pitchX + sB1 * dx * scale, pitchY + sB1 * dy * scale);
    ctx.lineTo(pitchX + sB2 * dx * scale, pitchY + sB2 * dy * scale);
    ctx.stroke();
    ctx.setLineDash([]);

    // === 关键点标注 ===
    const fontSize = Math.max(12, 13 * Math.min(scale, 1.3));

    // N1 标注
    const n1x = pitchX + sN1 * dx * scale;
    const n1y = pitchY + sN1 * dy * scale;
    ctx.fillStyle = '#60a5fa';
    ctx.beginPath(); ctx.arc(n1x, n1y, 4 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('N₁', n1x - dx * 18 - dy * 10, n1y - dy * 18 + dx * 10);

    // N2 标注
    const n2x = pitchX + sN2 * dx * scale;
    const n2y = pitchY + sN2 * dy * scale;
    ctx.fillStyle = '#60a5fa';
    ctx.beginPath(); ctx.arc(n2x, n2y, 4 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.fillText('N₂', n2x + dx * 18 - dy * 10, n2y + dy * 18 + dx * 10);

    // C (节点) 标注
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.arc(pitchX, pitchY, 4 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.font = `bold ${fontSize}px sans-serif`;
    const perpX = -dy, perpY = dx;
    ctx.fillText('C', pitchX + perpX * 14, pitchY + perpY * 14 + 4);

    // B1, B2 端点标注（小一些）
    const b1x = pitchX + sB1 * dx * scale;
    const b1y = pitchY + sB1 * dy * scale;
    const b2x = pitchX + sB2 * dx * scale;
    const b2y = pitchY + sB2 * dy * scale;
    ctx.fillStyle = 'rgba(248,113,113,0.7)';
    ctx.beginPath(); ctx.arc(b1x, b1y, 2.5 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(b2x, b2y, 2.5 * scale, 0, Math.PI * 2); ctx.fill();
    ctx.font = `${Math.max(10, 11 * Math.min(scale, 1.2))}px sans-serif`;
    ctx.fillStyle = 'rgba(248,113,113,0.8)';
    ctx.fillText('B₁', b1x - perpX * 12, b1y - perpY * 12 + 4);
    ctx.fillText('B₂', b2x + perpX * 12, b2y + perpY * 12 + 4);

    // === 啮合点 E（沿 N1→N2 移动） ===
    // 原理：齿轮1转过 θ₁，基圆弧长 = rb1 × θ₁
    // 啮合点在啮合线上移动距离 = rb1 × θ₁ mod pb
    // 但啮合点只在 [sB1, sB2] 范围内存在
    const phase = ((p1.rb * theta1) % pb + pb) % pb;
    const contactPoints = [];
    for (let k = -1; k < 10; k++) {
      const pos = sB1 + phase + k * pb;
      if (pos > sB2 + 0.01) break;
      if (pos >= sB1 - 0.01) {
        contactPoints.push(pos);
      }
    }

    // 绘制啮合点 E1, E2...
    const eFontSize = Math.max(11, 12 * Math.min(scale, 1.3));
    for (let idx = 0; idx < contactPoints.length; idx++) {
      const s = contactPoints[idx];
      const epx = pitchX + s * dx * scale;
      const epy = pitchY + s * dy * scale;

      // 光晕
      ctx.fillStyle = 'rgba(239, 68, 68, 0.12)';
      ctx.beginPath();
      ctx.arc(epx, epy, 10 * scale, 0, Math.PI * 2);
      ctx.fill();

      // 红色实心圆
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(epx, epy, 4.5 * scale, 0, Math.PI * 2);
      ctx.fill();

      // 白色高光
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.arc(epx - 1.2 * scale, epy - 1.2 * scale, 1.5 * scale, 0, Math.PI * 2);
      ctx.fill();

      // E标签
      const label = contactPoints.length > 1 ? `E${idx + 1}` : 'E';
      ctx.fillStyle = '#ef4444';
      ctx.font = `bold ${eFontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(label, epx + perpX * 16, epy + perpY * 16 + 4);
    }

    // === 压力角标注 ===
    if (showPA) {
      ctx.strokeStyle = 'rgba(251,191,36,0.5)';
      ctx.lineWidth = 1.2;
      ctx.setLineDash([3, 3]);
      const tLen = 30 * scale;
      ctx.beginPath();
      ctx.moveTo(pitchX - tLen, pitchY);
      ctx.lineTo(pitchX + tLen, pitchY);
      ctx.stroke();
      ctx.setLineDash([]);
      const arcR = 24 * scale;
      ctx.beginPath();
      ctx.arc(pitchX, pitchY, arcR, -ALPHA, 0);
      ctx.stroke();
      const labelAngle = -ALPHA / 2;
      ctx.fillStyle = '#fbbf24';
      ctx.font = `${Math.max(12, 13 * Math.min(scale, 1.2))}px sans-serif`;
      ctx.fillText('α', pitchX + (arcR + 12) * Math.cos(labelAngle),
                         pitchY + (arcR + 12) * Math.sin(labelAngle));
    }

    // === 基圆半径标注 r_b1, r_b2（从圆心到基圆切点N的方向） ===
    // N1是齿轮1基圆上的切点，从O1到N1的连线 = 基圆半径r_b1方向
    // 但N1已经在啮合线上标了，这里只在齿轮1侧画r_b1箭头
    const rbFontSize = Math.max(11, 12 * Math.min(scale, 1.2));
    // r_b1: 从O1画一条到基圆的线，方向朝向N1（即啮合线方向的反向延长到基圆）
    // O1到N1的距离就是 r_b1 / cos(90-α)... 不对
    // N1是啮合线与齿轮1基圆的切点，所以 O1N1 = r_b1，且 O1N1  啮合线
    // 从O1到N1的方向：垂直于合线
    const o1ToN1_angle = loaAngle - Math.PI / 2; // 垂直于啮合线
    const rb1EndX = cx1 + p1.rb * Math.cos(o1ToN1_angle) * scale;
    const rb1EndY = cy1 - p1.rb * Math.sin(o1ToN1_angle) * scale;
    ctx.strokeStyle = 'rgba(99,102,241,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(cx1, cy1);
    ctx.lineTo(rb1EndX, rb1EndY);
    ctx.stroke();
    // 箭头
    const arrLen = 7 * scale;
    const headAngle = Math.atan2(cy1 - rb1EndY, cx1 - rb1EndX);
    ctx.fillStyle = 'rgba(99,102,241,0.7)';
    ctx.beginPath();
    ctx.moveTo(rb1EndX, rb1EndY);
    ctx.lineTo(rb1EndX + arrLen * Math.cos(headAngle - 0.4), rb1EndY + arrLen * Math.sin(headAngle - 0.4));
    ctx.lineTo(rb1EndX + arrLen * Math.cos(headAngle + 0.4), rb1EndY + arrLen * Math.sin(headAngle + 0.4));
    ctx.closePath();
    ctx.fill();
    // r_b1标签
    ctx.fillStyle = 'rgba(99,102,241,0.9)';
    ctx.font = `bold ${rbFontSize}px sans-serif`;
    ctx.textAlign = 'center';
    const midX1 = (cx1 + rb1EndX) / 2;
    const midY1 = (cy1 + rb1EndY) / 2;
    ctx.fillText('r_b1', midX1 - 18 * Math.sin(o1ToN1_angle), midY1 - 18 * Math.cos(o1ToN1_angle) - 4);

    // r_b2: 从O2到N2
    const o2ToN2_angle = loaAngle + Math.PI / 2;
    const rb2EndX = cx2 + p2.rb * Math.cos(o2ToN2_angle) * scale;
    const rb2EndY = cy2 - p2.rb * Math.sin(o2ToN2_angle) * scale;
    ctx.strokeStyle = 'rgba(52,211,153,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx2, cy2);
    ctx.lineTo(rb2EndX, rb2EndY);
    ctx.stroke();
    const headAngle2 = Math.atan2(cy2 - rb2EndY, cx2 - rb2EndX);
    ctx.fillStyle = 'rgba(52,211,153,0.7)';
    ctx.beginPath();
    ctx.moveTo(rb2EndX, rb2EndY);
    ctx.lineTo(rb2EndX + arrLen * Math.cos(headAngle2 - 0.4), rb2EndY + arrLen * Math.sin(headAngle2 - 0.4));
    ctx.lineTo(rb2EndX + arrLen * Math.cos(headAngle2 + 0.4), rb2EndY + arrLen * Math.sin(headAngle2 + 0.4));
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(52,211,153,0.9)';
    ctx.font = `bold ${rbFontSize}px sans-serif`;
    const midX2 = (cx2 + rb2EndX) / 2;
    const midY2 = (cy2 + rb2EndY) / 2;
    ctx.fillText('r_b2', midX2 + 18 * Math.sin(o2ToN2_angle), midY2 + 18 * Math.cos(o2ToN2_angle) - 4);
  }

  // ===== 8. 圆心标注 =====
  ctx.strokeStyle = 'rgba(99,102,241,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx1 - 4*scale, cy1); ctx.lineTo(cx1 + 4*scale, cy1);
  ctx.moveTo(cx1, cy1 - 4*scale); ctx.lineTo(cx1, cy1 + 4*scale);
  ctx.stroke();
  ctx.fillStyle = 'rgba(99,102,241,0.8)';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('O₁', cx1, cy1 + 18 * scale);

  ctx.strokeStyle = 'rgba(52,211,153,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx2 - 4*scale, cy2); ctx.lineTo(cx2 + 4*scale, cy2);
  ctx.moveTo(cx2, cy2 - 4*scale); ctx.lineTo(cx2, cy2 + 4*scale);
  ctx.stroke();
  ctx.fillStyle = 'rgba(52,211,153,0.8)';
  ctx.fillText('O₂', cx2, cy2 + 18 * scale);

  // 中心距连线
  ctx.strokeStyle = 'rgba(100,116,139,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx1, cy1); ctx.lineTo(cx2, cy2);
  ctx.stroke();
  ctx.setLineDash([]);

  // 中心距标注
  ctx.fillStyle = 'rgba(100,116,139,0.5)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`a = ${a.toFixed(1)}`, cx, cy - maxRa * scale * 0.88 - 8);

  // 旋转方向箭头
  if (playing) {
    drawRotationArrow(cx1, cy1, p1, scale, 1);
    drawRotationArrow(cx2, cy2, p2, scale, -1);
  }
}

function drawRotationArrow(cx, cy, p, scale, dir) {
  const arrowR = Math.min(Math.abs(p.rf) * scale - 6, 28);
  if (arrowR < 10) return;
  ctx.strokeStyle = 'rgba(228,228,231,0.3)';
  ctx.lineWidth = 1.5;
  if (dir > 0) {
    const s = -0.3, e = 1.0;
    ctx.beginPath();
    ctx.arc(cx, cy, arrowR, s, e);
    ctx.stroke();
    const tipX = cx + arrowR * Math.cos(e);
    const tipY = cy + arrowR * Math.sin(e);
    const back = 0.3, spread = 2 * scale;
    ctx.fillStyle = 'rgba(228,228,231,0.5)';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(cx + (arrowR + spread) * Math.cos(e - back), cy + (arrowR + spread) * Math.sin(e - back));
    ctx.lineTo(cx + (arrowR - spread) * Math.cos(e - back), cy + (arrowR - spread) * Math.sin(e - back));
    ctx.closePath();
    ctx.fill();
  } else {
    const s = Math.PI + 0.3, e = Math.PI - 1.0;
    ctx.beginPath();
    ctx.arc(cx, cy, arrowR, s, e, true);
    ctx.stroke();
    const tipX = cx + arrowR * Math.cos(e);
    const tipY = cy + arrowR * Math.sin(e);
    const back = 0.3, spread = 2 * scale;
    ctx.fillStyle = 'rgba(228,228,231,0.5)';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(cx + (arrowR + spread) * Math.cos(e + back), cy + (arrowR + spread) * Math.sin(e + back));
    ctx.lineTo(cx + (arrowR - spread) * Math.cos(e + back), cy + (arrowR - spread) * Math.sin(e + back));
    ctx.closePath();
    ctx.fill();
  }
}

// ===== 信息面板 =====
function updateInfo() {
  const p1 = gearParams(z1, m, ALPHA);
  const p2 = gearParams(z2, m, ALPHA);
  const a = p1.r + p2.r;
  const mesh = { epsilon: calcContactRatio(z1, z2, m, ALPHA) };
  const ratio = z2 / z1;

  document.getElementById('infoRatio').textContent = ratio.toFixed(2);
  document.getElementById('infoCenter').textContent = a.toFixed(1);
  document.getElementById('infoAlpha').textContent = (ALPHA * DEG).toFixed(0) + '°';

  const epsEl = document.getElementById('infoEpsilon');
  epsEl.textContent = mesh.epsilon.toFixed(3);
  epsEl.style.color = mesh.epsilon < 1 ? '#f87171' : mesh.epsilon < 1.2 ? '#fbbf24' : '#34d399';

  document.getElementById('infoR').textContent = `${p1.r.toFixed(1)} / ${p2.r.toFixed(1)}`;
  document.getElementById('infoRb').textContent = `${p1.rb.toFixed(1)} / ${p2.rb.toFixed(1)}`;

  const zMin = Math.ceil(2 / (Math.sin(ALPHA) * Math.sin(ALPHA)));
  const hasUndercut = z1 < zMin || z2 < zMin;
  document.getElementById('undercutWarn').style.display = hasUndercut ? 'inline-block' : 'none';

  const tipEl = document.getElementById('tipText');
  if (hasUndercut) {
    tipEl.textContent = `⚠️ 齿数小于z_min=${zMin}（α=20°），会产生根切。避免方法：①增加齿数 ②正变位。`;
  } else if (mesh.epsilon < 1) {
    tipEl.textContent = `⚠️ 重合度ε=${mesh.epsilon.toFixed(3)} < 1，无法连续传动！增大齿数可提高ε。`;
  } else {
    tipEl.textContent = `正确啮合条件：m₁=m₂，α₁=α₂。传动比i=z₂/z₁=${ratio.toFixed(2)}，中心距a=${a.toFixed(1)}。重合度ε=${mesh.epsilon.toFixed(3)}，ε>1表示部分时间有2对齿同时接触。啮合点E沿啮合线N₁N₂移动，在B₁B₂段内为实际啮合区。`;
  }
}

// ===== 事件 =====
function updateSliders() {
  z1 = parseInt(sliders.z1.value);
  z2 = parseInt(sliders.z2.value);
  m = parseFloat(sliders.m.value);
  vals.z1.textContent = z1;
  vals.z2.textContent = z2;
  vals.m.textContent = m;
  updateInfo();
}
Object.values(sliders).forEach(s => s.addEventListener('input', updateSliders));

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '暂停' : '播放';
});

resetBtn.addEventListener('click', () => {
  theta1 = 0;
  z1 = 20; z2 = 30; m = 4;
  sliders.z1.value = z1; sliders.z2.value = z2; sliders.m.value = m;
  vals.z1.textContent = z1; vals.z2.textContent = z2; vals.m.textContent = m;
  updateInfo();
});

speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); });

// ===== 动画循环 =====
let lastTime = 0;
let animId = null;
function animate(time) {
  if (playing) {
    const dt = lastTime ? (time - lastTime) / 1000 : 0.016;
    theta1 += speed * 0.8 * dt;
  }
  lastTime = time;
  draw();
  animId = requestAnimationFrame(animate);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
updateInfo();
animId = requestAnimationFrame(animate);
</script>
