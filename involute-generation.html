<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渐开线形成过程 — 机械考研可视化</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0f1117;color:#e4e4e7;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
    h1{font-size:28px;font-weight:600;margin-bottom:8px;background:linear-gradient(135deg,#6366f1,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    p{color:#71717a;font-size:14px;margin-bottom:20px}
    a{color:#6366f1;text-decoration:none}
    .main-container { max-width: 1000px; width: 100%; }
    .demo-section { background: #0f172a; border-radius: 12px; padding: 16px; }
    canvas { display: block; margin: 0 auto; background: #1e293b; border-radius: 8px; cursor: pointer; }
    .controls { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
    .controls button { padding: 8px 18px; border: none; border-radius: 6px; background: #3b82f6; color: #fff; cursor: pointer; font-size: 14px; }
    .controls button:hover { background: #2563eb; }
    .controls button.active { background: #f97316; }
    .param-group { background: #1e293b; border-radius: 8px; padding: 14px; margin-top: 12px; }
    .param-group label { color: #94a3b8; font-size: 13px; display: block; margin-bottom: 4px; }
    .param-group input[type="range"] { width: 100%; accent-color: #3b82f6; }
    .param-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .param-row .param-group { flex: 1; min-width: 200px; }
    .info-box { background: #1e293b; border-left: 3px solid #3b82f6; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-top: 12px; font-size: 14px; color: #cbd5e1; line-height: 1.8; }
    .info-box strong { color: #60a5fa; }
    .legend { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 10px; font-size: 13px; color: #94a3b8; }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .legend .dot { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
    @media (max-width: 768px) {
      .param-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <h1>📐 渐开线形成过程</h1>
    <p>直观展示一条直线在基圆上纯滚动时，直线上任一点描绘出渐开线的过程</p>

    <div class="demo-section">
      <canvas id="canvas"></canvas>

      <div class="legend">
        <span><i class="dot" style="background:#3b82f6"></i> 基圆</span>
        <span><i class="dot" style="background:#64748b"></i> 发生线（直线）</span>
        <span><i class="dot" style="background:#f97316"></i> 渐开线轨迹</span>
        <span><i class="dot" style="background:#a855f7"></i> 动点 K</span>
      </div>

      <div class="controls">
        <button id="btnPlay">▶ 播放</button>
        <button id="btnPause">⏸ 暂停</button>
        <button id="btnReset">⏹ 重置</button>
      </div>

      <div class="param-row">
        <div class="param-group">
          <label>展开进度：<span id="progressVal">0%</span></label>
          <input type="range" id="progress" min="0" max="100" value="0">
        </div>
        <div class="param-group">
          <label>基圆半径 r<sub>b</sub>：<span id="rbVal">80</span> mm</label>
          <input type="range" id="rbSlider" min="40" max="120" value="80">
        </div>
      </div>
    </div>

    <div class="info-box">
      <strong>渐开线定义：</strong>一条直线在一个圆上作纯滚动时，直线上任一点的轨迹。<br><br>
      <strong>关键性质：</strong><br>
      ① 发生线在基圆上滚过的长度 = 基圆上被滚过的弧长<br>
      ② 发生线始终与基圆相切<br>
      ③ 渐开线上任一点的法线切于基圆<br>
      ④ 渐开线形状仅取决于基圆大小<br>
      ⑤ 基圆内无渐开线<br><br>
      <strong>齿轮应用：</strong>标准齿轮的齿廓就是由两条反向渐开线组成的。渐开线齿廓能保证定传动比传动。
    </div>

    <p style="text-align:center;margin-top:12px;"><a href="index.html">← 返回首页</a></p>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const PI = Math.PI, TAU = 2 * PI;

// UI elements
const btnPlay = document.getElementById('btnPlay');
const btnPause = document.getElementById('btnPause');
const btnReset = document.getElementById('btnReset');
const progressSlider = document.getElementById('progress');
const progressVal = document.getElementById('progressVal');
const rbSlider = document.getElementById('rbSlider');
const rbVal = document.getElementById('rbVal');

// Parameters
let rb = 80;      // base circle radius (mm)
let tMax = 2.5;   // max展开 angle (radians) — controls how much involute to draw
let progress = 0; // 0 to 1
let playing = false;
let animId = null;
let scale = 1;
let cx, cy;       // canvas center

function resize() {
  const w = canvas.parentElement.clientWidth - 32;
  const h = Math.min(w * 0.7, 500);
  canvas.width = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  scale = Math.min(w, h) / 350;
  cx = canvas.width / 2;
  cy = canvas.height / 2;
  draw();
}

// Involute of a circle: x = rb*(cos(t) + t*sin(t)), y = rb*(sin(t) - t*cos(t))
function involutePoint(t, rbVal) {
  return {
    x: rbVal * (Math.cos(t) + t * Math.sin(t)),
    y: rbVal * (Math.sin(t) - t * Math.cos(t))
  };
}

function draw() {
  const dpr = devicePixelRatio;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();

  const rbS = rb * scale * dpr / 100; // scaled base circle radius in px
  const tCur = progress * tMax;        // current展开 angle

  // === 1. Base circle ===
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2 * dpr;
  ctx.setLineDash([4 * dpr, 3 * dpr]);
  ctx.beginPath();
  ctx.arc(cx, cy, rbS, 0, TAU);
  ctx.stroke();
  ctx.setLineDash([]);

  // Base circle fill (subtle)
  ctx.fillStyle = 'rgba(59,130,246,0.06)';
  ctx.beginPath();
  ctx.arc(cx, cy, rbS, 0, TAU);
  ctx.fill();

  // Center dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, 3 * dpr, 0, TAU);
  ctx.fill();
  ctx.font = `${12 * dpr}px sans-serif`;
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('O', cx + 6 * dpr, cy - 6 * dpr);

  // Label rb
  ctx.strokeStyle = 'rgba(59,130,246,0.5)';
  ctx.lineWidth = 1 * dpr;
  ctx.setLineDash([3 * dpr, 2 * dpr]);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + rbS, cy);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#60a5fa';
  ctx.font = `${11 * dpr}px sans-serif`;
  ctx.fillText('r_b', cx + rbS / 2 - 8 * dpr, cy - 6 * dpr);

  if (progress > 0.001) {
    // === 2. Involute curve (trail) ===
    ctx.strokeStyle = '#f97316';
    ctx.lineWidth = 2.5 * dpr;
    ctx.beginPath();
    const steps = Math.max(2, Math.floor(tCur / 0.02));
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * tCur;
      const pt = involutePoint(t, rbS);
      const sx = cx + pt.x;
      const sy = cy - pt.y; // flip y for canvas
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // === 3. Generating line (发生线) — tangent to base circle at current position ===
    // The generating line at展开 angle tCur:
    // Tangent point on base circle: (rb*cos(tCur), rb*sin(tCur))
    // The line extends from tangent point, perpendicular to radius at tangent point
    // Length of unwound portion = rb * tCur
    const tanAngle = tCur; // angle of tangent point on base circle
    const tanX = cx + rbS * Math.cos(tanAngle);
    const tanY = cy - rbS * Math.sin(tanAngle);
    
    // Current point K on involute
    const ptK = involutePoint(tCur, rbS);
    const kx = cx + ptK.x;
    const ky = cy - ptK.y;

    // The generating line goes from tangent point to K, and extends beyond
    // Direction: from tangent point to K
    const lineLen = rbS * tCur; // length of unwound line
    
    // Direction of the line (perpendicular to radius at tangent point)
    const dirX = Math.cos(tanAngle + PI / 2); // perpendicular to radius
    const dirY = -Math.sin(tanAngle + PI / 2); // flip y

    // Actually, the tangent point is at angle tanAngle on the base circle.
    // The generating line is tangent to the base circle at this point.
    // It goes from the tangent point in the direction perpendicular to the radius.
    // The K point is at the end of the unwound portion.

    // Let me recalculate properly:
    // Tangent point B on base circle at angle tCur:
    //   Bx = rb*cos(tCur), By = rb*sin(tCur)
    // The tangent direction (perpendicular to OB, in the direction of rolling):
    //   dx = -sin(tCur), dy = cos(tCur) ... but we need the direction of unwinding
    
    // For the involute: the generating line at parameter t touches the base circle at angle t.
    // The tangent point is (rb*cos(t), rb*sin(t)).
    // The line extends from the tangent point to K = (rb*(cos(t)+t*sin(t)), rb*(sin(t)-t*cos(t))).
    // Direction from tangent point to K:
    //   K - B = (rb*t*sin(t), -rb*t*cos(t)) → direction (sin(t), -cos(t))
    // This is perpendicular to the radius at B = (cos(t), sin(t)), which is correct (tangent).

    const bDirX = Math.sin(tCur);  // direction from B to K (in math coords)
    const bDirY = -Math.cos(tCur); // (flip y for canvas)

    // Draw the full generating line (extend beyond K for visual clarity)
    const extLen = rbS * tCur + 30 * dpr; // extend a bit
    const lineStartX = tanX - bDirX * 15 * dpr;
    const lineStartY = tanY - bDirY * (-15 * dpr);
    // Actually let me just draw from tangent point through K and a bit beyond
    
    // Simpler: line from tangent point B to K, plus a bit of extension
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 1.5 * dpr;
    ctx.setLineDash([6 * dpr, 3 * dpr]);
    ctx.beginPath();
    // Extend backward from tangent point
    ctx.moveTo(tanX - bDirX * 20 * dpr, tanY + bDirY * 20 * dpr);
    ctx.lineTo(kx, ky);
    // Extend forward from K a little
    ctx.lineTo(kx + bDirX * 15 * dpr, ky - bDirY * 15 * dpr);
    ctx.stroke();
    ctx.setLineDash([]);

    // Solid portion: from tangent point to K (the unwound portion)
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    ctx.moveTo(tanX, tanY);
    ctx.lineTo(kx, ky);
    ctx.stroke();

    // === 4. Tangent point B (on base circle) ===
    ctx.fillStyle = '#10b981';
    ctx.beginPath();
    ctx.arc(tanX, tanY, 4 * dpr, 0, TAU);
    ctx.fill();
    ctx.fillStyle = '#10b981';
    ctx.font = `bold ${12 * dpr}px sans-serif`;
    ctx.fillText('N', tanX + 8 * dpr, tanY - 8 * dpr);

    // === 5. Point K (on involute) ===
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(kx, ky, 4 * dpr, 0, TAU);
    ctx.fill();
    ctx.font = `bold ${12 * dpr}px sans-serif`;
    ctx.fillText('K', kx + 8 * dpr, ky - 6 * dpr);

    // === 6. Labels ===
    // Label: 发生线 (at midpoint of solid line)
    const midX = (tanX + kx) / 2;
    const midY = (tanY + ky) / 2;
    ctx.fillStyle = '#94a3b8';
    ctx.font = `${11 * dpr}px sans-serif`;
    ctx.fillText('发生线', midX + 10 * dpr, midY + 4 * dpr);

    // Label: 渐开线 (near the curve midpoint)
    const midT = tCur / 2;
    const midPt = involutePoint(midT, rbS);
    ctx.fillStyle = '#f97316';
    ctx.font = `${12 * dpr}px sans-serif`;
    ctx.fillText('渐开线', cx + midPt.x + 10 * dpr, cy - midPt.y);

    // Show arc length = line length annotation
    // Arc on base circle from angle 0 to tCur
    ctx.strokeStyle = 'rgba(249,115,22,0.5)';
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    // In canvas, y is flipped, so arc goes clockwise (anticlockwise=false) from 0 to -tCur
    ctx.arc(cx, cy, rbS, 0, -tCur, true);
    ctx.stroke();

    // Label arc length = NK
    if (tCur > 0.3) {
      const arcMidAngle = -tCur / 2;
      const arcLabelR = rbS + 14 * dpr;
      ctx.fillStyle = '#f97316';
      ctx.font = `${10 * dpr}px sans-serif`;
      ctx.fillText('弧长 = NK', cx + Math.cos(arcMidAngle) * arcLabelR, cy + Math.sin(arcMidAngle) * arcLabelR);
    }

    // Show angle tCur
    if (tCur > 0.2) {
      ctx.strokeStyle = 'rgba(168,85,247,0.6)';
      ctx.lineWidth = 1 * dpr;
      ctx.beginPath();
      ctx.arc(cx, cy, rbS * 0.3, 0, -tCur, true);
      ctx.stroke();
      ctx.fillStyle = '#a855f7';
      ctx.font = `${10 * dpr}px sans-serif`;
      const angLabelR = rbS * 0.3 + 12 * dpr;
      const angMid = -tCur / 2;
      ctx.fillText('θ', cx + Math.cos(angMid) * angLabelR, cy + Math.sin(angMid) * angLabelR);
    }

  }

  ctx.restore();
}

// Animation
function animate() {
  if (!playing) return;
  progress += 0.003;
  if (progress > 1) {
    progress = 1;
    playing = false;
    btnPlay.classList.remove('active');
  }
  progressSlider.value = Math.round(progress * 100);
  progressVal.textContent = Math.round(progress * 100) + '%';
  draw();
  if (playing) animId = requestAnimationFrame(animate);
}

// Events
btnPlay.addEventListener('click', () => {
  if (progress >= 1) progress = 0;
  playing = true;
  btnPlay.classList.add('active');
  animate();
});

btnPause.addEventListener('click', () => {
  playing = false;
  btnPlay.classList.remove('active');
});

btnReset.addEventListener('click', () => {
  playing = false;
  progress = 0;
  progressSlider.value = 0;
  progressVal.textContent = '0%';
  btnPlay.classList.remove('active');
  draw();
});

progressSlider.addEventListener('input', () => {
  progress = parseInt(progressSlider.value) / 100;
  progressVal.textContent = progressSlider.value + '%';
  draw();
});

rbSlider.addEventListener('input', () => {
  rb = parseInt(rbSlider.value);
  rbVal.textContent = rb;
  draw();
});

// Init
window.addEventListener('resize', () => {
  cancelAnimationFrame(animId);
  requestAnimationFrame(resize);
});
resize();
</script>
</body>
</html>
