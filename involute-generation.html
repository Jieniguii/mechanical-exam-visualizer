<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>渐开线形成过程 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch5-gear.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>渐开线形成过程 <span class="version-badge">v2.1</span></h1>
  <p>直线在基圆上纯滚动，动点 K 描绘出渐开线</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
const PI = Math.PI, TAU = 2 * PI;
const DEG = 180 / PI;

// ===== 模块状态 =====
let R = 90;
const tMax = 2.2;
let progress = 0;
let ox, oy;

// ===== Canvas + 动画 =====
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
const anim = Mech.createAnimator(
  dt => {
    progress += 0.15 * dt;
    if (progress > 1) { progress = 1; anim.pause(); playBtn.textContent = '▶ 播放'; }
    progSlider.set(progress * 100);
  },
  () => draw()
);

// ===== 绘制 =====
function getLayout() {
  const { w, h } = getDimensions();
  ox = w * 0.40;
  oy = h * 0.70;
  return { w, h };
}

function draw() {
  const { w, h } = getLayout();
  ctx.clearRect(0, 0, w, h);
  const C = Mech.colors;
  const tCur = progress * tMax;

  // 基圆
  Mech.draw.circle(ctx, ox, oy, R, { color: C.accent, width: 2, dash: [6, 4], fill: 'rgba(99,102,241,0.04)' });

  // 圆心 O
  Mech.draw.point(ctx, ox, oy, { color: '#fff', r: 3.5 });
  Mech.draw.text(ctx, 'O', ox - 14, oy + 5, { color: C.text });

  // A 点
  const ax = ox + R, ay = oy;
  Mech.draw.point(ctx, ax, ay, { color: C.warning, r: 4.5 });
  Mech.draw.text(ctx, 'A', ax + 8, ay + 5, { color: C.warning, align: 'left' });

  // r_b 连线
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(ox, oy); ctx.lineTo(ax, ay); ctx.stroke();
  Mech.draw.arrow(ctx, ox, oy, ax, ay, { color: '#60a5fa', size: 10 });
  Mech.draw.text(ctx, 'r_b', (ox + ax) / 2, oy - 8, { color: '#60a5fa', font: 'italic 12px sans-serif' });

  if (tCur > 0.02) {
    const nx = ox + R * Math.cos(tCur);
    const ny = oy - R * Math.sin(tCur);
    const kx = ox + R * (Math.cos(tCur) + tCur * Math.sin(tCur));
    const ky = oy - R * (Math.sin(tCur) - tCur * Math.cos(tCur));

    // 渐开线轨迹
    ctx.strokeStyle = C.orange;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const steps = Math.max(20, Math.floor(tCur / 0.008));
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * tCur;
      const px = ox + R * (Math.cos(t) + t * Math.sin(t));
      const py = oy - R * (Math.sin(t) - t * Math.cos(t));
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // 基圆上滚过的弧
    ctx.strokeStyle = 'rgba(249,115,22,0.4)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(ox, oy, R, 0, -tCur, true);
    ctx.stroke();

    // 发生线 n-n
    const dirX = Math.sin(tCur), dirY = Math.cos(tCur);
    const ext = 60;
    Mech.draw.dashedLine(ctx, nx - dirX * ext, ny - dirY * ext, kx + dirX * ext * 0.6, ky + dirY * ext * 0.6, { color: C.textDim, width: 1.8, dash: [6, 4] });
    Mech.draw.text(ctx, 'n', nx - dirX * ext * 0.7 - 10, ny - dirY * ext * 0.7, { color: C.textDim, font: 'italic bold 13px sans-serif' });
    Mech.draw.text(ctx, 'n', kx + dirX * ext * 0.45 + 10, ky + dirY * ext * 0.45, { color: C.textDim, font: 'italic bold 13px sans-serif' });

    // ON 连线
    Mech.draw.dashedLine(ctx, ox, oy, nx, ny, { color: 'rgba(52,211,153,0.5)', width: 1.2, dash: [3, 3] });

    // r_k 连线
    ctx.strokeStyle = C.purple;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(ox, oy); ctx.lineTo(kx, ky); ctx.stroke();
    Mech.draw.arrow(ctx, ox, oy, kx, ky, { color: C.purple, size: 10 });
    const rkMx = (ox + kx) / 2, rkMy = (oy + ky) / 2;
    const rkPerpX = -(ky - oy), rkPerpY = (kx - ox);
    const rkPerpLen = Math.sqrt(rkPerpX * rkPerpX + rkPerpY * rkPerpY) || 1;
    Mech.draw.text(ctx, 'r_k', rkMx + rkPerpX / rkPerpLen * 14, rkMy + rkPerpY / rkPerpLen * 14, { color: '#c084fc', font: 'italic 12px sans-serif' });

    // m-m 线
    const okDx = Math.cos(tCur) + tCur * Math.sin(tCur);
    const okDy = -(Math.sin(tCur) - tCur * Math.cos(tCur));
    const okLen = Math.sqrt(okDx * okDx + okDy * okDy);
    const mmDirX = okDy / okLen, mmDirY = -okDx / okLen;
    const mLen = 55;
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(kx - mmDirX * mLen, ky - mmDirY * mLen);
    ctx.lineTo(kx + mmDirX * mLen, ky + mmDirY * mLen);
    ctx.stroke();
    Mech.draw.text(ctx, 'm', kx + mmDirX * (mLen + 12), ky + mmDirY * (mLen + 12), { color: '#ef4444', font: 'italic bold 13px sans-serif' });
    Mech.draw.text(ctx, 'm', kx - mmDirX * (mLen + 12), ky - mmDirY * (mLen + 12), { color: '#ef4444', font: 'italic bold 13px sans-serif' });

    // N 点
    Mech.draw.point(ctx, nx, ny, { color: C.return, r: 4.5 });
    Mech.draw.text(ctx, 'N', nx - 8, ny - 6, { color: C.return, align: 'right' });

    // K 点
    Mech.draw.point(ctx, kx, ky, { color: C.purple, r: 5 });
    Mech.draw.text(ctx, 'K', kx + 10, ky - 6, { color: '#c084fc', align: 'left' });

    // θ_k 弧
    const okAngle = Math.atan2(ky - oy, kx - ox);
    const thetaArcR = 28;
    if (okAngle < 0) {
      Mech.draw.arc(ctx, ox, oy, thetaArcR, okAngle, 0, false, { color: C.purple, width: 1.5 });
    } else {
      Mech.draw.arc(ctx, ox, oy, thetaArcR, 0, okAngle, false, { color: C.purple, width: 1.5 });
    }
    const thetaMid = okAngle / 2;
    Mech.draw.text(ctx, 'θ_k', ox + (thetaArcR + 14) * Math.cos(thetaMid), oy + (thetaArcR + 14) * Math.sin(thetaMid), { color: '#c084fc', font: '12px sans-serif' });

    // α_k 弧
    const nnAngle = Math.atan2(dirY, dirX);
    const mmAngle1 = Math.atan2(mmDirY, mmDirX);
    const mmAngle2 = Math.atan2(-mmDirY, -mmDirX);
    let diff1 = mmAngle1 - nnAngle;
    while (diff1 > PI) diff1 -= TAU;
    while (diff1 < -PI) diff1 += TAU;
    let diff2 = mmAngle2 - nnAngle;
    while (diff2 > PI) diff2 -= TAU;
    while (diff2 < -PI) diff2 += TAU;
    const a1 = nnAngle;
    const a2 = Math.abs(diff1) < Math.abs(diff2) ? mmAngle1 : mmAngle2;
    const diff = Math.abs(diff1) < Math.abs(diff2) ? diff1 : diff2;
    const alphaArcR = 22;
    if (diff > 0) {
      Mech.draw.arc(ctx, kx, ky, alphaArcR, a1, a2, false, { color: C.warning, width: 1.8 });
    } else {
      Mech.draw.arc(ctx, kx, ky, alphaArcR, a1, a2, true, { color: C.warning, width: 1.8 });
    }
    const alphaMid = a1 + diff / 2;
    Mech.draw.text(ctx, 'α_k', kx + (alphaArcR + 14) * Math.cos(alphaMid), ky + (alphaArcR + 14) * Math.sin(alphaMid), { color: C.warning, font: '13px sans-serif' });

    // 更新数据面板
    const rk = R * Math.sqrt(1 + tCur * tCur);
    const alphaK = Math.atan(tCur) * DEG;
    const thetaK = (tCur - Math.atan(tCur)) * DEG;
    dataRefs.t.textContent = tCur.toFixed(2);
    dataRefs.rk.textContent = rk.toFixed(1);
    dataRefs.alpha.textContent = alphaK.toFixed(1) + '°';
    dataRefs.theta.textContent = thetaK.toFixed(1) + '°';
  } else {
    dataRefs.t.textContent = '0.00';
    dataRefs.rk.textContent = R.toFixed(1);
    dataRefs.alpha.textContent = '0.0°';
    dataRefs.theta.textContent = '0.0°';
  }
}

// ===== UI 构建 =====
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, {
  text: '▶ 播放', variant: 'primary',
  onClick: () => {
    if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
    else {
      if (progress >= 1) { progress = 0; }
      anim.play(); playBtn.textContent = '⏸ 暂停';
    }
  }
});

const sidebar = document.getElementById('sidebar');

const paramPanel = Mech.ui.panel(sidebar, '参数控制');
progSlider = Mech.ui.sidebarSlider(paramPanel, {
  label: '展开进度', min: 0, max: 100, value: 0,
  format: v => Math.round(v) + '%',
  onChange: v => { progress = v / 100; anim.pause(); playBtn.textContent = '▶ 播放'; draw(); }
});
Mech.ui.sidebarSlider(paramPanel, {
  label: '基圆半径 r_b', min: 50, max: 140, value: 90,
  onChange: v => { R = v; draw(); }
});

const dataPanel = Mech.ui.panel(sidebar, '实时数据');
const dataRefs = Mech.ui.infoPanel(dataPanel, [
  { id: 't', label: '展开角 t (rad)', initial: '0.00' },
  { id: 'rk', label: '向径 r_k', initial: '90.0' },
  { id: 'alpha', label: '压力角 α_k', initial: '0.0°' },
  { id: 'theta', label: '展角 θ_k', initial: '0.0°' },
]);

const legendPanel = Mech.ui.panel(sidebar, '图例');
Mech.ui.legend(legendPanel, [
  { color: Mech.colors.accent, label: '基圆' },
  { color: Mech.colors.textDim, label: '发生线 n-n' },
  { color: Mech.colors.orange, label: '渐开线' },
  { color: Mech.colors.purple, label: '向径 r_k' },
  { color: '#ef4444', label: '速度方向 m-m' },
  { color: Mech.colors.return, label: '切点 N' },
  { color: Mech.colors.warning, label: '压力角 α_k' },
]);

const tipPanel = Mech.ui.panel(sidebar, '知识点');
const tipBox = document.createElement('div');
tipBox.className = 'tip';
tipBox.innerHTML =
  '<strong style="color:#818cf8">渐开线定义：</strong>一条直线在一个圆上作纯滚动时，直线上任一点 K 的轨迹即为渐开线。<br><br>' +
  '<strong style="color:#818cf8">关键性质：</strong><br>' +
  '① 发生线在基圆上滚过的长度 = 基圆上被滚过的弧长（NK = AN）<br>' +
  '② 发生线 n-n 始终与基圆相切于 N 点，即 K 点的法线<br>' +
  '③ 渐开线上任一点的法线必切于基圆<br>' +
  '④ 渐开线形状仅取决于基圆大小<br>' +
  '⑤ 基圆以内无渐开线<br>' +
  '⑥ 压力角 α_k = arctan(t)，向径 r_k = r_b·√(1+t²)<br><br>' +
  '<strong style="color:#818cf8">齿轮应用：</strong>标准齿轮齿廓由两条反向渐开线组成，渐开线齿廓能保证定传动比传动。';
tipPanel.appendChild(tipBox);

// ===== 启动 =====
window.addEventListener('resize', () => draw());
draw();
console.log('v2.1 loaded (new layout with mech.css + mech.js)');
</script>
</body>
</html>
