<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>平面四杆机构交互演示 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch3-linkage.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>平面四杆机构交互演示 <span class="version-badge">v2.0</span></h1>
  <p>调节参数，观察机构运动 — 机械考研可视化学习</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="dead-point-indicator" id="deadPoint">⚠ 死点位置</div>
        <div class="canvas-toolbar" id="toolbar"></div>
        <div id="legend" style="padding:0 14px 8px;"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
// ===== 常量 =====
const DEG = 180 / Math.PI;
const RAD = Math.PI / 180;

// ===== 模块状态 =====
const params = { a: 80, b: 200, c: 160, d: 220, speed: 1 };
let theta2 = 0;
let showTrace = false;
let tracePoints = [];
let oscillateDir = 1;
let validRange = { fullRotation: true, min: 0, max: 2 * Math.PI };

// ===== Canvas + 动画 =====
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
const anim = Mech.createAnimator(
    dt => {
        if (validRange.fullRotation) {
            theta2 += params.speed * 1.5 * dt;
            if (theta2 > Math.PI * 2) theta2 -= Math.PI * 2;
        } else {
            theta2 += params.speed * 1.5 * dt * oscillateDir;
            if (theta2 >= validRange.max) { theta2 = validRange.max; oscillateDir = -1; }
            if (theta2 <= validRange.min) { theta2 = validRange.min; oscillateDir = 1; }
        }
        if (showTrace) {
            const result = solveFourBar(params.a, params.b, params.c, params.d, theta2);
            if (result) {
                tracePoints.push({ x: result.Cx, y: result.Cy });
                if (tracePoints.length > 2000) tracePoints.shift();
            }
        }
    },
    () => draw()
);

// ===== 运动学求解（模块特有）=====
function canCrankRotate(a, b, c, d) {
    for (let deg = 0; deg < 360; deg++) {
        const theta = deg * RAD;
        const Bx = a * Math.cos(theta);
        const By = a * Math.sin(theta);
        const BD = Math.sqrt((d - Bx) * (d - Bx) + By * By);
        if (BD > b + c + 0.5 || BD < Math.abs(b - c) - 0.5) return false;
    }
    return true;
}

function findValidRange(a, b, c, d) {
    if (canCrankRotate(a, b, c, d))
        return { fullRotation: true, min: 0, max: 2 * Math.PI };
    let validDegs = [];
    for (let deg = 0; deg < 360; deg++) {
        const theta = deg * RAD;
        const Bx = a * Math.cos(theta);
        const By = a * Math.sin(theta);
        const BD = Math.sqrt((d - Bx) * (d - Bx) + By * By);
        if (BD <= b + c + 0.5 && BD >= Math.abs(b - c) - 0.5 && BD > 0.5)
            validDegs.push(deg);
    }
    if (validDegs.length === 0) return { fullRotation: false, min: 0, max: 0 };
    let ranges = [], start = validDegs[0], prev = validDegs[0];
    for (let i = 1; i < validDegs.length; i++) {
        if (validDegs[i] - prev > 2) {
            ranges.push({ min: start * RAD, max: prev * RAD });
            start = validDegs[i];
        }
        prev = validDegs[i];
    }
    ranges.push({ min: start * RAD, max: prev * RAD });
    let best = ranges[0];
    for (const r of ranges) if (r.max - r.min > best.max - best.min) best = r;
    return { fullRotation: false, min: best.min, max: best.max };
}

function solveFourBar(a, b, c, d, theta2) {
    const Bx = a * Math.cos(theta2);
    const By = a * Math.sin(theta2);
    const BDx = d - Bx, BDy = -By;
    const BD = Math.sqrt(BDx * BDx + BDy * BDy);
    if (BD > b + c || BD < Math.abs(b - c) || BD < 1e-6) return null;
    const phi = Math.atan2(BDy, BDx);
    const cosBeta = (BD * BD + b * b - c * c) / (2 * BD * b);
    if (Math.abs(cosBeta) > 1) return null;
    const beta = Math.acos(Math.max(-1, Math.min(1, cosBeta)));
    const theta3 = phi + beta;
    const Cx = Bx + b * Math.cos(theta3);
    const Cy = By + b * Math.sin(theta3);
    const theta4 = Math.atan2(Cy, Cx - d);
    let gamma = Math.abs(theta3 - theta4);
    if (gamma > Math.PI) gamma = 2 * Math.PI - gamma;
    if (gamma > Math.PI / 2) gamma = Math.PI - gamma;
    return { Bx, By, Cx, Cy, gamma, theta3, theta4 };
}

function classifyFourBar(a, b, c, d) {
    const lengths = [a, b, c, d].sort((x, y) => x - y);
    const s = lengths[0], l = lengths[3], p = lengths[1], q = lengths[2];
    const grashof = (s + l) <= (p + q);
    if (!grashof) return { type: '双摇杆机构', cls: 'type-double-rocker', grashof: false };
    const minLen = Math.min(a, b, c, d);
    if (minLen === a) return { type: '曲柄摇杆机构', cls: 'type-crank-rocker', grashof: true };
    if (minLen === d) return { type: '双曲柄机构', cls: 'type-double-crank', grashof: true };
    if (minLen === b) return { type: '双摇杆机构', cls: 'type-double-rocker', grashof: true };
    return { type: '曲柄摇杆机构', cls: 'type-crank-rocker', grashof: true };
}

function calcExtremePositions(a, b, c, d) {
    const results = [];
    for (const BD of [b + a, b - a]) {
        if (BD <= 0 || BD > c + d || BD < Math.abs(c - d)) continue;
        const cosAlpha = (BD * BD + d * d - c * c) / (2 * BD * d);
        if (Math.abs(cosAlpha) > 1) continue;
        const alpha = Math.acos(Math.max(-1, Math.min(1, cosAlpha)));
        results.push({ x: BD * Math.cos(alpha), y: BD * Math.sin(alpha) });
    }
    return results;
}

function calcK(a, b, c, d) {
    const extremes = calcExtremePositions(a, b, c, d);
    if (extremes.length < 2) return { kTheta: 0, k: 1 };
    const [p1, p2] = extremes;
    const angle1 = Math.atan2(p1.y, p1.x - d);
    const angle2 = Math.atan2(p2.y, p2.x - d);
    let kTheta = Math.abs(angle1 - angle2);
    if (kTheta > Math.PI) kTheta = 2 * Math.PI - kTheta;
    const K = (180 + kTheta * DEG) / (180 - kTheta * DEG);
    return { kTheta: kTheta * DEG, k: K };
}

// ===== 绘制 =====
function getScale(w, h) {
    const maxDim = Math.max(params.a + params.b, params.d + params.c, params.a + params.d) * 1.15;
    const scale = Math.min(w, h) / maxDim;
    return { scale, cx: w * 0.45, cy: h * 0.55 };
}

function draw() {
    const { w, h } = getDimensions();
    ctx.clearRect(0, 0, w, h);
    const { scale, cx, cy } = getScale(w, h);
    const C = Mech.colors;

    Mech.draw.grid(ctx, cx, cy, w, h, scale);

    const result = solveFourBar(params.a, params.b, params.c, params.d, theta2);
    if (!result) {
        Mech.draw.text(ctx, '当前参数无法构成四杆机构', w / 2, h / 2,
            { color: '#f87171', font: '16px sans-serif' });
        return;
    }
    const { Bx, By, Cx, Cy, gamma } = result;

    const tx = x => cx + x * scale;
    const ty = y => cy - y * scale;
    const Ax = tx(0), Ay = ty(0);
    const Bxp = tx(Bx), Byp = ty(By);
    const Cxp = tx(Cx), Cyp = ty(Cy);
    const Dx = tx(params.d), Dy = ty(0);

    // 轨迹
    if (showTrace && tracePoints.length > 1) {
        ctx.strokeStyle = 'rgba(99,102,241,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < tracePoints.length; i++) {
            const p = tracePoints[i];
            const px = tx(p.x), py = ty(p.y);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
    }

    // 摆动范围弧（摇杆模式）
    if (!validRange.fullRotation && validRange.max > validRange.min) {
        const arcR2 = 30 * scale;
        Mech.draw.dashedArc(ctx, Ax, Ay, arcR2, -validRange.max, -validRange.min, false,
            { color: 'rgba(251,191,36,0.25)', width: 3, dash: [4, 4] });
        for (const limitAngle of [validRange.min, validRange.max]) {
            const lbx = params.a * Math.cos(limitAngle);
            const lby = params.a * Math.sin(limitAngle);
            const lResult = solveFourBar(params.a, params.b, params.c, params.d, limitAngle);
            if (lResult) {
                Mech.draw.dashedLine(ctx, Ax, Ay, tx(lbx), ty(lby),
                    { color: 'rgba(251,191,36,0.15)', width: 2, dash: [6, 6] });
                Mech.draw.dashedLine(ctx, tx(lbx), ty(lby), tx(lResult.Cx), ty(lResult.Cy),
                    { color: 'rgba(251,191,36,0.15)', width: 2, dash: [6, 6] });
                Mech.draw.dashedLine(ctx, Dx, Dy, tx(lResult.Cx), ty(lResult.Cy),
                    { color: 'rgba(251,191,36,0.15)', width: 2, dash: [6, 6] });
            }
        }
    }

    // 类型判定
    const mechType = classifyFourBar(params.a, params.b, params.c, params.d);
    let roleA_label, roleC_label;
    if (mechType.type === '曲柄摇杆机构') { roleA_label = '曲柄'; roleC_label = '摇杆'; }
    else if (mechType.type === '双曲柄机构') { roleA_label = '曲柄'; roleC_label = '曲柄'; }
    else { roleA_label = '摇杆'; roleC_label = '摇杆'; }

    // 杆件（带标签）
    Mech.draw.link(ctx, Ax, Ay, Dx, Dy, { color: C.hinge, width: 3, label: `d=${params.d} 机架` });
    Mech.draw.link(ctx, Ax, Ay, Bxp, Byp, { color: C.accent, width: 4, label: `a=${params.a} ${roleA_label}` });
    Mech.draw.link(ctx, Bxp, Byp, Cxp, Cyp, { color: C.return, width: 4, label: `b=${params.b} 连杆` });
    Mech.draw.link(ctx, Dx, Dy, Cxp, Cyp, { color: C.warning, width: 4, label: `c=${params.c} ${roleC_label}` });

    // 铰支座
    Mech.draw.hingedSupport(ctx, Ax, Ay);
    Mech.draw.hingedSupport(ctx, Dx, Dy);

    // 铰链点
    Mech.draw.fixedHinge(ctx, Ax, Ay, { r: 6 });
    Mech.draw.fixedHinge(ctx, Dx, Dy, { r: 6 });
    Mech.draw.hinge(ctx, Bxp, Byp, { color: C.accent, r: 5 });
    Mech.draw.hinge(ctx, Cxp, Cyp, { color: C.return, r: 5 });

    // 传动角弧
    const arcR = 25 * scale;
    const angleCD = Math.atan2(Dy - Cyp, Dx - Cxp);
    const angleCB = Math.atan2(Byp - Cyp, Bxp - Cxp);
    const gammaDeg = gamma * DEG;
    Mech.draw.arc(ctx, Cxp, Cyp, arcR, Math.min(angleCD, angleCB), Math.max(angleCD, angleCB), false,
        { color: gammaDeg < 40 ? '#f87171' : 'rgba(52,211,153,0.6)', width: 2 });

    // 标签
    Mech.draw.text(ctx, 'A', Ax, Ay + 28);
    Mech.draw.text(ctx, 'D', Dx, Dy + 28);
    Mech.draw.text(ctx, 'B', Bxp + 14, Byp - 14, { color: C.accent, align: 'left' });
    Mech.draw.text(ctx, 'C', Cxp + 14, Cyp - 14, { color: C.return, align: 'left' });

    // 更新信息面板
    ui.infoGamma.textContent = gammaDeg.toFixed(1) + '°';
    ui.infoTheta.textContent = (((theta2 * DEG) % 360 + 360) % 360).toFixed(1) + '°';
    ui.infoGamma.style.color = gammaDeg < 40 ? '#f87171' : gammaDeg < 50 ? '#fbbf24' : '#34d399';
    ui.deadPoint.style.display = gammaDeg < 5 ? 'block' : 'none';
}

// ===== 分类更新 =====
function updateClassification() {
    const result = classifyFourBar(params.a, params.b, params.c, params.d);
    ui.typeBadge.textContent = result.type;
    ui.typeBadge.className = 'type-badge ' + result.cls;

    validRange = findValidRange(params.a, params.b, params.c, params.d);
    if (!validRange.fullRotation) {
        if (theta2 < validRange.min) theta2 = validRange.min;
        if (theta2 > validRange.max) theta2 = validRange.max;
    }

    let roleA, roleC;
    if (result.type === '曲柄摇杆机构') { roleA = '曲柄'; roleC = '摇杆'; }
    else if (result.type === '双曲柄机构') { roleA = '曲柄'; roleC = '曲柄'; }
    else { roleA = '摇杆'; roleC = '摇杆'; }

    ui.legendEl.innerHTML = `
        <div class="legend">
            <span class="legend-item"><span class="legend-dot" style="background:${Mech.colors.accent}"></span>${roleA} (a)</span>
            <span class="legend-item"><span class="legend-dot" style="background:${Mech.colors.return}"></span>连杆 (b)</span>
            <span class="legend-item"><span class="legend-dot" style="background:${Mech.colors.warning}"></span>${roleC} (c)</span>
            <span class="legend-item"><span class="legend-dot" style="background:${Mech.colors.hinge}"></span>机架 (d)</span>
        </div>`;

    ui.sliderRefs.a.labelSpan.textContent = `a (${roleA})`;
    ui.sliderRefs.c.labelSpan.textContent = `c (${roleC})`;
    ui.thetaLabel.textContent = validRange.fullRotation ? '曲柄角度 θ' : '输入角度 θ';

    const { kTheta, k } = calcK(params.a, params.b, params.c, params.d);
    ui.infoKTheta.textContent = kTheta.toFixed(1) + '°';
    ui.infoK.textContent = k.toFixed(2);

    if (!result.grashof)
        ui.tip.textContent = '不满足格拉肖夫条件（最短杆+最长杆 > 其余两杆之和），无曲柄存在，为双摇杆机构。两连架杆只能摆动，不能整周转动。';
    else if (result.type === '曲柄摇杆机构')
        ui.tip.textContent = '曲柄摇杆机构：最短杆为曲柄且满足格拉肖夫条件。曲柄做整周转动，摇杆往复摆动。注意传动角γ不应过小（一般≥40°），否则传力效果差。';
    else if (result.type === '双曲柄机构')
        ui.tip.textContent = '双曲柄机构：最短杆为机架，两连架杆都能做整周转动。常见应用：火车车轮联动机构、平行四边形机构。';
    else
        ui.tip.textContent = '双摇杆机构（满足格拉肖夫条件但最短杆为连杆）：两连架杆都只能摆动。典型应用：电风扇摇头机构、汽车转向梯形机构。';
}

// ===== UI 构建 =====
const ui = { deadPoint: document.getElementById('deadPoint') };

// 工具栏
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, {
    text: '⏸ 暂停', variant: 'primary',
    onClick: () => {
        if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
        else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
    }
});
Mech.ui.button(toolbar, {
    text: '重置', variant: 'secondary',
    onClick: () => {
        theta2 = 0; oscillateDir = 1; tracePoints = [];
        params.a = 80; params.b = 200; params.c = 160; params.d = 220;
        ui.sliderRefs.a.set(80); ui.sliderRefs.b.set(200);
        ui.sliderRefs.c.set(160); ui.sliderRefs.d.set(220);
        updateClassification(); draw();
    }
});
const traceBtn = Mech.ui.button(toolbar, {
    text: '轨迹', variant: 'secondary',
    onClick: () => {
        showTrace = !showTrace;
        traceBtn.textContent = showTrace ? '轨迹 ✓' : '轨迹';
        if (!showTrace) tracePoints = [];
    }
});
Mech.ui.slider(toolbar, {
    label: '转速', min: 0.1, max: 3, value: 1, step: 0.1,
    format: v => v.toFixed(1) + 'x',
    onChange: v => { params.speed = v; }
});

// 侧边栏
const sidebar = document.getElementById('sidebar');

// 杆长参数面板
const paramPanel = Mech.ui.panel(sidebar, '杆长参数');
ui.sliderRefs = {};
ui.sliderRefs.a = Mech.ui.sidebarSlider(paramPanel, {
    label: 'a (曲柄)', min: 20, max: 200, value: 80,
    onChange: v => { params.a = v; tracePoints = []; updateClassification(); draw(); }
});
ui.sliderRefs.b = Mech.ui.sidebarSlider(paramPanel, {
    label: 'b (连杆)', min: 40, max: 300, value: 200,
    onChange: v => { params.b = v; tracePoints = []; updateClassification(); draw(); }
});
ui.sliderRefs.c = Mech.ui.sidebarSlider(paramPanel, {
    label: 'c (摇杆)', min: 40, max: 300, value: 160,
    onChange: v => { params.c = v; tracePoints = []; updateClassification(); draw(); }
});
ui.sliderRefs.d = Mech.ui.sidebarSlider(paramPanel, {
    label: 'd (机架)', min: 40, max: 350, value: 220,
    onChange: v => { params.d = v; tracePoints = []; updateClassification(); draw(); }
});

// 机构信息面板
const infoPanel = Mech.ui.panel(sidebar, '机构信息');
const infoHeader = document.createElement('div');
infoHeader.style.marginBottom = '8px';
infoHeader.innerHTML = `<span class="slider-label">类型：</span><span class="type-badge type-crank-rocker" id="typeBadge">曲柄摇杆</span>`;
infoPanel.appendChild(infoHeader);
ui.typeBadge = infoHeader.querySelector('#typeBadge');

const infoGrid = document.createElement('div');
infoGrid.className = 'info-grid';
infoGrid.innerHTML = `
    <div class="info-item"><div class="label" id="thetaLabel">曲柄角度 θ</div><div class="value" id="infoTheta" style="color:var(--accent)">—</div></div>
    <div class="info-item"><div class="label">传动角 γ</div><div class="value" id="infoGamma" style="color:var(--success)">—</div></div>
    <div class="info-item"><div class="label">极位夹角 θ'</div><div class="value" id="infoKTheta" style="color:var(--warning)">—</div></div>
    <div class="info-item"><div class="label">行程速比 K</div><div class="value" id="infoK" style="color:#60a5fa">—</div></div>`;
infoPanel.appendChild(infoGrid);
ui.thetaLabel = infoGrid.querySelector('#thetaLabel');
ui.infoTheta = infoGrid.querySelector('#infoTheta');
ui.infoGamma = infoGrid.querySelector('#infoGamma');
ui.infoKTheta = infoGrid.querySelector('#infoKTheta');
ui.infoK = infoGrid.querySelector('#infoK');

// 知识点提示面板
const tipPanel = Mech.ui.panel(sidebar, '知识点提示');
ui.tip = document.createElement('div');
ui.tip.className = 'tip';
tipPanel.appendChild(ui.tip);

// 图例容器
ui.legendEl = document.getElementById('legend');

// ===== 拖拽交互 =====
let dragging = false;
canvas.addEventListener('mousedown', () => { if (!anim.isPlaying()) dragging = true; });
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });
canvas.addEventListener('mousemove', (e) => {
    if (!dragging || anim.isPlaying()) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const { w, h } = getDimensions();
    const { cx, cy } = getScale(w, h);
    let angle = Math.atan2(-(my - cy), mx - cx);
    if (angle < 0) angle += 2 * Math.PI;
    if (!validRange.fullRotation)
        angle = Math.max(validRange.min, Math.min(validRange.max, angle));
    theta2 = angle;
    draw();
});

// 触摸支持
canvas.addEventListener('touchstart', (e) => {
    if (!anim.isPlaying()) { dragging = true; e.preventDefault(); }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });
canvas.addEventListener('touchmove', (e) => {
    if (!dragging || anim.isPlaying()) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const mx = touch.clientX - rect.left;
    const my = touch.clientY - rect.top;
    const { w, h } = getDimensions();
    const { cx, cy } = getScale(w, h);
    let angle = Math.atan2(-(my - cy), mx - cx);
    if (angle < 0) angle += 2 * Math.PI;
    if (!validRange.fullRotation)
        angle = Math.max(validRange.min, Math.min(validRange.max, angle));
    theta2 = angle;
    draw();
}, { passive: false });

// ===== 启动 =====
window.addEventListener('resize', () => draw());
updateClassification();
anim.play();
console.log('v2.0 loaded (refactored with mech.css + mech.js)');
</script>
</body>
</html>
