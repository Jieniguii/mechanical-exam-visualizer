<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>自由度计算器 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
<style>
.calc-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}
.calc-result {
  text-align: center;
  margin-bottom: 24px;
  padding: 20px;
  background: rgba(99, 102, 241, 0.06);
  border: 1px solid rgba(99, 102, 241, 0.15);
  border-radius: 12px;
}
.calc-result .f-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.calc-result .f-value {
  font-size: 48px;
  font-weight: 700;
  line-height: 1.2;
}
.calc-result .f-value.pos { color: var(--success); }
.calc-result .f-value.zero { color: var(--warning); }
.calc-result .f-value.neg { color: #f87171; }
.calc-result .f-meaning {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 8px;
}
.calc-formula {
  margin: 16px 0;
  padding: 14px;
  background: rgba(255,255,255,0.02);
  border-radius: 10px;
  font-size: 14px;
  line-height: 2;
  color: var(--text);
  text-align: center;
  font-family: 'Cambria Math', 'Times New Roman', serif;
}
.calc-formula .step { display: block; }
.calc-formula .dim { color: var(--text-dim); }
.calc-formula .accent { color: var(--accent); }
.calc-formula .work { color: var(--work-color); }
.calc-formula .orange { color: var(--orange); }
.calc-formula .warn { color: var(--warning); }
.calc-formula .green { color: var(--success); }
.calc-formula .divider {
  border-top: 1px solid rgba(255,255,255,0.08);
  margin: 8px 0;
}
.corrections-box {
  margin-top: 12px;
  padding: 12px;
  background: rgba(251, 191, 36, 0.06);
  border: 1px solid rgba(251, 191, 36, 0.15);
  border-radius: 10px;
}
.corrections-box .corr-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--warning);
  margin-bottom: 8px;
}
.corrections-box .corr-item {
  font-size: 13px;
  color: var(--text);
  line-height: 1.8;
}
.corrections-box .corr-detail {
  font-size: 12px;
  color: var(--text-dim);
  margin-left: 12px;
}
.param-section {
  margin-bottom: 20px;
}
.param-section h3 {
  font-size: 14px;
  color: var(--text);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.sub-options {
  display: none;
  margin-left: 20px;
  margin-top: 8px;
}
.sub-options.show { display: block; }
.tip-box {
  margin-top: 20px;
  padding: 14px;
  background: rgba(99, 102, 241, 0.05);
  border: 1px solid rgba(99, 102, 241, 0.12);
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  white-space: pre-wrap;
}
.reset-btn {
  display: block;
  margin: 20px auto 0;
  padding: 8px 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<a href="ch1-structure.html" class="back-btn">&larr; 返回章节</a>

<div class="header">
  <h1>自由度计算器 <span class="version-badge">v2.0</span></h1>
  <p>F = 3n &minus; 2P<sub>L</sub> &minus; P<sub>H</sub> &minus; F' + P<sub>v</sub></p>
</div>

<div class="calc-card">
  <!-- Result -->
  <div class="calc-result" id="resultBox">
    <div class="f-label">机构自由度</div>
    <div class="f-value pos" id="fValue">F = 1</div>
    <div class="f-meaning" id="fMeaning">机构具有确定运动（原动件数 = 自由度 = 1）</div>
  </div>

  <!-- Formula derivation -->
  <div class="calc-formula" id="formulaBox"></div>

  <!-- Parameters -->
  <div class="param-section">
    <h3>基本参数</h3>
    <div id="basicParams"></div>
  </div>

  <div class="param-section">
    <h3>特殊情况修正</h3>
    <div id="specialParams"></div>
  </div>

  <!-- Tips -->
  <div class="tip-box" id="tipBox"></div>

  <button class="reset-btn" id="resetBtn">重置参数</button>
</div>

<script src="mech.js"></script>
<script>
/* ===== 自由度计算器 v2.0 — 纯HTML/CSS计算器，无画布 ===== */

var state = {
  n: 3, PL: 4, PH: 0,
  compoundHinge: false,
  localDOF: false,
  virtualConstraint: false,
  compoundM: 3,
  localDOFCount: 1,
  virtualCount: 1,
};

var basicParams = document.getElementById('basicParams');
var specialParams = document.getElementById('specialParams');

// --- Basic param sliders ---
var nSlider = Mech.ui.sidebarSlider(basicParams, {
  label: '活动构件数 n', min: 1, max: 10, value: 3,
  onChange: function(v) { state.n = v; update(); }
});
var plSlider = Mech.ui.sidebarSlider(basicParams, {
  label: '低副数 P_L', min: 0, max: 15, value: 4,
  onChange: function(v) { state.PL = v; update(); }
});
var phSlider = Mech.ui.sidebarSlider(basicParams, {
  label: '高副数 P_H', min: 0, max: 10, value: 0,
  onChange: function(v) { state.PH = v; update(); }
});

// --- Special case toggles ---
var compoundCb = Mech.ui.checkbox(specialParams, {
  label: '复合铰链', checked: false,
  onChange: function(v) { state.compoundHinge = v; toggleSub('compound', v); update(); }
});
var compoundWrap = document.createElement('div');
compoundWrap.className = 'sub-options';
specialParams.appendChild(compoundWrap);
var compoundSlider = Mech.ui.sidebarSlider(compoundWrap, {
  label: '汇交构件数 m', min: 3, max: 6, value: 3,
  onChange: function(v) { state.compoundM = v; update(); }
});

var localCb = Mech.ui.checkbox(specialParams, {
  label: '局部自由度', checked: false,
  onChange: function(v) { state.localDOF = v; toggleSub('local', v); update(); }
});
var localWrap = document.createElement('div');
localWrap.className = 'sub-options';
specialParams.appendChild(localWrap);
var localSlider = Mech.ui.sidebarSlider(localWrap, {
  label: "局部自由度数 F'", min: 1, max: 3, value: 1,
  onChange: function(v) { state.localDOFCount = v; update(); }
});

var virtualCb = Mech.ui.checkbox(specialParams, {
  label: '虚约束', checked: false,
  onChange: function(v) { state.virtualConstraint = v; toggleSub('virtual', v); update(); }
});
var virtualWrap = document.createElement('div');
virtualWrap.className = 'sub-options';
specialParams.appendChild(virtualWrap);
var virtualSlider = Mech.ui.sidebarSlider(virtualWrap, {
  label: '虚约束数', min: 1, max: 3, value: 1,
  onChange: function(v) { state.virtualCount = v; update(); }
});

function toggleSub(type, show) {
  var map = { compound: compoundWrap, local: localWrap, virtual: virtualWrap };
  if (show) { map[type].classList.add('show'); }
  else { map[type].classList.remove('show'); }
}

// --- Calculate ---
function calcDOF() {
  var n = state.n, PL = state.PL, PH = state.PH;
  var corrections = [];
  if (state.compoundHinge) {
    var add = state.compoundM - 2;
    PL += add;
    corrections.push({
      text: '复合铰链: ' + state.compoundM + '个构件汇交 = ' + (state.compoundM - 1) + '个转动副',
      detail: 'P_L +' + add + ' (原计1个，补' + add + '个)'
    });
  }
  var Fl = 0;
  if (state.localDOF) {
    Fl = state.localDOFCount;
    corrections.push({
      text: "局部自由度: F' = " + Fl,
      detail: 'F - ' + Fl + ' (滚子自转等不影响整体运动)'
    });
  }
  var Pv = 0;
  if (state.virtualConstraint) {
    Pv = state.virtualCount;
    corrections.push({
      text: '虚约束: ' + Pv + '个',
      detail: 'F + ' + Pv + ' (重复约束，加回)'
    });
  }
  var F = 3 * n - 2 * PL - PH - Fl + Pv;
  return { n: n, PL: PL, PH: PH, F: F, Fl: Fl, Pv: Pv, corrections: corrections };
}

// --- Update display ---
function update() {
  var r = calcDOF();
  var fVal = document.getElementById('fValue');
  var fMeaning = document.getElementById('fMeaning');
  var formulaBox = document.getElementById('formulaBox');
  var tipBox = document.getElementById('tipBox');

  // F value
  fVal.textContent = 'F = ' + r.F;
  fVal.className = 'f-value ' + (r.F > 0 ? 'pos' : r.F === 0 ? 'zero' : 'neg');

  // Meaning
  if (r.F > 0) {
    fMeaning.textContent = '机构具有确定运动（需 ' + r.F + ' 个原动件）';
  } else if (r.F === 0) {
    fMeaning.textContent = '静定结构，各构件间无相对运动';
  } else {
    fMeaning.textContent = '超静定结构，约束冗余';
  }

  // Formula derivation
  var html = '';
  html += '<span class="step">F = 3n &minus; 2P<sub>L</sub> &minus; P<sub>H</sub></span>';
  html += '<span class="step dim">= 3 &times; <span class="accent">' + r.n + '</span> &minus; 2 &times; <span class="work">' + r.PL + '</span> &minus; <span class="orange">' + r.PH + '</span></span>';
  html += '<span class="step">= <span class="accent">' + (3 * r.n) + '</span> &minus; <span class="work">' + (2 * r.PL) + '</span> &minus; <span class="orange">' + r.PH + '</span></span>';
  var baseF = 3 * r.n - 2 * r.PL - r.PH;
  html += '<span class="step dim">= ' + baseF + '</span>';

  if (r.corrections.length > 0) {
    html += '<div class="divider"></div>';
    html += '<span class="step warn">特殊情况修正:</span>';
    r.corrections.forEach(function(c) {
      html += '<span class="step warn">' + c.text + '</span>';
      html += '<span class="step dim" style="font-size:12px">' + c.detail + '</span>';
    });
    html += '<div class="divider"></div>';
    html += '<span class="step green" style="font-size:18px;font-weight:700">F = ' + r.F + '</span>';
  }

  formulaBox.innerHTML = html;

  // Tips
  var tip = '';
  if (r.F === 1) {
    tip = '当前 F=1，机构具有确定运动（原动件数 = 自由度 = 1），这是最常见的机构形式。';
  } else if (r.F > 1) {
    tip = '当前 F=' + r.F + '，机构自由度大于1，需要 ' + r.F + ' 个原动件才能具有确定运动。';
  } else if (r.F === 0) {
    tip = '当前 F=0，机构为静定结构，各构件间无相对运动可能。';
  } else {
    tip = '当前 F=' + r.F + '，机构为超静定结构，约束数多于独立运动参数。';
  }
  if (state.compoundHinge) {
    tip += '\n\n复合铰链: ' + state.compoundM + '个构件汇交构成复合铰链时，计算为' + (state.compoundM - 1) + '个转动副（非1个）。漏算会导致自由度结果偏大。';
  }
  if (state.localDOF) {
    tip += "\n\n局部自由度: 滚子等构件的局部转动不影响机构整体运动，计算时应减去。常见于凸轮机构的滚子从动件。";
  }
  if (state.virtualConstraint) {
    tip += '\n\n虚约束: 对运动不起独立限制作用的重复约束应去除。常见情况: 两构件构成多个同向移动副; 轴线重合的多个转动副; 对称结构中的重复部分。';
  }
  tipBox.textContent = tip;
}

// --- Reset ---
document.getElementById('resetBtn').addEventListener('click', function() {
  state.n = 3; state.PL = 4; state.PH = 0;
  state.compoundHinge = false; state.localDOF = false; state.virtualConstraint = false;
  state.compoundM = 3; state.localDOFCount = 1; state.virtualCount = 1;
  nSlider.set(3); plSlider.set(4); phSlider.set(0);
  compoundCb.set(false); localCb.set(false); virtualCb.set(false);
  toggleSub('compound', false); toggleSub('local', false); toggleSub('virtual', false);
  update();
});

update();
console.log('freedom-calculator v2.0 loaded');
</script>
</body>
</html>
