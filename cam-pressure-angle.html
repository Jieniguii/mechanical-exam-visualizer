<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>凸轮压力角动态变化 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch4-cam.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>凸轮压力角动态变化 <span class="version-badge">v2.0</span></h1>
  <p>分步骤展示压力角的标注过程，直观理解压力角如何随凸轮转角变化</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
const PI = Math.PI;

// ===== 模块状态 =====
let r0 = 40, h = 25, e = 0, followerType = 'knife';
let delta = 0;
let currentStep = 0;
let localProfile = [];

// ===== Canvas + 动画 =====
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
const anim = Mech.createAnimator(
  dt => { delta = (delta + 30 * dt) % 360; },
  () => draw()
);

// ===== 运动规律：简谐运动（模块特有）=====
function motionLaw(deg) {
  const d = ((deg % 360) + 360) % 360;
  const p1 = 120, p2 = 60, p3 = 120, p4 = 60;
  if (d < p1) return h * (1 - Math.cos(PI * d / p1)) / 2;
  if (d < p1 + p2) return h;
  if (d < p1 + p2 + p3) return h * (1 + Math.cos(PI * (d - p1 - p2) / p3)) / 2;
  return 0;
}
function motionDeriv(deg) {
  const d = ((deg % 360) + 360) % 360;
  const p1 = 120, p2 = 60, p3 = 120, p4 = 60;
  if (d < p1) return h * PI * Math.sin(PI * d / p1) / (2 * p1);
  if (d < p1 + p2) return 0;
  if (d < p1 + p2 + p3) return -h * PI * Math.sin(PI * (d - p1 - p2) / p3) / (2 * p3);
  return 0;
}

// ===== 凸轮廓线计算（反转法，局部坐标）=====
function calcLocalProfile() {
  localProfile = [];
  for (let i = 0; i <= 360; i++) {
    const s = motionLaw(i);
    const a = i * PI / 180;
    const sinA = Math.sin(a), cosA = Math.cos(a);
    let lx, ly;
    if (followerType === 'flat') {
      const dsRad = motionDeriv(i) * (180 / PI);
      const total = r0 + s;
      lx = -total * sinA - dsRad * cosA;
      ly = total * cosA - dsRad * sinA;
    } else if (followerType === 'roller') {
      const rr = 8;
      const s0 = Math.sqrt((r0 + rr) * (r0 + rr) - e * e);
      const total = s0 + s;
      const xn = -total * sinA - e * cosA;
      const yn = total * cosA - e * sinA;
      const len = Math.sqrt(xn * xn + yn * yn);
      lx = xn - rr * xn / len;
      ly = yn - rr * yn / len;
    } else {
      const s0 = Math.sqrt(r0 * r0 - e * e);
      const total = s0 + s;
      lx = -total * sinA - e * cosA;
      ly = total * cosA - e * sinA;
    }
    localProfile.push({ lx, ly, s, deg: i });
  }
}

function localToCanvas(lx, ly, rotDeg, cx, cy, scale) {
  const a = rotDeg * PI / 180;
  const cosA = Math.cos(a), sinA = Math.sin(a);
  const px = lx * scale, py = -ly * scale;
  return { x: cx + px * cosA - py * sinA, y: cy + px * sinA + py * cosA };
}

function getContactAndNormal(angle, cx, cy, scale) {
  const idx = Math.round(((angle % 360) + 360) % 360);
  const pt = localProfile[idx];
  const contact = localToCanvas(pt.lx, pt.ly, angle, cx, cy, scale);
  const idx2 = (idx + 1) % localProfile.length;
  const idx0 = (idx - 1 + localProfile.length) % localProfile.length;
  const pt2 = localProfile[idx2], pt0 = localProfile[idx0];
  const tlx = pt2.lx - pt0.lx, tly = pt2.ly - pt0.ly;
  const tlen = Math.sqrt(tlx * tlx + tly * tly);
  let nlx = -tly / tlen, nly = tlx / tlen;
  if (nlx * pt.lx + nly * pt.ly < 0) { nlx = -nlx; nly = -nly; }
  const a = angle * PI / 180;
  const cosA = Math.cos(a), sinA = Math.sin(a);
  const ncx = nlx * scale, ncy = -nly * scale;
  let gnx = ncx * cosA - ncy * sinA;
  let gny = ncx * sinA + ncy * cosA;
  const gnLen = Math.sqrt(gnx * gnx + gny * gny);
  gnx /= gnLen; gny /= gnLen;
  return { contact, normal: { x: gnx, y: gny }, s: pt.s };
}

function calcPressureAngle(angle) {
  if (followerType === 'flat') return 0;
  // 不调用 getDimensions()，因为重设 canvas.width 会清空画布
  // normal 是方向向量（已归一化），与 cx/cy/scale 无关
  const { normal } = getContactAndNormal(angle, 0, 0, 1);
  const ds = motionDeriv(angle);
  const vy = ds >= 0 ? -1 : 1;
  return Math.acos(Math.min(1, Math.max(-1, Math.abs(normal.y * vy)))) * 180 / PI;
}

// ===== 布局 =====
function getScale(w, h) {
  return Math.min(w / 380, h / 320);
}

// ===== 绘制 =====
function draw() {
  const { w, h } = getDimensions();
  ctx.clearRect(0, 0, w, h);
  const scale = getScale(w, h);
  const cx = w * 0.45, cy = h * 0.52;
  const C = Mech.colors;

  // 背景网格
  Mech.draw.grid(ctx, cx, cy, w, h, 1, { step: 40 });

  // 导路线（固定，垂直）
  const guideX = cx + e * scale;
  Mech.draw.dashedLine(ctx, guideX, cy - (r0 + h + 30) * scale, guideX, cy + 30 * scale,
    { color: 'rgba(148,163,184,0.25)', width: 1, dash: [4, 4] });

  // 基圆
  Mech.draw.circle(ctx, cx, cy, r0 * scale, { color: 'rgba(59,130,246,0.35)', width: 1.5, dash: [6, 4] });

  // 凸轮廓线（旋转 delta 度）
  ctx.beginPath();
  for (let i = 0; i <= 360; i++) {
    const pt = localProfile[i % localProfile.length];
    const gp = localToCanvas(pt.lx, pt.ly, delta, cx, cy, scale);
    if (i === 0) ctx.moveTo(gp.x, gp.y); else ctx.lineTo(gp.x, gp.y);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx, cy, r0 * scale * 0.3, cx, cy, (r0 + h) * scale * 1.2);
  grad.addColorStop(0, 'rgba(59,130,246,0.3)');
  grad.addColorStop(1, 'rgba(59,130,246,0.08)');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2.5; ctx.stroke();

  // 旋转中心
  Mech.draw.point(ctx, cx, cy, { color: '#fff', r: 4 });
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 12, cy); ctx.lineTo(cx + 12, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy + 12); ctx.stroke();

  // 接触点和法线
  const { contact, normal, s } = getContactAndNormal(delta, cx, cy, scale);

  // 从动件
  drawFollower(contact, s, normal, guideX, scale);

  // 分步骤标注
  if (currentStep >= 1) drawStep1(contact, cx, cy);
  if (currentStep >= 2) drawStep2(contact, normal);
  if (currentStep >= 3) drawStep3(contact);
  if (currentStep >= 4) drawStep4(contact, normal);

  // 压力角曲线图
  drawAlphaChart(w, h);

  // 更新显示
  ui.deltaDisp.textContent = delta.toFixed(1) + '°';
  const alpha = calcPressureAngle(delta);
  ui.alphaDisplay.textContent = alpha.toFixed(1) + '°';
  ui.alphaDisplay.style.color = alpha > 45 ? '#ef4444' : alpha > 30 ? '#f97316' : '#34d399';
}

function drawFollower(contact, s, normal, guideX, scale) {
  const followerColor = '#34d399';
  const contactColor = '#fbbf24';

  if (followerType === 'flat') {
    const tipY = contact.y;
    ctx.strokeStyle = followerColor; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(guideX - 40, tipY); ctx.lineTo(guideX + 40, tipY); ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(guideX - 8, tipY - 5); ctx.lineTo(guideX - 8, tipY + 5);
    ctx.moveTo(guideX + 8, tipY - 5); ctx.lineTo(guideX + 8, tipY + 5); ctx.stroke();
    ctx.strokeStyle = followerColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(guideX, tipY); ctx.lineTo(guideX, tipY - 80); ctx.stroke();
    if (currentStep >= 1) { Mech.draw.point(ctx, contact.x, contact.y, { color: contactColor, r: 1.5 }); }
  } else if (followerType === 'roller') {
    const rr = 8;
    const rollerCX = contact.x + normal.x * rr * scale;
    const rollerCY = contact.y + normal.y * rr * scale;
    ctx.strokeStyle = followerColor; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(rollerCX, rollerCY, rr * scale, 0, 2 * PI); ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(rollerCX, rollerCY, 3, 0, 2 * PI); ctx.stroke();
    ctx.strokeStyle = followerColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(rollerCX, rollerCY); ctx.lineTo(rollerCX, rollerCY - 80); ctx.stroke();
    if (currentStep >= 1) { Mech.draw.point(ctx, contact.x, contact.y, { color: contactColor, r: 1.5 }); }
  } else {
    const tipSize = 6;
    ctx.fillStyle = followerColor;
    ctx.beginPath();
    ctx.moveTo(contact.x, contact.y);
    ctx.lineTo(contact.x - tipSize/2, contact.y - tipSize);
    ctx.lineTo(contact.x + tipSize/2, contact.y - tipSize);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = followerColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(guideX, contact.y - tipSize); ctx.lineTo(guideX, contact.y - 80); ctx.stroke();
    if (currentStep >= 1) { Mech.draw.point(ctx, contact.x, contact.y, { color: contactColor, r: 1.5 }); }
  }
}

function drawStep1(contact, cx, cy) {
  Mech.draw.point(ctx, contact.x, contact.y, { color: '#f97316', r: 1.5 });
  if (currentStep === 1) {
    Mech.draw.text(ctx, 'P (接触点)', contact.x + 15, contact.y + 20, { color: '#f97316', font: 'bold 14px sans-serif', align: 'left' });
    drawStepBadge(contact.x + 12, contact.y - 12, '①', '#f97316');
  }
}

function drawStep2(contact, normal) {
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  const len = 110;
  ctx.beginPath();
  ctx.moveTo(contact.x - normal.x * len, contact.y - normal.y * len);
  ctx.lineTo(contact.x + normal.x * len, contact.y + normal.y * len);
  ctx.stroke(); ctx.setLineDash([]);
  Mech.draw.arrow(ctx, contact.x, contact.y, contact.x + normal.x * len, contact.y + normal.y * len, { color: '#ef4444', size: 10 });
  if (currentStep === 2) {
    Mech.draw.text(ctx, '公法线（力的方向）', contact.x + normal.x * len + 10, contact.y + normal.y * len,
      { color: '#ef4444', font: '12px sans-serif', align: 'left' });
    drawStepBadge(contact.x - normal.x * len - 8, contact.y - normal.y * len - 18, '②', '#ef4444');
  }
}

function drawStep3(contact) {
  const ds = motionDeriv(delta);
  const dir = ds >= 0 ? -1 : 1;
  const vLen = 90;
  Mech.draw.dashedLine(ctx, contact.x, contact.y, contact.x, contact.y + dir * vLen,
    { color: '#10b981', width: 2, dash: [6, 4] });
  Mech.draw.arrow(ctx, contact.x, contact.y, contact.x, contact.y + dir * vLen, { color: '#10b981', size: 10 });
  if (currentStep === 3) {
    Mech.draw.text(ctx, 'v (速度方向)', contact.x + 15, contact.y + dir * vLen * 0.6,
      { color: '#10b981', font: '12px sans-serif', align: 'left' });
    drawStepBadge(contact.x + 12, contact.y + dir * vLen * 0.3, '③', '#10b981');
  }
}

function drawStep4(contact, normal) {
  const alpha = calcPressureAngle(delta);
  if (alpha > 0.5) {
    const ds = motionDeriv(delta);
    const vy_dir = ds >= 0 ? -1 : 1;
    const vAngle = Math.atan2(vy_dir, 0);
    let nx = normal.x, ny = normal.y;
    if (ny * vy_dir < 0) { nx = -nx; ny = -ny; }
    const normalAngle = Math.atan2(ny, nx);
    let diff = normalAngle - vAngle;
    while (diff > PI) diff -= 2 * PI;
    while (diff < -PI) diff += 2 * PI;
    const ccw = diff < 0;
    const arcR = 40;
    Mech.draw.arc(ctx, contact.x, contact.y, arcR, vAngle, normalAngle, ccw, { color: '#a855f7', width: 2.5 });
    const midA = vAngle + diff / 2;
    Mech.draw.text(ctx, 'α=' + alpha.toFixed(1) + '°',
      contact.x + Math.cos(midA) * (arcR + 25), contact.y + Math.sin(midA) * (arcR + 25),
      { color: '#a855f7', font: 'bold 14px sans-serif' });
    if (currentStep === 4) {
      drawStepBadge(contact.x + Math.cos(midA) * (arcR + 50), contact.y + Math.sin(midA) * (arcR + 50), '④', '#a855f7');
    }
  } else {
    Mech.draw.text(ctx, 'α ≈ 0°（公法线与速度方向重合）', contact.x + 25, contact.y - 25,
      { color: '#10b981', font: 'bold 14px sans-serif', align: 'left' });
    if (currentStep === 4) drawStepBadge(contact.x + 20, contact.y - 40, '④', '#a855f7');
  }
}

function drawStepBadge(x, y, text, color) {
  ctx.fillStyle = color;
  ctx.font = 'bold 16px sans-serif';
  ctx.strokeStyle = 'rgba(15,23,42,0.8)';
  ctx.lineWidth = 3;
  ctx.strokeText(text, x, y);
  ctx.fillText(text, x, y);
}

function drawAlphaChart(w, h) {
  const chartW = 160, chartH = 85;
  const chartX = w - chartW - 16, chartY = h - chartH - 16;
  ctx.save();
  ctx.fillStyle = 'rgba(26,29,39,0.92)';
  ctx.strokeStyle = 'rgba(37,40,51,0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(chartX, chartY, chartW, chartH, 8); ctx.fill(); ctx.stroke();

  Mech.draw.text(ctx, 'α(δ) 压力角变化曲线', chartX + 8, chartY + 14,
    { color: '#94a3b8', font: '9px sans-serif', align: 'left' });

  let maxAlpha = 0;
  const alphas = [];
  for (let d = 0; d <= 360; d++) {
    const a = calcPressureAngle(d);
    alphas.push(a);
    maxAlpha = Math.max(maxAlpha, a);
  }
  if (maxAlpha < 5) maxAlpha = 5;
  maxAlpha *= 1.15;

  ctx.strokeStyle = 'rgba(148,163,184,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(chartX + 10, chartY + chartH - 15);
  ctx.lineTo(chartX + chartW - 10, chartY + chartH - 15);
  ctx.stroke();

  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let d = 0; d <= 360; d++) {
    const x = chartX + 10 + (d / 360) * (chartW - 25);
    const y = chartY + chartH - 15 - (alphas[d] / maxAlpha) * (chartH - 35);
    if (d === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  const curX = chartX + 8 + (delta / 360) * (chartW - 20);
  const curA = calcPressureAngle(delta);
  const curY = chartY + chartH - 12 - (curA / maxAlpha) * (chartH - 28);
  Mech.draw.point(ctx, curX, curY, { color: '#a855f7', r: 3 });
  Mech.draw.dashedLine(ctx, curX, chartY + 20, curX, chartY + chartH - 12,
    { color: 'rgba(168,85,247,0.3)', width: 0.5, dash: [3, 3] });

  Mech.draw.text(ctx, '0°', chartX + 4, chartY + chartH - 3, { color: '#64748b', font: '8px sans-serif', align: 'left' });
  Mech.draw.text(ctx, '360°', chartX + chartW - 24, chartY + chartH - 3, { color: '#64748b', font: '8px sans-serif', align: 'left' });
  Mech.draw.text(ctx, maxAlpha.toFixed(0) + '°', chartX + chartW - 22, chartY + 22, { color: '#64748b', font: '8px sans-serif', align: 'left' });
  ctx.restore();
}

// ===== UI 构建 =====
const ui = {};

// 工具栏
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, {
  text: '▶ 播放', variant: 'primary',
  onClick: () => {
    if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
    else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
  }
});
Mech.ui.button(toolbar, {
  text: '复位', variant: 'secondary',
  onClick: () => { delta = 0; draw(); }
});

// 侧边栏
const sidebar = document.getElementById('sidebar');

// 分步骤面板
const stepPanel = Mech.ui.panel(sidebar, '分步骤标注');
const stepList = document.createElement('div');
stepList.className = 'step-list';
const steps = [
  { num: 1, title: '确定接触点', desc: '找到凸轮与从动件的接触点P' },
  { num: 2, title: '作公法线', desc: '过接触点P作凸轮轮廓的法线（力的方向）' },
  { num: 3, title: '标注速度方向', desc: '从动件的速度v方向（沿导路）' },
  { num: 4, title: '标注压力角 α', desc: '公法线与速度方向之间的夹角' },
];
steps.forEach(st => {
  const btn = document.createElement('div');
  btn.className = 'step-btn';
  btn.dataset.step = st.num;
  btn.innerHTML = `<span class="step-num">${st.num}</span><div class="step-text">${st.title}<div class="step-desc">${st.desc}</div></div>`;
  btn.addEventListener('click', () => setStep(st.num));
  stepList.appendChild(btn);
});
stepPanel.appendChild(stepList);

const stepBtnRow = document.createElement('div');
stepBtnRow.style.cssText = 'margin-top:12px;display:flex;gap:8px;';
const resetStepBtn = Mech.ui.button(stepBtnRow, { text: '重置', variant: 'secondary', onClick: () => setStep(0) });
const showAllBtn = Mech.ui.button(stepBtnRow, { text: '显示全部', variant: 'primary', onClick: () => setStep(4) });
stepPanel.appendChild(stepBtnRow);

function setStep(n) {
  currentStep = n;
  stepList.querySelectorAll('.step-btn').forEach(btn => {
    const s = +btn.dataset.step;
    btn.classList.remove('active', 'done');
    if (s === currentStep) btn.classList.add('active');
    else if (s < currentStep) btn.classList.add('done');
  });
  draw();
}

// 压力角面板
const alphaPanel = Mech.ui.panel(sidebar, '当前压力角');
const angleDisp = document.createElement('div');
angleDisp.className = 'angle-display';
angleDisp.innerHTML = `<div class="angle-value" id="alphaDisplay">0.0°</div><div class="angle-label">压力角 α</div>`;
alphaPanel.appendChild(angleDisp);
ui.alphaDisplay = angleDisp.querySelector('#alphaDisplay');

const deltaLabel = document.createElement('div');
deltaLabel.style.cssText = 'font-size:0.85rem;color:var(--text-dim);margin-bottom:4px;';
deltaLabel.innerHTML = `凸轮转角 δ = <span class="slider-value" id="deltaDisp">0°</span>`;
alphaPanel.appendChild(deltaLabel);
ui.deltaDisp = deltaLabel.querySelector('#deltaDisp');

const deltaSliderContainer = document.createElement('div');
deltaSliderContainer.className = 'slider-group';
deltaSliderContainer.innerHTML = `<input type="range" min="0" max="360" value="0" step="1">`;
alphaPanel.appendChild(deltaSliderContainer);
const deltaInput = deltaSliderContainer.querySelector('input');
deltaInput.addEventListener('input', () => { delta = +deltaInput.value; draw(); });

// 参数面板
const paramPanel = Mech.ui.panel(sidebar, '参数调节');
const followerSelect = document.createElement('select');
followerSelect.className = 'select-group';
followerSelect.innerHTML = `
  <option value="knife">尖底从动件</option>
  <option value="roller">滚子从动件</option>
  <option value="flat">平底从动件（α≡0°）</option>`;
followerSelect.addEventListener('change', () => {
  followerType = followerSelect.value;
  calcLocalProfile(); draw();
});
paramPanel.appendChild(followerSelect);

ui.slR0 = Mech.ui.sidebarSlider(paramPanel, { label: '基圆半径 r₀', min: 25, max: 70, value: 40, onChange: v => { r0 = v; calcLocalProfile(); draw(); } });
ui.slH = Mech.ui.sidebarSlider(paramPanel, { label: '行程 h', min: 10, max: 40, value: 25, onChange: v => { h = v; calcLocalProfile(); draw(); } });
ui.slE = Mech.ui.sidebarSlider(paramPanel, { label: '偏距 e', min: 0, max: 15, value: 0, onChange: v => { e = v; calcLocalProfile(); draw(); } });

// 知识点面板
const tipPanel = Mech.ui.panel(sidebar, '知识点');
const tipBox = document.createElement('div');
tipBox.className = 'tip';
tipBox.innerHTML =
  '<strong style="color:#818cf8">压力角定义：</strong><br>' +
  '凸轮机构中，从动件与凸轮轮廓接触点处的<strong>公法线方向</strong>（力的传递方向）与从动件<strong>速度方向</strong>之间的夹角 α。<br><br>' +
  '<strong style="color:#818cf8">作图步骤：</strong><br>' +
  '① 找接触点 → ② 作公法线 → ③ 标注速度方向 → ④ 量取夹角<br><br>' +
  '<strong style="color:#818cf8">关键特性：</strong><br>' +
  '• 压力角随凸轮转角变化，不是常数<br>' +
  '• 压力角越大，有效分力越小，侧向力越大<br>' +
  '• 推程许用压力角：直动 ≤ 30°，摆动 ≤ 45°<br>' +
  '• 平底从动件压力角恒为 0°';
tipPanel.appendChild(tipBox);

// ===== 拖拽交互 =====
let dragging = false;
canvas.addEventListener('mousedown', () => { dragging = true; });
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });
canvas.addEventListener('mousemove', (ev) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
  const { w, h } = getDimensions();
  const cx = w * 0.45, cy = h * 0.52;
  let a = Math.atan2(mx - cx, -(my - cy)) * 180 / PI;
  if (a < 0) a += 360;
  delta = a;
  draw();
});
canvas.addEventListener('touchstart', (e) => { dragging = true; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });
canvas.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const mx = touch.clientX - rect.left, my = touch.clientY - rect.top;
  const { w, h } = getDimensions();
  const cx = w * 0.45, cy = h * 0.52;
  let a = Math.atan2(mx - cx, -(my - cy)) * 180 / PI;
  if (a < 0) a += 360;
  delta = a;
  draw();
}, { passive: false });

// ===== 启动 =====
window.addEventListener('resize', () => draw());
calcLocalProfile();
draw();
console.log('v2.0 loaded (refactored with mech.css + mech.js)');
</script>
