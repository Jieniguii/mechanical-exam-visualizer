<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 尖顶从动件</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 42px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
.anchor-info { font-size: 11px; color: var(--accent); padding: 6px 10px; background: rgba(99,102,241,0.1); border-radius: 6px; margin-bottom: 8px; line-height: 1.5; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>尖顶从动件 <span class="version-badge">comp</span></h1>
  <p>所有尺寸 = 参数值 × scale | 调好形状后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 从动件2是尖顶（直杆+小三角尖端）</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">锚点说明</div>
      <div class="anchor-info">
        锚点(x,y) = 尖端接触点（与凸轮接触处）<br>
        绘制方向：向上（杆体向远离凸轮方向延伸）
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">形状参数（×scale）</div>
      <div class="ctrl-row"><label>尖端高度</label><input type="range" id="tipH" min="3" max="16" value="7"><span class="val" id="tipH-v">7</span></div>
      <div class="ctrl-row"><label>尖端半宽</label><input type="range" id="tipW" min="2" max="10" value="4"><span class="val" id="tipW-v">4</span></div>
      <div class="ctrl-row"><label>杆长</label><input type="range" id="stemLen" min="40" max="140" value="90"><span class="val" id="stemLen-v">90</span></div>
      <div class="ctrl-row"><label>线宽</label><input type="range" id="lineW" min="10" max="35" value="22" step="1"><span class="val" id="lineW-v">2.2</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">缩放预览</div>
      <div class="ctrl-row"><label>scale</label><input type="range" id="scale" min="5" max="20" value="10" step="1"><span class="val" id="scale-v">1.0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">生成函数</div>
      <button class="btn" onclick="copyFunc()" style="font-size:12px;padding:4px 12px">复制代码</button>
      <div class="func-output" id="funcOut"></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={tipH:7,tipW:4,stemLen:90,lineW:2.2,scale:1.0};

/* 核心绘制函数 — 会写回 mech.js */
function drawFollowerPointed(c,x,y,s,p){
  var tH=p.tipH*s, tW=p.tipW*s, sL=p.stemLen*s, lw=p.lineW*s;
  var col=p.color||Mech.colors.return;
  // 尖端三角（向上收窄）
  var tipTop=y, tipBase=y-tH;
  c.fillStyle=col;c.beginPath();
  c.moveTo(x,tipTop);c.lineTo(x-tW,tipBase);c.lineTo(x+tW,tipBase);c.closePath();c.fill();
  c.strokeStyle=col;c.lineWidth=lw*0.8;
  c.beginPath();c.moveTo(x,tipTop);c.lineTo(x-tW,tipBase);c.lineTo(x+tW,tipBase);c.closePath();c.stroke();
  // 杆体
  c.lineWidth=lw;c.beginPath();c.moveTo(x,tipBase);c.lineTo(x,tipBase-sL);c.stroke();
}

function resize(){
  var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();
  canvasEl.width=r.width*d;canvasEl.height=r.height*d;
  ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height};
}

function draw(){
  var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);
  var sizes=[{s:0.7,l:'0.7×'},{s:P.scale,l:'当前 '+P.scale.toFixed(1)+'×'},{s:1.4,l:'1.4×'}];
  var gap=w/sizes.length;
  for(var i=0;i<sizes.length;i++){
    var si=sizes[i];
    var pos={x:gap*i+gap/2, y:h*0.7};
    // 参考圆（凸轮位置提示）
    ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(99,102,241,0.2)';ctx.lineWidth=1.5*si.s;
    ctx.beginPath();ctx.arc(pos.x,pos.y+30*si.s,35*si.s,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    drawFollowerPointed(ctx,pos.x,pos.y,si.s,P);
    Mech.draw.text(ctx,si.l,pos.x,pos.y-P.tipH*si.s-P.stemLen*si.s-14*si.s,{color:Mech.colors.textDim,font:Math.round(11*si.s)+'px sans-serif',align:'center'});
  }
  updateFunc();
}

function updateFunc(){
  var p=P;
  document.getElementById('funcOut').textContent=
'drawFollowerPointed(ctx, x, y, scale, opts) {\n'+
'  opts = opts || {}; var s = scale || 1;\n'+
'  var col = opts.color || Mech.colors.return;\n'+
'  var tH = '+p.tipH+'*s, tW = '+p.tipW+'*s, sL = '+p.stemLen+'*s;\n'+
'  var lw = '+p.lineW.toFixed(1)+'*s;\n'+
'  var tipTop = y, tipBase = y-tH;\n'+
'  // 尖端三角\n'+
'  ctx.fillStyle = col; ctx.beginPath();\n'+
'    ctx.moveTo(x,tipTop); ctx.lineTo(x-tW,tipBase); ctx.lineTo(x+tW,tipBase); ctx.closePath(); ctx.fill();\n'+
'  ctx.strokeStyle = col; ctx.lineWidth = lw*0.8;\n'+
'  ctx.beginPath(); ctx.moveTo(x,tipTop); ctx.lineTo(x-tW,tipBase); ctx.lineTo(x+tW,tipBase); ctx.closePath(); ctx.stroke();\n'+
'  // 杆体\n'+
'  ctx.lineWidth = lw; ctx.beginPath();\n'+
'    ctx.moveTo(x, tipBase); ctx.lineTo(x, tipBase-sL); ctx.stroke();\n'+
'}';
}

function copyFunc(){navigator.clipboard.writeText(document.getElementById('funcOut').textContent).then(function(){alert('已复制')})}

['tipH','tipW','stemLen'].forEach(function(id){
  var el=document.getElementById(id),v=document.getElementById(id+'-v');
  el.addEventListener('input',function(){P[id]=parseInt(el.value);v.textContent=el.value;draw()});
});
document.getElementById('scale').addEventListener('input',function(){
  P.scale=parseInt(this.value)/10;document.getElementById('scale-v').textContent=P.scale.toFixed(1);draw();
});
document.getElementById('lineW').addEventListener('input',function(){
  P.lineW=parseInt(this.value)/10;document.getElementById('lineW-v').textContent=P.lineW.toFixed(1);draw();
});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
