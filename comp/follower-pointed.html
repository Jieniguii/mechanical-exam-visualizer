<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 尖顶从动件</title>
<link rel="stylesheet" href="../mech.css">
<style>/* Comp page extras — extends mech.css layout */
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 34px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>尖顶从动件 <span class="version-badge">comp</span></h1>
  <p>对照教材图调参数 → 一致后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 从动件2是尖顶（直杆+小三角尖端）</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">参数调节</div>
      <div class="ctrl-row"><label>中心X</label><input type="range" id="cx" min="80" max="300" value="180"><span class="val" id="cx-v">180</span></div>
      <div class="ctrl-row"><label>接触点Y</label><input type="range" id="contactY" min="150" max="280" value="220"><span class="val" id="contactY-v">220</span></div>
      <div class="ctrl-row"><label>杆顶Y</label><input type="range" id="stemTopY" min="60" max="200" value="120"><span class="val" id="stemTopY-v">120</span></div>
      <div class="ctrl-row"><label>尖端高度</label><input type="range" id="tipH" min="3" max="16" value="7"><span class="val" id="tipH-v">7</span></div>
      <div class="ctrl-row"><label>尖端半宽</label><input type="range" id="tipW" min="2" max="10" value="4"><span class="val" id="tipW-v">4</span></div>
      <div class="ctrl-row"><label>线宽</label><input type="range" id="lineW" min="10" max="35" value="22" step="1"><span class="val" id="lineW-v">2.2</span></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={cx:180,contactY:220,stemTopY:120,tipH:7,tipW:4,lineW:2.2};
function resize(){var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();canvasEl.width=r.width*d;canvasEl.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height}}
function draw(){var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);var RW=360,RH=320,px=30,py=30,sx=(w-px*2)/RW,sy=(h-py*2)/RH,sc=Math.min(sx,sy),ox=(w-RW*sc)/2,oy=(h-RH*sc)/2;ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);var C=Mech.colors;ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(99,102,241,0.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(P.cx,P.contactY+30,35,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle=C.return;ctx.lineWidth=P.lineW;ctx.beginPath();ctx.moveTo(P.cx,P.stemTopY);ctx.lineTo(P.cx,P.contactY-P.tipH);ctx.stroke();var tipTop=P.contactY,tipBase=P.contactY-P.tipH;ctx.fillStyle=C.return;ctx.beginPath();ctx.moveTo(P.cx,tipTop);ctx.lineTo(P.cx-P.tipW,tipBase);ctx.lineTo(P.cx+P.tipW,tipBase);ctx.closePath();ctx.fill();ctx.strokeStyle=C.return;ctx.lineWidth=P.lineW*0.8;ctx.beginPath();ctx.moveTo(P.cx,tipTop);ctx.lineTo(P.cx-P.tipW,tipBase);ctx.lineTo(P.cx+P.tipW,tipBase);ctx.closePath();ctx.stroke();Mech.draw.text(ctx,'尖顶',P.cx+P.tipW+12,P.contactY-P.tipH/2,{color:C.textDim,font:'12px sans-serif',align:'left'});ctx.restore()}
Object.keys(P).forEach(function(k){var el=document.getElementById(k);if(!el)return;var v=document.getElementById(k+'-v');el.addEventListener('input',function(){var n=parseFloat(el.value);if(k==='lineW'){P[k]=n/10;v.textContent=(n/10).toFixed(1)}else{P[k]=n;v.textContent=Math.round(n)}draw()})});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
