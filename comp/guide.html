<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 导路</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-top { display: flex; gap: 20px; padding: 16px 20px; align-items: flex-start; }
.comp-canvas-box { flex: 1; min-width: 300px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.comp-canvas-box canvas { display: block; width: 100%; height: 50vh; min-height: 280px; max-height: 480px; background: #12141d; }
.comp-ref-box { flex: 0 0 280px; }
.comp-ref-box img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
.comp-ref-box .caption { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.comp-ctrls { padding: 16px 20px; }
.comp-ctrls-inner { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.comp-ctrls h3 { margin: 0 0 12px; font-size: 14px; color: var(--text); }
.cr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cr label { flex: 0 0 110px; font-size: 12px; color: var(--text-dim); }
.cr input[type=range] { flex: 1; accent-color: var(--accent); }
.cr .v { flex: 0 0 40px; font-size: 12px; color: var(--accent); text-align: right; font-family: monospace; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回元件列表</a>
<div class="header">
  <h1>导路 <span class="version-badge">comp</span></h1>
  <p>教材3(c)标准 — 小而干净的导路 | 拖滑块调整</p>
</div>
<div class="comp-top">
  <div class="comp-canvas-box">
    <canvas id="canvas"></canvas>
  </div>
  <div class="comp-ref-box">
    <img src="ref/textbook-3c.png" alt="教材3(c)参考图">
    <div class="caption">教材图3(c) — 导路很小很干净，顶部封闭+短剖面线</div>
  </div>
</div>
<div class="comp-ctrls">
  <div class="comp-ctrls-inner">
    <h3>参数调节</h3>
    <div class="cr"><label>中心X cx</label><input type="range" id="cx" min="80" max="300" value="180"><span class="v" id="cx-v">180</span></div>
    <div class="cr"><label>半宽 hw</label><input type="range" id="hw" min="4" max="24" value="7"><span class="v" id="hw-v">7</span></div>
    <div class="cr"><label>顶部Y gTop</label><input type="range" id="gTop" min="80" max="200" value="130"><span class="v" id="gTop-v">130</span></div>
    <div class="cr"><label>底部Y gBot</label><input type="range" id="gBot" min="150" max="280" value="195"><span class="v" id="gBot-v">195</span></div>
    <div class="cr"><label>顶部剖面线数</label><input type="range" id="topHatch" min="1" max="6" value="3"><span class="v" id="topHatch-v">3</span></div>
    <div class="cr"><label>剖面线间距</label><input type="range" id="hatchStep" min="3" max="10" value="5"><span class="v" id="hatchStep-v">5</span></div>
    <div class="cr"><label>剖面线长度</label><input type="range" id="hatchLen" min="3" max="12" value="6"><span class="v" id="hatchLen-v">6</span></div>
    <div class="cr"><label>线宽 lineW</label><input type="range" id="lineW" min="8" max="30" value="16" step="1"><span class="v" id="lineW-v">1.6</span></div>
  </div>
</div>

<script src="../mech.js"></script>
<script>
var canvasEl = document.getElementById('canvas');
var ctx = canvasEl.getContext('2d');
var P = { cx: 180, hw: 7, gTop: 130, gBot: 195, topHatch: 3, hatchStep: 5, hatchLen: 6, lineW: 1.6 };

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvasEl.getBoundingClientRect();
  canvasEl.width = rect.width * dpr;
  canvasEl.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: rect.width, h: rect.height };
}

function draw() {
  var dim = resize();
  var w = dim.w, h = dim.h;
  ctx.clearRect(0, 0, w, h);
  var REF_W = 360, REF_H = 320;
  var padX = 30, padY = 30;
  var sx = (w-padX*2)/REF_W, sy = (h-padY*2)/REF_H;
  var sc = Math.min(sx, sy);
  var ox = (w-REF_W*sc)/2, oy = (h-REF_H*sc)/2;

  ctx.save(); ctx.translate(ox,oy); ctx.scale(sc,sc);

  // Draw current guide
  drawGuide(P.cx, 160, '当前');

  // Draw old large guide for comparison
  drawGuideOld(P.cx + 120, 160, '旧版(大)');

  ctx.restore();
}

function drawGuide(cx, yOff, label) {
  var p = P;
  var C = Mech.colors;

  // Two vertical lines
  ctx.strokeStyle = C.hinge;
  ctx.lineWidth = p.lineW;
  ctx.beginPath();
  ctx.moveTo(cx - p.hw, p.gTop);
  ctx.lineTo(cx - p.hw, p.gBot);
  ctx.moveTo(cx + p.hw, p.gTop);
  ctx.lineTo(cx + p.hw, p.gBot);
  ctx.stroke();

  // Top horizontal bar (closed)
  ctx.beginPath();
  ctx.moveTo(cx - p.hw, p.gTop);
  ctx.lineTo(cx + p.hw, p.gTop);
  ctx.stroke();

  // Top hatching
  ctx.lineWidth = p.lineW * 0.6;
  for (var i = 0; i < p.topHatch; i++) {
    var hx = cx - p.hw + (i + 1) * p.hatchStep;
    if (hx > cx + p.hw - 2) break;
    ctx.beginPath();
    ctx.moveTo(hx, p.gTop);
    ctx.lineTo(hx - p.hatchLen * 0.5, p.gTop - p.hatchLen);
    ctx.stroke();
  }

  // Label
  Mech.draw.text(ctx, label, cx, p.gBot + 18, { color: C.textDim, font: '11px sans-serif', align: 'center' });
}

function drawGuideOld(cx, yOff, label) {
  var C = Mech.colors;
  // Old version: wide, tall, with side hatching
  var hw = 17, gTop = 108, gBot = 215;

  ctx.strokeStyle = 'rgba(161,161,170,0.5)';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(cx - hw, gTop); ctx.lineTo(cx - hw, gBot);
  ctx.moveTo(cx + hw, gTop); ctx.lineTo(cx + hw, gBot);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx - hw, gTop); ctx.lineTo(cx + hw, gTop);
  ctx.stroke();

  // Side hatching
  ctx.lineWidth = 1;
  for (var i = 0; i < 5; i++) {
    var hy = gTop + 15 + i * 18;
    ctx.beginPath(); ctx.moveTo(cx - hw, hy); ctx.lineTo(cx - hw - 7, hy + 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + hw, hy); ctx.lineTo(cx + hw + 7, hy + 7); ctx.stroke();
  }

  Mech.draw.text(ctx, label, cx, gBot + 18, { color: 'rgba(161,161,170,0.5)', font: '11px sans-serif', align: 'center' });
}

Object.keys(P).forEach(function(k) {
  var el = document.getElementById(k);
  if (!el) return;
  var vEl = document.getElementById(k+'-v');
  el.addEventListener('input', function() {
    var v = parseFloat(el.value);
    if (k==='lineW') { P[k]=v/10; vEl.textContent=(v/10).toFixed(1); }
    else { P[k]=v; vEl.textContent=Math.round(v); }
    draw();
  });
});

window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
