<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 导路</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 42px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
.anchor-info { font-size: 11px; color: var(--accent); padding: 6px 10px; background: rgba(99,102,241,0.1); border-radius: 6px; margin-bottom: 8px; line-height: 1.5; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>导路 <span class="version-badge">comp</span></h1>
  <p>所有尺寸 = 参数值 × scale | 调好形状后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 导路=左右两个机架块，中间通道走杆体，剖面线在内侧</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">锚点说明</div>
      <div class="anchor-info">
        锚点(x,y) = 通道底部中心<br>
        左右机架块向两侧展开，杆体从中间穿过
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">形状参数（×scale）</div>
      <div class="ctrl-row"><label>通道半宽</label><input type="range" id="gap" min="3" max="16" value="7"><span class="val" id="gap-v">7</span></div>
      <div class="ctrl-row"><label>机架块宽</label><input type="range" id="blockW" min="6" max="30" value="14"><span class="val" id="blockW-v">14</span></div>
      <div class="ctrl-row"><label>导路长度</label><input type="range" id="guideLen" min="20" max="80" value="50"><span class="val" id="guideLen-v">50</span></div>
      <div class="ctrl-row"><label>剖面线数</label><input type="range" id="hatchN" min="2" max="8" value="4"><span class="val" id="hatchN-v">4</span></div>
      <div class="ctrl-row"><label>剖面线距</label><input type="range" id="hatchStep" min="4" max="12" value="7"><span class="val" id="hatchStep-v">7</span></div>
      <div class="ctrl-row"><label>剖面线长</label><input type="range" id="hatchLen" min="4" max="14" value="8"><span class="val" id="hatchLen-v">8</span></div>
      <div class="ctrl-row"><label>线宽</label><input type="range" id="lineW" min="10" max="30" value="18" step="1"><span class="val" id="lineW-v">1.8</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">缩放预览</div>
      <div class="ctrl-row"><label>scale</label><input type="range" id="scale" min="5" max="20" value="10" step="1"><span class="val" id="scale-v">1.0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">生成函数</div>
      <button class="btn" onclick="copyFunc()" style="font-size:12px;padding:4px 12px">复制代码</button>
      <div class="func-output" id="funcOut"></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={gap:7,blockW:14,guideLen:50,hatchN:4,hatchStep:7,hatchLen:8,lineW:1.8,scale:1.0};

/* 核心绘制函数 — 会写回 mech.js */
function drawGuide(c,x,y,s,p){
  var g=p.gap*s, bw=p.blockW*s, gL=p.guideLen*s, lw=p.lineW*s;
  var top=y-gL;
  var col=p.color||Mech.colors.hinge;
  var lL=x-g-bw, lR=x-g; // 左块左右边界
  var rL=x+g, rR=x+g+bw; // 右块左右边界

  c.strokeStyle=col;c.lineWidth=lw;

  // 左机架块外框（三边：左、上、右=内侧，底边不画）
  c.beginPath();c.moveTo(lL,y);c.lineTo(lL,top);c.lineTo(lR,top);c.lineTo(lR,y);c.stroke();

  // 左块剖面线（从内侧壁lR向左下45°）
  c.lineWidth=lw*0.5;
  for(var i=0;i<p.hatchN;i++){
    var hy=top+(i+1)*p.hatchStep*s;
    if(hy>y-2*s)break;
    c.beginPath();c.moveTo(lR,hy);c.lineTo(lR-p.hatchLen*s*0.6,hy+p.hatchLen*s*0.6);c.stroke();
  }

  // 右机架块外框（三边：左=内侧、上、右，底边不画）
  c.lineWidth=lw;
  c.beginPath();c.moveTo(rL,y);c.lineTo(rL,top);c.lineTo(rR,top);c.lineTo(rR,y);c.stroke();

  // 右块剖面线（从内侧壁rL向右下45°）
  c.lineWidth=lw*0.5;
  for(var i=0;i<p.hatchN;i++){
    var hy=top+(i+1)*p.hatchStep*s;
    if(hy>y-2*s)break;
    c.beginPath();c.moveTo(rL,hy);c.lineTo(rL+p.hatchLen*s*0.6,hy+p.hatchLen*s*0.6);c.stroke();
  }
}

function resize(){
  var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();
  canvasEl.width=r.width*d;canvasEl.height=r.height*d;
  ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height};
}

function draw(){
  var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);
  var sizes=[{s:0.7,l:'0.7×'},{s:P.scale,l:'当前 '+P.scale.toFixed(1)+'×'},{s:1.4,l:'1.4×'}];
  var gapW=w/sizes.length;
  for(var i=0;i<sizes.length;i++){
    var si=sizes[i];
    var pos={x:gapW*i+gapW/2, y:h*0.75};
    // 参考虚线（杆体位置提示）
    ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(52,211,153,0.25)';ctx.lineWidth=1.5*si.s;
    ctx.beginPath();ctx.moveTo(pos.x,pos.y+5*si.s);ctx.lineTo(pos.x,pos.y-P.guideLen*si.s-20*si.s);ctx.stroke();ctx.setLineDash([]);
    drawGuide(ctx,pos.x,pos.y,si.s,P);
    Mech.draw.text(ctx,si.l,pos.x,pos.y+18*si.s,{color:Mech.colors.textDim,font:Math.round(11*si.s)+'px sans-serif',align:'center'});
  }
  updateFunc();
}

function updateFunc(){
  var p=P;
  document.getElementById('funcOut').textContent=
'drawGuide(ctx, x, y, scale, opts) {\n'+
'  opts = opts || {}; var s = scale || 1;\n'+
'  var col = opts.color || Mech.colors.hinge;\n'+
'  var g = '+p.gap+'*s, bw = '+p.blockW+'*s, gL = '+p.guideLen+'*s;\n'+
'  var lw = '+p.lineW.toFixed(1)+'*s;\n'+
'  var top = y - gL;\n'+
'  var lL = x-g-bw, lR = x-g, rL = x+g, rR = x+g+bw;\n'+
'  // 左机架块（三边框，底不封）\n'+
'  ctx.strokeStyle = col; ctx.lineWidth = lw;\n'+
'  ctx.beginPath(); ctx.moveTo(lL,y); ctx.lineTo(lL,top);\n'+
'    ctx.lineTo(lR,top); ctx.lineTo(lR,y); ctx.stroke();\n'+
'  // 左块内侧剖面线\n'+
'  ctx.lineWidth = lw*0.5;\n'+
'  for (var i=0; i<'+p.hatchN+'; i++) {\n'+
'    var hy = top+'+p.hatchStep+'*s*(i+1); if (hy>y-2*s) break;\n'+
'    ctx.beginPath(); ctx.moveTo(lR,hy);\n'+
'      ctx.lineTo(lR-'+p.hatchLen+'*s*0.6, hy+'+p.hatchLen+'*s*0.6); ctx.stroke();\n'+
'  }\n'+
'  // 右机架块（三边框，底不封）\n'+
'  ctx.lineWidth = lw;\n'+
'  ctx.beginPath(); ctx.moveTo(rL,y); ctx.lineTo(rL,top);\n'+
'    ctx.lineTo(rR,top); ctx.lineTo(rR,y); ctx.stroke();\n'+
'  // 右块内侧剖面线\n'+
'  ctx.lineWidth = lw*0.5;\n'+
'  for (var i=0; i<'+p.hatchN+'; i++) {\n'+
'    var hy = top+'+p.hatchStep+'*s*(i+1); if (hy>y-2*s) break;\n'+
'    ctx.beginPath(); ctx.moveTo(rL,hy);\n'+
'      ctx.lineTo(rL+'+p.hatchLen+'*s*0.6, hy+'+p.hatchLen+'*s*0.6); ctx.stroke();\n'+
'  }\n'+
'}';
}

function copyFunc(){navigator.clipboard.writeText(document.getElementById('funcOut').textContent).then(function(){alert('已复制')})}

['gap','blockW','guideLen','hatchN','hatchStep','hatchLen'].forEach(function(id){
  var el=document.getElementById(id),v=document.getElementById(id+'-v');
  el.addEventListener('input',function(){P[id]=parseInt(el.value);v.textContent=el.value;draw()});
});
document.getElementById('scale').addEventListener('input',function(){
  P.scale=parseInt(this.value)/10;document.getElementById('scale-v').textContent=P.scale.toFixed(1);draw();
});
document.getElementById('lineW').addEventListener('input',function(){
  P.lineW=parseInt(this.value)/10;document.getElementById('lineW-v').textContent=P.lineW.toFixed(1);draw();
});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
