<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 导路</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-page { max-width: 1100px; margin: 0 auto; }
.comp-row { display: flex; gap: 16px; align-items: flex-start; }
.comp-canvas-box { flex: 1; min-width: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.comp-canvas-box canvas { display: block; width: 100%; height: 340px; background: #12141d; }
.comp-side { flex: 0 0 300px; display: flex; flex-direction: column; gap: 12px; }
.comp-ref-box img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
.comp-ref-box .caption { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.comp-ctrls { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.comp-ctrls h3 { margin: 0 0 10px; font-size: 13px; color: var(--text); }
.cr { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.cr label { flex: 0 0 90px; font-size: 11px; color: var(--text-dim); }
.cr input[type=range] { flex: 1; accent-color: var(--accent); }
.cr .v { flex: 0 0 32px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
@media (max-width: 768px) {
  .comp-row { flex-direction: column; }
  .comp-side { flex: none; width: 100%; }
}
</style>
</head>
<body>
<div class="comp-page">
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>导路 <span class="version-badge">comp</span></h1>
  <p>对照教材图调参数 → 一致后告诉我锁死</p>
</div>
<div class="comp-row">
  <div class="comp-canvas-box"><canvas id="canvas"></canvas></div>
  <div class="comp-side">
    <div class="comp-ref-box">
      <img src="ref/textbook-3c.png" alt="教材3(c)">
      <div class="caption">教材图3(c) — 导路很小很干净</div>
    </div>
    <div class="comp-ctrls">
      <h3>参数调节</h3>
      <div class="cr"><label>中心X</label><input type="range" id="cx" min="80" max="300" value="180"><span class="v" id="cx-v">180</span></div>
      <div class="cr"><label>半宽</label><input type="range" id="hw" min="4" max="24" value="7"><span class="v" id="hw-v">7</span></div>
      <div class="cr"><label>顶部Y</label><input type="range" id="gTop" min="80" max="200" value="130"><span class="v" id="gTop-v">130</span></div>
      <div class="cr"><label>底部Y</label><input type="range" id="gBot" min="150" max="280" value="195"><span class="v" id="gBot-v">195</span></div>
      <div class="cr"><label>顶剖面线数</label><input type="range" id="topHatch" min="1" max="6" value="3"><span class="v" id="topHatch-v">3</span></div>
      <div class="cr"><label>剖面线距</label><input type="range" id="hatchStep" min="3" max="10" value="5"><span class="v" id="hatchStep-v">5</span></div>
      <div class="cr"><label>剖面线长</label><input type="range" id="hatchLen" min="3" max="12" value="6"><span class="v" id="hatchLen-v">6</span></div>
      <div class="cr"><label>线宽</label><input type="range" id="lineW" min="8" max="30" value="16" step="1"><span class="v" id="lineW-v">1.6</span></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={cx:180,hw:7,gTop:130,gBot:195,topHatch:3,hatchStep:5,hatchLen:6,lineW:1.6};
function resize(){var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();canvasEl.width=r.width*d;canvasEl.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height}}
function draw(){var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);var RW=360,RH=320,px=30,py=30,sx=(w-px*2)/RW,sy=(h-py*2)/RH,sc=Math.min(sx,sy),ox=(w-RW*sc)/2,oy=(h-RH*sc)/2;ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);var C=Mech.colors;ctx.strokeStyle=C.hinge;ctx.lineWidth=P.lineW;ctx.beginPath();ctx.moveTo(P.cx-P.hw,P.gTop);ctx.lineTo(P.cx-P.hw,P.gBot);ctx.moveTo(P.cx+P.hw,P.gTop);ctx.lineTo(P.cx+P.hw,P.gBot);ctx.stroke();ctx.beginPath();ctx.moveTo(P.cx-P.hw,P.gTop);ctx.lineTo(P.cx+P.hw,P.gTop);ctx.stroke();ctx.lineWidth=P.lineW*0.6;for(var i=0;i<P.topHatch;i++){var hx=P.cx-P.hw+(i+1)*P.hatchStep;if(hx>P.cx+P.hw-2)break;ctx.beginPath();ctx.moveTo(hx,P.gTop);ctx.lineTo(hx-P.hatchLen*0.5,P.gTop-P.hatchLen);ctx.stroke()}Mech.draw.text(ctx,'当前',P.cx,P.gBot+18,{color:C.textDim,font:'11px sans-serif',align:'center'});ctx.restore()}
Object.keys(P).forEach(function(k){var el=document.getElementById(k);if(!el)return;var v=document.getElementById(k+'-v');el.addEventListener('input',function(){var n=parseFloat(el.value);if(k==='lineW'){P[k]=n/10;v.textContent=(n/10).toFixed(1)}else{P[k]=n;v.textContent=Math.round(n)}draw()})});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
