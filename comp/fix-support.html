<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 固定支座</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 42px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
.anchor-info { font-size: 11px; color: var(--accent); padding: 6px 10px; background: rgba(99,102,241,0.1); border-radius: 6px; margin-bottom: 8px; line-height: 1.5; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>固定支座 <span class="version-badge">comp</span></h1>
  <p>所有尺寸 = 参数值 × scale | 调好形状后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 注意机架1和3的固定支座画法</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">锚点说明</div>
      <div class="anchor-info">
        锚点(x,y) = 三角顶点（连接机构处）<br>
        绘制方向：向下
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">形状参数（×scale）</div>
      <div class="ctrl-row"><label>三角高度</label><input type="range" id="triH" min="8" max="24" value="14"><span class="val" id="triH-v">14</span></div>
      <div class="ctrl-row"><label>三角半宽</label><input type="range" id="triW" min="6" max="20" value="10"><span class="val" id="triW-v">10</span></div>
      <div class="ctrl-row"><label>底线加宽</label><input type="range" id="baseExtra" min="0" max="8" value="4"><span class="val" id="baseExtra-v">4</span></div>
      <div class="ctrl-row"><label>剖面线数</label><input type="range" id="hatchCount" min="2" max="9" value="5"><span class="val" id="hatchCount-v">5</span></div>
      <div class="ctrl-row"><label>剖面线长</label><input type="range" id="hatchLen" min="4" max="14" value="8"><span class="val" id="hatchLen-v">8</span></div>
      <div class="ctrl-row"><label>线宽</label><input type="range" id="lineW" min="10" max="40" value="20" step="1"><span class="val" id="lineW-v">2.0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">缩放预览</div>
      <div class="ctrl-row"><label>scale</label><input type="range" id="scale" min="5" max="25" value="10" step="1"><span class="val" id="scale-v">1.0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">生成函数</div>
      <button class="btn" onclick="copyFunc()" style="font-size:12px;padding:4px 12px">复制代码</button>
      <div class="func-output" id="funcOut"></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={triH:14,triW:10,baseExtra:4,hatchCount:5,hatchLen:8,lineW:2.0,scale:1.0};

/* 核心绘制函数 — 会写回 mech.js */
function drawFixedSupport(c,x,y,s,p){
  var tH=p.triH*s,tW=p.triW*s,bW=tW+p.baseExtra*s,lw=p.lineW*s;
  c.strokeStyle=p.color||Mech.colors.hinge;
  c.lineWidth=lw;
  c.beginPath();c.moveTo(x,y);c.lineTo(x-tW,y+tH);c.lineTo(x+tW,y+tH);c.closePath();c.stroke();
  c.lineWidth=lw*0.8;c.beginPath();c.moveTo(x-bW,y+tH);c.lineTo(x+bW,y+tH);c.stroke();
  c.lineWidth=lw*0.5;
  for(var i=0;i<p.hatchCount;i++){
    var hx=x-bW+3*s+i*((2*bW-6*s)/Math.max(p.hatchCount-1,1));
    c.beginPath();c.moveTo(hx,y+tH);c.lineTo(hx-p.hatchLen*s*0.6,y+tH+p.hatchLen*s*0.6);c.stroke();
  }
}

function resize(){
  var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();
  canvasEl.width=r.width*d;canvasEl.height=r.height*d;
  ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height};
}

function draw(){
  var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);
  var sizes=[{s:0.7,l:'0.7×'},{s:P.scale,l:'当前 '+P.scale.toFixed(1)+'×'},{s:1.4,l:'1.4×'}];
  var gap=w/sizes.length;
  for(var i=0;i<sizes.length;i++){
    var pos={x:gap*i+gap/2,y:h*0.4};
    var si=sizes[i];
    ctx.strokeStyle='rgba(161,161,170,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(pos.x,pos.y-25*si.s);ctx.lineTo(pos.x,pos.y);ctx.stroke();ctx.setLineDash([]);
    drawFixedSupport(ctx,pos.x,pos.y,si.s,P);
    Mech.draw.text(ctx,si.l,pos.x,pos.y+P.triH*si.s+P.hatchLen*si.s*0.6+16*si.s,{color:Mech.colors.textDim,font:Math.round(11*si.s)+'px sans-serif',align:'center'});
  }
  updateFunc();
}

function updateFunc(){
  var p=P;
  document.getElementById('funcOut').textContent=
'drawFixedSupport(ctx, x, y, scale, opts) {\n'+
'  opts = opts || {}; var s = scale || 1;\n'+
'  var c = opts.color || Mech.colors.hinge;\n'+
'  var tH = '+p.triH+'*s, tW = '+p.triW+'*s, bW = tW + '+p.baseExtra+'*s;\n'+
'  var lw = '+p.lineW.toFixed(1)+'*s;\n'+
'  ctx.strokeStyle = c; ctx.lineWidth = lw;\n'+
'  // 倒三角\n'+
'  ctx.beginPath(); ctx.moveTo(x,y);\n'+
'    ctx.lineTo(x-tW, y+tH); ctx.lineTo(x+tW, y+tH); ctx.closePath(); ctx.stroke();\n'+
'  // 底线\n'+
'  ctx.lineWidth = lw*0.8; ctx.beginPath();\n'+
'    ctx.moveTo(x-bW, y+tH); ctx.lineTo(x+bW, y+tH); ctx.stroke();\n'+
'  // 剖面线\n'+
'  ctx.lineWidth = lw*0.5;\n'+
'  for (var i=0; i<'+p.hatchCount+'; i++) {\n'+
'    var hx = x-bW+3*s+i*((2*bW-6*s)/'+Math.max(p.hatchCount-1,1)+');\n'+
'    ctx.beginPath(); ctx.moveTo(hx, y+tH);\n'+
'      ctx.lineTo(hx-'+p.hatchLen+'*s*0.6, y+tH+'+p.hatchLen+'*s*0.6); ctx.stroke();\n'+
'  }\n'+
'}';
}

function copyFunc(){navigator.clipboard.writeText(document.getElementById('funcOut').textContent).then(function(){alert('已复制')})}

['triH','triW','baseExtra','hatchCount','hatchLen'].forEach(function(id){
  var el=document.getElementById(id),v=document.getElementById(id+'-v');
  el.addEventListener('input',function(){P[id]=parseInt(el.value);v.textContent=el.value;draw()});
});
document.getElementById('scale').addEventListener('input',function(){
  P.scale=parseInt(this.value)/10;document.getElementById('scale-v').textContent=P.scale.toFixed(1);draw();
});
document.getElementById('lineW').addEventListener('input',function(){
  P.lineW=parseInt(this.value)/10;document.getElementById('lineW-v').textContent=P.lineW.toFixed(1);draw();
});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
