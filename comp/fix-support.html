<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 固定支座</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-top { display: flex; gap: 20px; padding: 16px 20px; align-items: flex-start; }
.comp-canvas-box { flex: 1; min-width: 300px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.comp-canvas-box canvas { display: block; width: 100%; height: 50vh; min-height: 280px; max-height: 480px; background: #12141d; }
.comp-ref-box { flex: 0 0 280px; }
.comp-ref-box img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
.comp-ref-box .caption { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.comp-ctrls { padding: 16px 20px; }
.comp-ctrls-inner { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.comp-ctrls h3 { margin: 0 0 12px; font-size: 14px; color: var(--text); }
.cr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cr label { flex: 0 0 110px; font-size: 12px; color: var(--text-dim); }
.cr input[type=range] { flex: 1; accent-color: var(--accent); }
.cr .v { flex: 0 0 40px; font-size: 12px; color: var(--accent); text-align: right; font-family: monospace; }
.func-out { margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 11px; color: #a5f3fc; white-space: pre-wrap; max-height: 260px; overflow-y: auto; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回元件列表</a>
<div class="header">
  <h1>固定支座 <span class="version-badge">comp</span></h1>
  <p>教材3(c)标准 — 倒三角+底线+剖面线 | 拖滑块调整，让画法与教材图一致</p>
</div>
<div class="comp-top">
  <div class="comp-canvas-box">
    <canvas id="canvas"></canvas>
  </div>
  <div class="comp-ref-box">
    <img src="ref/textbook-3c.png" alt="教材3(c)参考图">
    <div class="caption">教材图3(c) — 注意机架1和3的固定支座画法</div>
  </div>
</div>
<div class="comp-ctrls">
  <div class="comp-ctrls-inner">
    <h3>参数调节</h3>
    <div class="cr"><label>三角高度 triH</label><input type="range" id="triH" min="8" max="24" value="14"><span class="v" id="triH-v">14</span></div>
    <div class="cr"><label>三角半宽 triW</label><input type="range" id="triW" min="6" max="20" value="12"><span class="v" id="triW-v">12</span></div>
    <div class="cr"><label>底线额外宽度</label><input type="range" id="baseExtra" min="0" max="8" value="4"><span class="v" id="baseExtra-v">4</span></div>
    <div class="cr"><label>剖面线数量</label><input type="range" id="hatchCount" min="2" max="9" value="5"><span class="v" id="hatchCount-v">5</span></div>
    <div class="cr"><label>剖面线长度</label><input type="range" id="hatchLen" min="4" max="14" value="8"><span class="v" id="hatchLen-v">8</span></div>
    <div class="cr"><label>整体缩放 scale</label><input type="range" id="scale" min="5" max="25" value="10" step="1"><span class="v" id="scale-v">1.0</span></div>
    <div class="cr"><label>线宽 lineWidth</label><input type="range" id="lineW" min="10" max="40" value="18" step="1"><span class="v" id="lineW-v">1.8</span></div>
    <h3>生成函数</h3>
    <button class="btn" onclick="copyFunc()">复制函数代码</button>
    <div class="func-out" id="funcOut"></div>
  </div>
</div>

<script src="../mech.js"></script>
<script>
var canvasEl = document.getElementById('canvas');
var ctx = canvasEl.getContext('2d');
var P = { triH: 14, triW: 12, baseExtra: 4, hatchCount: 5, hatchLen: 8, scale: 1.0, lineW: 1.8 };

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvasEl.getBoundingClientRect();
  canvasEl.width = rect.width * dpr;
  canvasEl.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: rect.width, h: rect.height };
}

function draw() {
  var dim = resize();
  var w = dim.w, h = dim.h;
  ctx.clearRect(0, 0, w, h);

  var REF_W = 460, REF_H = 300;
  var padX = 40, padY = 40;
  var sx = (w - padX * 2) / REF_W;
  var sy = (h - padY * 2) / REF_H;
  var sc = Math.min(sx, sy);
  var ox = (w - REF_W * sc) / 2;
  var oy = (h - REF_H * sc) / 2;

  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(sc, sc);

  var positions = [
    { x: 100, y: 180, label: '标准' },
    { x: 230, y: 180, label: '大号' },
    { x: 360, y: 180, label: '小号' }
  ];

  for (var i = 0; i < positions.length; i++) {
    var pos = positions[i];
    var s = (i === 0) ? P.scale : (i === 1 ? P.scale * 1.4 : P.scale * 0.7);
    var p = P;
    var triH = p.triH * s, triW = p.triW * s;
    var baseW = triW + p.baseExtra * s;
    var color = Mech.colors.hinge;

    // Vertical reference line
    ctx.strokeStyle = 'rgba(161,161,170,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y - 40);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Inverted triangle
    ctx.strokeStyle = color;
    ctx.lineWidth = p.lineW * s;
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    ctx.lineTo(pos.x - triW, pos.y + triH);
    ctx.lineTo(pos.x + triW, pos.y + triH);
    ctx.closePath();
    ctx.stroke();

    // Base line
    ctx.lineWidth = p.lineW * s * 0.8;
    ctx.beginPath();
    ctx.moveTo(pos.x - baseW, pos.y + triH);
    ctx.lineTo(pos.x + baseW, pos.y + triH);
    ctx.stroke();

    // Hatching
    ctx.lineWidth = p.lineW * s * 0.5;
    for (var j = 0; j < p.hatchCount; j++) {
      var hx = pos.x - baseW + 3 * s + j * ((2 * baseW - 6 * s) / Math.max(p.hatchCount - 1, 1));
      ctx.beginPath();
      ctx.moveTo(hx, pos.y + triH);
      ctx.lineTo(hx - p.hatchLen * s * 0.6, pos.y + triH + p.hatchLen * s * 0.6);
      ctx.stroke();
    }

    Mech.draw.text(ctx, pos.label, pos.x, pos.y + triH + p.hatchLen * s + 16, {
      color: Mech.colors.textDim, font: '12px sans-serif', align: 'center'
    });
  }

  ctx.restore();
  updateFunc();
}

function updateFunc() {
  var p = P;
  var code = `function drawFixedSupport(ctx, x, y, opts) {\n  opts = opts || {};\n  var color = opts.color || Mech.colors.hinge;\n  var scale = opts.scale || 1;\n  var triH = ${p.triH} * scale, triW = ${p.triW} * scale;\n  var baseW = triW + ${p.baseExtra} * scale;\n  var hatchCount = ${p.hatchCount};\n  var hatchLen = ${p.hatchLen} * scale;\n\n  ctx.strokeStyle = color;\n  ctx.lineWidth = ${p.lineW} * scale;\n  // 倒三角\n  ctx.beginPath();\n  ctx.moveTo(x, y);\n  ctx.lineTo(x - triW, y + triH);\n  ctx.lineTo(x + triW, y + triH);\n  ctx.closePath();\n  ctx.stroke();\n  // 底线\n  ctx.lineWidth = ${(p.lineW * 0.8).toFixed(1)} * scale;\n  ctx.beginPath();\n  ctx.moveTo(x - baseW, y + triH);\n  ctx.lineTo(x + baseW, y + triH);\n  ctx.stroke();\n  // 剖面线\n  ctx.lineWidth = ${(p.lineW * 0.5).toFixed(1)} * scale;\n  for (var i = 0; i < hatchCount; i++) {\n    var hx = x - baseW + 3 * scale + i * ((2 * baseW - 6 * scale) / (hatchCount - 1));\n    ctx.beginPath();\n    ctx.moveTo(hx, y + triH);\n    ctx.lineTo(hx - hatchLen * 0.6, y + triH + hatchLen * 0.6);\n    ctx.stroke();\n  }\n}`;
  document.getElementById('funcOut').textContent = code;
}

function copyFunc() {
  navigator.clipboard.writeText(document.getElementById('funcOut').textContent).then(function() { alert('已复制'); });
}

// Bind sliders
['triH','triW','baseExtra','hatchCount','hatchLen'].forEach(function(id) {
  var el = document.getElementById(id);
  var vEl = document.getElementById(id + '-v');
  el.addEventListener('input', function() { P[id] = parseInt(el.value); vEl.textContent = el.value; draw(); });
});
document.getElementById('scale').addEventListener('input', function() {
  P.scale = parseInt(this.value) / 10;
  document.getElementById('scale-v').textContent = P.scale.toFixed(1);
  draw();
});
document.getElementById('lineW').addEventListener('input', function() {
  P.lineW = parseInt(this.value) / 10;
  document.getElementById('lineW-v').textContent = P.lineW.toFixed(1);
  draw();
});

window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
