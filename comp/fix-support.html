<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 固定支座</title>
<link rel="stylesheet" href="../mech.css">
<style>/* Comp page extras — extends mech.css layout */
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 34px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>固定支座 <span class="version-badge">comp</span></h1>
  <p>对照教材图调参数 → 一致后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 注意机架1和3的固定支座画法</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">参数调节</div>
      <div class="ctrl-row"><label>三角高度</label><input type="range" id="triH" min="8" max="24" value="14"><span class="val" id="triH-v">14</span></div>
      <div class="ctrl-row"><label>三角半宽</label><input type="range" id="triW" min="6" max="20" value="12"><span class="val" id="triW-v">12</span></div>
      <div class="ctrl-row"><label>底线加宽</label><input type="range" id="baseExtra" min="0" max="8" value="4"><span class="val" id="baseExtra-v">4</span></div>
      <div class="ctrl-row"><label>剖面线数</label><input type="range" id="hatchCount" min="2" max="9" value="5"><span class="val" id="hatchCount-v">5</span></div>
      <div class="ctrl-row"><label>剖面线长</label><input type="range" id="hatchLen" min="4" max="14" value="8"><span class="val" id="hatchLen-v">8</span></div>
      <div class="ctrl-row"><label>缩放</label><input type="range" id="scale" min="5" max="25" value="10" step="1"><span class="val" id="scale-v">1.0</span></div>
      <div class="ctrl-row"><label>线宽</label><input type="range" id="lineW" min="10" max="40" value="18" step="1"><span class="val" id="lineW-v">1.8</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">生成函数</div>
      <button class="btn" onclick="copyFunc()" style="font-size:12px;padding:4px 12px">复制代码</button>
      <div class="func-output" id="funcOut"></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={triH:14,triW:12,baseExtra:4,hatchCount:5,hatchLen:8,scale:1.0,lineW:1.8};
function resize(){var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();canvasEl.width=r.width*d;canvasEl.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height}}
function draw(){var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);var RW=460,RH=300,px=40,py=40,sx=(w-px*2)/RW,sy=(h-py*2)/RH,sc=Math.min(sx,sy),ox=(w-RW*sc)/2,oy=(h-RH*sc)/2;ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);var pos=[{x:100,y:180,l:'标准'},{x:230,y:180,l:'大号'},{x:360,y:180,l:'小号'}];for(var i=0;i<pos.length;i++){var p=pos[i],s=i===0?P.scale:i===1?P.scale*1.4:P.scale*0.7,tH=P.triH*s,tW=P.triW*s,bW=tW+P.baseExtra*s,c=Mech.colors.hinge;ctx.strokeStyle='rgba(161,161,170,0.4)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(p.x,p.y-40);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle=c;ctx.lineWidth=P.lineW*s;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-tW,p.y+tH);ctx.lineTo(p.x+tW,p.y+tH);ctx.closePath();ctx.stroke();ctx.lineWidth=P.lineW*s*0.8;ctx.beginPath();ctx.moveTo(p.x-bW,p.y+tH);ctx.lineTo(p.x+bW,p.y+tH);ctx.stroke();ctx.lineWidth=P.lineW*s*0.5;for(var j=0;j<P.hatchCount;j++){var hx=p.x-bW+3*s+j*((2*bW-6*s)/Math.max(P.hatchCount-1,1));ctx.beginPath();ctx.moveTo(hx,p.y+tH);ctx.lineTo(hx-P.hatchLen*s*0.6,p.y+tH+P.hatchLen*s*0.6);ctx.stroke()}Mech.draw.text(ctx,p.l,p.x,p.y+tH+P.hatchLen*s+16,{color:Mech.colors.textDim,font:'12px sans-serif',align:'center'})}ctx.restore();updateFunc()}
function updateFunc(){var p=P;document.getElementById('funcOut').textContent='function drawFixedSupport(ctx,x,y,opts){\n  opts=opts||{};var c=opts.color||Mech.colors.hinge,s=opts.scale||1;\n  var tH='+p.triH+'*s,tW='+p.triW+'*s,bW=tW+'+p.baseExtra+'*s;\n  ctx.strokeStyle=c;ctx.lineWidth='+p.lineW+'*s;\n  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-tW,y+tH);ctx.lineTo(x+tW,y+tH);ctx.closePath();ctx.stroke();\n  ctx.lineWidth='+(p.lineW*0.8).toFixed(1)+'*s;ctx.beginPath();ctx.moveTo(x-bW,y+tH);ctx.lineTo(x+bW,y+tH);ctx.stroke();\n  ctx.lineWidth='+(p.lineW*0.5).toFixed(1)+'*s;\n  for(var i=0;i<'+p.hatchCount+';i++){var hx=x-bW+3*s+i*((2*bW-6*s)/'+(p.hatchCount-1)+');ctx.beginPath();ctx.moveTo(hx,y+tH);ctx.lineTo(hx-'+p.hatchLen+'*s*0.6,y+tH+'+p.hatchLen+'*s*0.6);ctx.stroke()}\n}'}
function copyFunc(){navigator.clipboard.writeText(document.getElementById('funcOut').textContent).then(function(){alert('已复制')})}
['triH','triW','baseExtra','hatchCount','hatchLen'].forEach(function(id){var el=document.getElementById(id),v=document.getElementById(id+'-v');el.addEventListener('input',function(){P[id]=parseInt(el.value);v.textContent=el.value;draw()})});
document.getElementById('scale').addEventListener('input',function(){P.scale=parseInt(this.value)/10;document.getElementById('scale-v').textContent=P.scale.toFixed(1);draw()});
document.getElementById('lineW').addEventListener('input',function(){P.lineW=parseInt(this.value)/10;document.getElementById('lineW-v').textContent=P.lineW.toFixed(1);draw()});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
