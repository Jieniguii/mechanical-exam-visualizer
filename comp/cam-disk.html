<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 偏心圆盘凸轮</title>
<link rel="stylesheet" href="../mech.css">
<style>
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 42px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
.anchor-info { font-size: 11px; color: var(--accent); padding: 6px 10px; background: rgba(99,102,241,0.1); border-radius: 6px; margin-bottom: 8px; line-height: 1.5; }
</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>偏心圆盘凸轮 <span class="version-badge">comp</span></h1>
  <p>所有尺寸 = 参数值 × scale | 调好形状后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 偏心圆盘+转轴十字+固定支座</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">锚点说明</div>
      <div class="anchor-info">
        锚点(x,y) = 转轴中心（十字交叉点）<br>
        轮廓圆心偏移 = (eccX, eccY) × scale
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">形状参数（×scale）</div>
      <div class="ctrl-row"><label>轮廓半径</label><input type="range" id="r" min="20" max="70" value="44"><span class="val" id="r-v">44</span></div>
      <div class="ctrl-row"><label>偏心X</label><input type="range" id="eccX" min="-30" max="30" value="15"><span class="val" id="eccX-v">15</span></div>
      <div class="ctrl-row"><label>偏心Y</label><input type="range" id="eccY" min="-30" max="10" value="-20"><span class="val" id="eccY-v">-20</span></div>
      <div class="ctrl-row"><label>轴圆半径</label><input type="range" id="shaftR" min="2" max="8" value="4"><span class="val" id="shaftR-v">4</span></div>
      <div class="ctrl-row"><label>十字半径</label><input type="range" id="crossR" min="3" max="12" value="6"><span class="val" id="crossR-v">6</span></div>
      <div class="ctrl-row"><label>线宽</label><input type="range" id="lineW" min="15" max="45" value="20" step="1"><span class="val" id="lineW-v">2.0</span></div>
      <div class="ctrl-row"><label>填充透明</label><input type="range" id="fillA" min="0" max="20" value="1"><span class="val" id="fillA-v">0.01</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">缩放预览</div>
      <div class="ctrl-row"><label>scale</label><input type="range" id="scale" min="5" max="20" value="10" step="1"><span class="val" id="scale-v">1.0</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">生成函数</div>
      <button class="btn" onclick="copyFunc()" style="font-size:12px;padding:4px 12px">复制代码</button>
      <div class="func-output" id="funcOut"></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={r:44,eccX:15,eccY:-20,shaftR:4,crossR:6,lineW:2.0,fillA:0.01,scale:1.0};

/* 固定支座子函数（从fix-support调好的参数） */
function drawSupport(c,x,y,s){
  var tH=14*s,tW=10*s,bW=tW+4*s;
  c.strokeStyle=Mech.colors.hinge;
  c.lineWidth=1.8*s;c.beginPath();c.moveTo(x,y);c.lineTo(x-tW,y+tH);c.lineTo(x+tW,y+tH);c.closePath();c.stroke();
  c.lineWidth=1.5*s;c.beginPath();c.moveTo(x-bW,y+tH);c.lineTo(x+bW,y+tH);c.stroke();
  c.lineWidth=1*s;
  for(var i=0;i<5;i++){var hx=x-bW+3*s+i*((2*bW-6*s)/4);c.beginPath();c.moveTo(hx,y+tH);c.lineTo(hx-8*s*0.6,y+tH+8*s*0.6);c.stroke();}
}

/* 核心绘制函数 — 会写回 mech.js */
function drawCamDisk(c,x,y,s,p){
  var r=p.r*s, eX=p.eccX*s, eY=p.eccY*s, sR=p.shaftR*s, cR=p.crossR*s, lw=p.lineW*s;
  var pCx=x+eX, pCy=y+eY;
  // 轮廓圆
  c.beginPath();c.arc(pCx,pCy,r,0,Math.PI*2);
  c.strokeStyle=Mech.colors.accent;c.lineWidth=lw;c.stroke();
  c.fillStyle='rgba(99,102,241,'+p.fillA+')';c.fill();
  // 转轴圆
  c.strokeStyle=Mech.colors.accent;c.lineWidth=2*s;c.beginPath();c.arc(x,y,sR,0,Math.PI*2);c.stroke();
  // 十字
  c.lineWidth=1.2*s;c.beginPath();c.moveTo(x-cR,y);c.lineTo(x+cR,y);c.moveTo(x,y-cR);c.lineTo(x,y+cR);c.stroke();
  // 偏心距虚线
  c.setLineDash([3,3]);c.strokeStyle='rgba(161,161,170,0.5)';c.lineWidth=1*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(pCx,pCy);c.stroke();c.setLineDash([]);
  var ecc=Math.sqrt(eX*eX+eY*eY);
  if(ecc>1) Mech.draw.text(c,'e='+(ecc/s).toFixed(1),(x+pCx)/2+6,(y+pCy)/2-6,{color:'rgba(161,161,170,0.7)',font:Math.round(10*s)+'px sans-serif',align:'left'});
}

function resize(){
  var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();
  canvasEl.width=r.width*d;canvasEl.height=r.height*d;
  ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height};
}

function draw(){
  var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);
  var sizes=[{s:0.7,l:'0.7×'},{s:P.scale,l:'当前 '+P.scale.toFixed(1)+'×'},{s:1.4,l:'1.4×'}];
  var gap=w/sizes.length;
  for(var i=0;i<sizes.length;i++){
    var si=sizes[i];
    var pos={x:gap*i+gap/2, y:h*0.45};
    drawCamDisk(ctx,pos.x,pos.y,si.s,P);
    drawSupport(ctx,pos.x,pos.y,si.s);
    Mech.draw.text(ctx,si.l,pos.x,pos.y+P.r*si.s+30*si.s,{color:Mech.colors.textDim,font:Math.round(11*si.s)+'px sans-serif',align:'center'});
  }
  updateFunc();
}

function updateFunc(){
  var p=P;
  document.getElementById('funcOut').textContent=
'drawCamDisk(ctx, x, y, scale, opts) {\n'+
'  opts = opts || {}; var s = scale || 1;\n'+
'  var r = '+p.r+'*s, eX = '+p.eccX+'*s, eY = '+p.eccY+'*s;\n'+
'  var sR = '+p.shaftR+'*s, cR = '+p.crossR+'*s, lw = '+p.lineW.toFixed(1)+'*s;\n'+
'  var pCx = x+eX, pCy = y+eY;\n'+
'  // 轮廓圆\n'+
'  ctx.beginPath(); ctx.arc(pCx, pCy, r, 0, Math.PI*2);\n'+
'    ctx.strokeStyle = Mech.colors.accent; ctx.lineWidth = lw; ctx.stroke();\n'+
'    ctx.fillStyle = "rgba(99,102,241,'+p.fillA.toFixed(2)+')"; ctx.fill();\n'+
'  // 转轴\n'+
'  ctx.lineWidth = 2*s; ctx.beginPath(); ctx.arc(x,y,sR,0,Math.PI*2); ctx.stroke();\n'+
'  // 十字\n'+
'  ctx.lineWidth = 1.2*s; ctx.beginPath();\n'+
'    ctx.moveTo(x-cR,y); ctx.lineTo(x+cR,y);\n'+
'    ctx.moveTo(x,y-cR); ctx.lineTo(x,y+cR); ctx.stroke();\n'+
'}';
}

function copyFunc(){navigator.clipboard.writeText(document.getElementById('funcOut').textContent).then(function(){alert('已复制')})}

['r','eccX','eccY','shaftR','crossR'].forEach(function(id){
  var el=document.getElementById(id),v=document.getElementById(id+'-v');
  el.addEventListener('input',function(){P[id]=parseInt(el.value);v.textContent=el.value;draw()});
});
document.getElementById('scale').addEventListener('input',function(){
  P.scale=parseInt(this.value)/10;document.getElementById('scale-v').textContent=P.scale.toFixed(1);draw();
});
document.getElementById('lineW').addEventListener('input',function(){
  P.lineW=parseInt(this.value)/10;document.getElementById('lineW-v').textContent=P.lineW.toFixed(1);draw();
});
document.getElementById('fillA').addEventListener('input',function(){
  P.fillA=parseInt(this.value)/100;document.getElementById('fillA-v').textContent=P.fillA.toFixed(2);draw();
});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
