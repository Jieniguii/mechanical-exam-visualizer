<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元件调试 — 偏心圆盘凸轮</title>
<link rel="stylesheet" href="../mech.css">
<style>/* Comp page extras — extends mech.css layout */
.comp-ref { padding: 12px 14px; border-top: 1px solid var(--border); }
.comp-ref img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
.comp-ref .caption { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-row label { flex: 0 0 80px; font-size: 12px; color: var(--text-dim); }
.ctrl-row input[type=range] { flex: 1; accent-color: var(--accent); }
.ctrl-row .val { flex: 0 0 34px; font-size: 11px; color: var(--accent); text-align: right; font-family: monospace; }
.func-output { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 10px; color: #a5f3fc; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }</style>
</head>
<body>
<a href="index.html" class="back-btn">&larr; 返回</a>
<div class="header">
  <h1>偏心圆盘凸轮 <span class="version-badge">comp</span></h1>
  <p>对照教材图调参数 → 一致后告诉我锁死</p>
</div>
<div class="app">
<div class="main-layout">
  <div>
    <div class="canvas-card">
      <div class="canvas-wrapper"><canvas id="canvas"></canvas></div>
      <div class="comp-ref">
        <img src="ref/textbook-3c.png" alt="教材3(c)">
        <div class="caption">教材图3(c) — 偏心圆盘+转轴十字+固定支座</div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">参数调节</div>
      <div class="ctrl-row"><label>轮廓圆心X</label><input type="range" id="pCx" min="180" max="280" value="225"><span class="val" id="pCx-v">225</span></div>
      <div class="ctrl-row"><label>轮廓圆心Y</label><input type="range" id="pCy" min="200" max="280" value="245"><span class="val" id="pCy-v">245</span></div>
      <div class="ctrl-row"><label>轮廓半径</label><input type="range" id="r" min="20" max="70" value="44"><span class="val" id="r-v">44</span></div>
      <div class="ctrl-row"><label>转轴X</label><input type="range" id="cx" min="180" max="250" value="210"><span class="val" id="cx-v">210</span></div>
      <div class="ctrl-row"><label>转轴Y</label><input type="range" id="cy" min="220" max="300" value="265"><span class="val" id="cy-v">265</span></div>
      <div class="ctrl-row"><label>十字半径</label><input type="range" id="crossR" min="3" max="12" value="6"><span class="val" id="crossR-v">6</span></div>
      <div class="ctrl-row"><label>轴圆半径</label><input type="range" id="shaftR" min="2" max="8" value="4"><span class="val" id="shaftR-v">4</span></div>
      <div class="ctrl-row"><label>轮廓线宽</label><input type="range" id="lineW" min="15" max="45" value="28" step="1"><span class="val" id="lineW-v">2.8</span></div>
      <div class="ctrl-row"><label>填充透明</label><input type="range" id="fillA" min="0" max="20" value="6"><span class="val" id="fillA-v">0.06</span></div>
    </div>
  </div>
</div>
</div>
<script src="../mech.js"></script>
<script>
var canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
var P={pCx:225,pCy:245,r:44,cx:210,cy:265,crossR:6,shaftR:4,lineW:2.8,fillA:0.06};
function drawSupport(c,x,y,s){var tH=14*s,tW=12*s,bW=tW+4*s;c.strokeStyle=Mech.colors.hinge;c.lineWidth=1.8*s;c.beginPath();c.moveTo(x,y);c.lineTo(x-tW,y+tH);c.lineTo(x+tW,y+tH);c.closePath();c.stroke();c.lineWidth=1.5*s;c.beginPath();c.moveTo(x-bW,y+tH);c.lineTo(x+bW,y+tH);c.stroke();c.lineWidth=1*s;for(var i=0;i<5;i++){var hx=x-bW+3*s+i*((2*bW-6*s)/4);c.beginPath();c.moveTo(hx,y+tH);c.lineTo(hx-8*s*0.6,y+tH+8*s*0.6);c.stroke()}}
function resize(){var d=window.devicePixelRatio||1,r=canvasEl.getBoundingClientRect();canvasEl.width=r.width*d;canvasEl.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height}}
function draw(){var dim=resize(),w=dim.w,h=dim.h;ctx.clearRect(0,0,w,h);var RW=460,RH=360,px=30,py=30,sx=(w-px*2)/RW,sy=(h-py*2)/RH,sc=Math.min(sx,sy),ox=(w-RW*sc)/2,oy=(h-RH*sc)/2;ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);var C=Mech.colors;ctx.beginPath();ctx.arc(P.pCx,P.pCy,P.r,0,Math.PI*2);ctx.strokeStyle=C.accent;ctx.lineWidth=P.lineW;ctx.stroke();ctx.fillStyle='rgba(99,102,241,'+P.fillA+')';ctx.fill();ctx.strokeStyle=C.accent;ctx.lineWidth=2;ctx.beginPath();ctx.arc(P.cx,P.cy,P.shaftR,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(P.cx-P.crossR,P.cy);ctx.lineTo(P.cx+P.crossR,P.cy);ctx.moveTo(P.cx,P.cy-P.crossR);ctx.lineTo(P.cx,P.cy+P.crossR);ctx.stroke();drawSupport(ctx,P.cx,P.cy,1.2);Mech.draw.text(ctx,'2',P.pCx+P.r+10,P.pCy+4,{color:C.accent,font:'bold 14px sans-serif',align:'left'});ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(161,161,170,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.cx,P.cy);ctx.lineTo(P.pCx,P.pCy);ctx.stroke();ctx.setLineDash([]);var ecc=Math.sqrt(Math.pow(P.pCx-P.cx,2)+Math.pow(P.pCy-P.cy,2));Mech.draw.text(ctx,'e='+ecc.toFixed(1),(P.cx+P.pCx)/2+8,(P.cy+P.pCy)/2-8,{color:'rgba(161,161,170,0.7)',font:'10px sans-serif',align:'left'});ctx.restore()}
Object.keys(P).forEach(function(k){var el=document.getElementById(k);if(!el)return;var v=document.getElementById(k+'-v');el.addEventListener('input',function(){var n=parseFloat(el.value);if(k==='lineW'){P[k]=n/10;v.textContent=(n/10).toFixed(1)}else if(k==='fillA'){P[k]=n/100;v.textContent=(n/100).toFixed(2)}else{P[k]=n;v.textContent=Math.round(n)}draw()})});
window.addEventListener('resize',draw);draw();
</script>
</body>
</html>
