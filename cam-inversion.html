<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>凸轮反转法交互演示 — 机械考研可视化</title>
<link rel="stylesheet" href="mech.css">
</head>
<body>
<a href="ch4-cam.html" class="back-btn">← 返回章节</a>

<div class="header">
  <h1>凸轮反转法交互演示 <span class="version-badge">v2.0</span></h1>
  <p>盘形凸轮机构廓线设计 · 反转法原理 · 四种从动件对比</p>
</div>

<div class="app">
  <div class="main-layout">
    <div>
      <div class="canvas-card">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="canvas-toolbar" id="toolbar"></div>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script src="mech.js"></script>
<script>
const DEG = Math.PI / 180;
const PI = Math.PI;

// ===== 模块状态 =====
let mode = 'inversion';
let followerType = 'pointed';
let r0 = 40, h = 25, e = 0, rr = 8, psiMax = 18, armLen = 80;
let p1 = 120, p2 = 60, p3 = 120, p4 = 60;
let delta = 0;
let speed = 1;
let traceUpTo = 0;
let flatHalfWidth = 35;
const show = { base: true, theory: true, actual: true, offset: false, pressure: true, phase: true, sd: true };

// ===== Canvas + 动画 =====
const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
let cx, cy, scale;

const anim = Mech.createAnimator(
  dt => {
    delta += speed * 0.8 * dt;
    if (delta > PI * 2) delta -= PI * 2;
  },
  () => draw()
);

// ===== 运动规律（SHM，模块特有）=====
function getS(dDeg) {
  const d = ((dDeg % 360) + 360) % 360;
  if (d <= p1 && p1 > 0) return (h / 2) * (1 - Math.cos(PI * d / p1));
  if (d <= p1 + p2) return h;
  if (d <= p1 + p2 + p3 && p3 > 0) return (h / 2) * (1 + Math.cos(PI * (d - p1 - p2) / p3));
  return 0;
}
function getDs(dDeg) {
  const d = ((dDeg % 360) + 360) % 360;
  if (d <= p1 && p1 > 0) return (h * PI / (2 * p1)) * Math.sin(PI * d / p1);
  if (d <= p1 + p2) return 0;
  if (d <= p1 + p2 + p3 && p3 > 0) return -(h * PI / (2 * p3)) * Math.sin(PI * (d - p1 - p2) / p3);
  return 0;
}
function getPsi(dDeg) {
  const d = ((dDeg % 360) + 360) % 360;
  const max = psiMax * DEG;
  if (d <= p1 && p1 > 0) return (max / 2) * (1 - Math.cos(PI * d / p1));
  if (d <= p1 + p2) return max;
  if (d <= p1 + p2 + p3 && p3 > 0) return (max / 2) * (1 + Math.cos(PI * (d - p1 - p2) / p3));
  return 0;
}
function getPhase(dDeg) {
  const d = ((dDeg % 360) + 360) % 360;
  if (d <= p1) return '推程';
  if (d <= p1 + p2) return '远休止';
  if (d <= p1 + p2 + p3) return '回程';
  return '近休止';
}

// ===== 廓线计算（CCW参数化，模块特有）=====
function getProfilePoint(dDeg) {
  const s = getS(dDeg), ds = getDs(dDeg);
  const rad = dDeg * DEG, sinD = Math.sin(rad), cosD = Math.cos(rad);
  switch (followerType) {
    case 'pointed': {
      const s0 = (e > 0) ? Math.sqrt(Math.max(0, r0 * r0 - e * e)) : r0;
      const total = s0 + s;
      return { x: -total * sinD + e * cosD, y: total * cosD + e * sinD, s: total, ds };
    }
    case 'roller': {
      const s0 = (e > 0) ? Math.sqrt(Math.max(0, (r0 + rr) * (r0 + rr) - e * e)) : r0 + rr;
      const total = s0 + s;
      return { x: -total * sinD + e * cosD, y: total * cosD + e * sinD, s: total, ds };
    }
    case 'flat': {
      const total = r0 + s;
      const dsRad = ds * (180 / PI);
      return { x: -total * sinD - dsRad * cosD, y: total * cosD - dsRad * sinD, s: total, ds: dsRad };
    }
    case 'oscillating': {
      const psi = getPsi(dDeg), L = r0 + armLen;
      return { x: -L * sinD + armLen * Math.sin(psi + rad), y: L * cosD - armLen * Math.cos(psi + rad), s: psi, ds: 0 };
    }
  }
}

function getMaxRadius() {
  let maxR = 0;
  for (let d = 0; d < 360; d++) {
    const p = getProfilePoint(d);
    maxR = Math.max(maxR, Math.sqrt(p.x * p.x + p.y * p.y));
  }
  if (followerType === 'roller') maxR += rr;
  if (followerType === 'oscillating') maxR = Math.max(maxR, r0 + armLen + armLen * Math.sin(psiMax * DEG));
  return maxR + 15;
}

function computeProfile() {
  const pts = [];
  for (let d = 0; d < 360; d++) pts.push(getProfilePoint(d));
  return pts;
}

function computeActualProfile(theoPts) {
  if (followerType !== 'roller') return [];
  const pts = [];
  for (let i = 0; i < theoPts.length; i++) {
    const prev = theoPts[(i - 1 + 360) % 360], next = theoPts[(i + 1) % 360], curr = theoPts[i];
    const tx = next.x - prev.x, ty = next.y - prev.y;
    const len = Math.sqrt(tx * tx + ty * ty);
    if (len < 0.01) { pts.push({ x: curr.x, y: curr.y }); continue; }
    const nx = ty / len, ny = -tx / len;
    const midR = Math.sqrt(curr.x * curr.x + curr.y * curr.y);
    const outerR = Math.sqrt((curr.x + nx * 5) ** 2 + (curr.y + ny * 5) ** 2);
    const sign = outerR > midR ? 1 : -1;
    pts.push({ x: curr.x - sign * nx * rr, y: curr.y - sign * ny * rr });
  }
  return pts;
}

function getPressureAngle(dDeg) {
  if (followerType === 'flat') return 0;
  const curr = getProfilePoint(dDeg);
  const next = getProfilePoint(dDeg + 0.5), prev = getProfilePoint(dDeg - 0.5);
  const tx = next.x - prev.x, ty = next.y - prev.y;
  const tLen = Math.sqrt(tx * tx + ty * ty);
  if (tLen < 0.001) return 0;
  let nx = ty / tLen, ny = -tx / tLen;
  const midR = Math.sqrt(curr.x * curr.x + curr.y * curr.y);
  const outerR = Math.sqrt((curr.x + nx * 2) ** 2 + (curr.y + ny * 2) ** 2);
  if (outerR < midR) { nx = -nx; ny = -ny; }
  let vx, vy;
  if (followerType === 'oscillating') {
    const psi = getPsi(dDeg), L = r0 + armLen, rad = dDeg * DEG;
    const ax = -L * Math.sin(rad), ay = L * Math.cos(rad);
    const armDx = curr.x - ax, armDy = curr.y - ay;
    const al2 = Math.sqrt(armDx * armDx + armDy * armDy);
    if (al2 < 0.01) return 0;
    vx = -armDy / al2; vy = armDx / al2;
  } else {
    const rad = dDeg * DEG;
    vx = -Math.sin(rad); vy = Math.cos(rad);
  }
  const dot = nx * vx + ny * vy, cross = nx * vy - ny * vx;
  let angle = Math.abs(Math.atan2(cross, dot));
  if (angle > PI / 2) angle = PI - angle;
  return angle;
}

function getRollerContactMath(degNow, actualProfile) {
  const idx = ((Math.round(degNow) % 360) + 360) % 360;
  const ap = actualProfile[idx];
  return ap || { x: 0, y: 0 };
}

// ===== 布局 =====
function computeLayout() {
  const { w, h } = getDimensions();
  const maxR = getMaxRadius() + 20;
  const avail = Math.min(w * 0.42, h * 0.42);
  scale = avail / Math.max(maxR, 1);
  cx = w * 0.46; cy = h * 0.44;
}

// ===== 绘制辅助（模块特有）=====
function drawCircleShape(x, y, r, stroke, dash) {
  ctx.beginPath(); ctx.arc(x, y, Math.max(r, 0.1), 0, PI * 2);
  ctx.strokeStyle = stroke; ctx.lineWidth = 1;
  if (dash) ctx.setLineDash(dash); ctx.stroke(); ctx.setLineDash([]);
}

function drawProfilePath(points, angle, options) {
  ctx.save(); ctx.translate(cx, cy); if (angle) ctx.rotate(angle);
  ctx.beginPath();
  for (let i = 0; i <= points.length; i++) {
    const p = points[i % points.length];
    if (i === 0) ctx.moveTo(p.x * scale, -p.y * scale); else ctx.lineTo(p.x * scale, -p.y * scale);
  }
  ctx.closePath();
  if (options.fill) { ctx.fillStyle = options.fill; ctx.fill(); }
  if (options.stroke) {
    ctx.strokeStyle = options.stroke; ctx.lineWidth = options.lineWidth || 2;
    if (options.dash) ctx.setLineDash(options.dash); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawPartialProfile(points, upToDeg, revealedColor, bgColor, camFill) {
  const n = Math.ceil(upToDeg) % 360;
  ctx.save(); ctx.translate(cx, cy);
  ctx.beginPath();
  for (let i = 0; i <= points.length; i++) {
    const p = points[i % points.length];
    if (i === 0) ctx.moveTo(p.x * scale, -p.y * scale); else ctx.lineTo(p.x * scale, -p.y * scale);
  }
  ctx.closePath();
  ctx.fillStyle = camFill || 'rgba(71,85,105,0.35)'; ctx.fill();
  ctx.strokeStyle = bgColor || 'rgba(148,163,184,0.4)'; ctx.lineWidth = 1.5; ctx.setLineDash([]); ctx.stroke();
  if (n >= 1 && revealedColor) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const p = points[i];
      if (i === 0) ctx.moveTo(p.x * scale, -p.y * scale); else ctx.lineTo(p.x * scale, -p.y * scale);
    }
    ctx.strokeStyle = revealedColor; ctx.lineWidth = 2.5; ctx.stroke();
  }
  ctx.restore();
}

function drawGround(x, y, w) {
  ctx.strokeStyle = '#52525b'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x - w/2, y); ctx.lineTo(x + w/2, y); ctx.stroke();
  for (let i = -w/2; i < w/2; i += 6) {
    ctx.beginPath(); ctx.moveTo(x+i, y); ctx.lineTo(x+i-4, y+5); ctx.stroke();
  }
}

function drawRotationArrow(x, y, r, ccw) {
  const start = ccw ? 0.5 : -0.5, end = ccw ? -1.5 : 1.5;
  ctx.strokeStyle = 'rgba(228,228,231,0.45)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(x, y, r, start, end, ccw); ctx.stroke();
  const tipA = end, tx = x + r * Math.cos(tipA), ty = y + r * Math.sin(tipA);
  const bA = ccw ? tipA + 0.25 : tipA - 0.25, sp = 2.5;
  ctx.fillStyle = 'rgba(228,228,231,0.7)';
  ctx.beginPath(); ctx.moveTo(tx, ty);
  ctx.lineTo(x+(r+sp)*Math.cos(bA), y+(r+sp)*Math.sin(bA));
  ctx.lineTo(x+(r-sp)*Math.cos(bA), y+(r-sp)*Math.sin(bA));
  ctx.closePath(); ctx.fill();
}

function drawGuideBlock(x, y, w, h) {
  ctx.fillStyle = '#2d3344'; ctx.fillRect(x - w/2, y, w, h);
  ctx.strokeStyle = '#52525b'; ctx.lineWidth = 1; ctx.strokeRect(x - w/2, y, w, h);
  ctx.save(); ctx.beginPath(); ctx.rect(x - w/2, y, w, h); ctx.clip();
  ctx.strokeStyle = 'rgba(100,116,139,0.4)'; ctx.lineWidth = 0.8;
  for (let i = -h; i < w + h; i += 5) {
    ctx.beginPath(); ctx.moveTo(x - w/2 + i, y + h); ctx.lineTo(x - w/2 + i - h, y); ctx.stroke();
  }
  ctx.restore();
}

// ===== 从动件绘制（全局坐标）=====
function drawPencilAt(absX, tipY, baseY) {
  const tipSize = 6;
  ctx.fillStyle = '#34d399';
  ctx.beginPath();
  ctx.moveTo(absX, tipY);
  ctx.lineTo(absX - tipSize/2, tipY - tipSize);
  ctx.lineTo(absX + tipSize/2, tipY - tipSize);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(absX, tipY - tipSize); ctx.lineTo(absX, tipY - 80); ctx.stroke();
  ctx.beginPath(); ctx.arc(absX, tipY, 2.5, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
}

function drawRollerAt(absX, tipY, baseY, degNow, camAngle, actualProfile) {
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(absX, tipY, rr*scale, 0, PI*2); ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(absX, tipY, 3, 0, PI*2); ctx.stroke();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(absX, tipY); ctx.lineTo(absX, tipY - 80); ctx.stroke();
  const cpMath = getRollerContactMath(degNow, actualProfile);
  const cosA = Math.cos(camAngle), sinA = Math.sin(camAngle);
  const contactX = cx + (cpMath.x * cosA + cpMath.y * sinA) * scale;
  const contactY = cy + (cpMath.x * sinA - cpMath.y * cosA) * scale;
  ctx.beginPath(); ctx.arc(contactX, contactY, 3, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
}

function drawFlatAt(absX, tipY, baseY, dsOffset) {
  const halfFlat = flatHalfWidth;
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(absX-halfFlat, tipY); ctx.lineTo(absX+halfFlat, tipY); ctx.stroke();
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(absX - 8, tipY - 5); ctx.lineTo(absX - 8, tipY + 5);
  ctx.moveTo(absX + 8, tipY - 5); ctx.lineTo(absX + 8, tipY + 5); ctx.stroke();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(absX, tipY); ctx.lineTo(absX, tipY - 80); ctx.stroke();
  ctx.beginPath(); ctx.arc(absX + dsOffset, tipY, 2.5, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
}

// ===== 从动件绘制（局部坐标，反转法模式）=====
function drawPencilInLocal(lx, tipY, baseY) {
  const tipSize = 6;
  ctx.fillStyle = '#34d399';
  ctx.beginPath();
  ctx.moveTo(lx, tipY);
  ctx.lineTo(lx - tipSize/2, tipY - tipSize);
  ctx.lineTo(lx + tipSize/2, tipY - tipSize);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, tipY - tipSize); ctx.lineTo(lx, tipY - 80); ctx.stroke();
  ctx.beginPath(); ctx.arc(lx, tipY, 2.5, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
}

function drawRollerInLocal(lx, tipY, baseY) {
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(lx, tipY, rr*scale, 0, PI*2); ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(lx, tipY, 3, 0, PI*2); ctx.stroke();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, tipY); ctx.lineTo(lx, tipY - 80); ctx.stroke();
}

function drawFlatInLocal(lx, tipY, baseY, dsOffset) {
  const halfFlat = flatHalfWidth;
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(lx-halfFlat, tipY); ctx.lineTo(lx+halfFlat, tipY); ctx.stroke();
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx - 8, tipY - 5); ctx.lineTo(lx - 8, tipY + 5);
  ctx.moveTo(lx + 8, tipY - 5); ctx.lineTo(lx + 8, tipY + 5); ctx.stroke();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, tipY); ctx.lineTo(lx, tipY - 80); ctx.stroke();
  ctx.beginPath(); ctx.arc(lx + dsOffset, tipY, 2.5, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
}

// ===== 主绘制 =====
function draw() {
  const { w, h } = getDimensions();
  ctx.fillStyle = '#0f1117'; ctx.fillRect(0, 0, w, h);
  computeLayout();
  const profile = computeProfile();
  if (followerType === 'flat') {
    let maxDs = 0;
    for (let d = 0; d < 360; d++) maxDs = Math.max(maxDs, Math.abs(profile[d].ds));
    flatHalfWidth = Math.max(35, (maxDs + 5) * scale);
  } else flatHalfWidth = 35;
  const actualProfile = computeActualProfile(profile);
  const degNow = ((delta * 180 / PI) % 360 + 360) % 360;
  const sNow = getS(degNow), psiNow = getPsi(degNow), phaseNow = getPhase(degNow);
  const camFill = 'rgba(71,85,105,0.35)', camStroke = '#94a3b8';
  if (mode === 'actual') drawActualMode(profile, actualProfile, degNow, sNow, psiNow, camFill, camStroke);
  else drawInversionMode(profile, actualProfile, degNow, sNow, camFill, camStroke);
  if (show.sd) drawSDiagram(degNow, w, h);
  updateInfo(degNow, sNow, psiNow, phaseNow);
}

function drawActualMode(profile, actualProfile, degNow, sNow, psiNow, camFill, camStroke) {
  const camAngle = delta;
  if (followerType === 'roller') {
    drawProfilePath(actualProfile, camAngle, { fill: camFill, stroke: '#f97316', lineWidth: 2 });
    if (show.theory) drawProfilePath(profile, camAngle, { stroke: 'rgba(251,191,36,0.5)', lineWidth: 1, dash: [5,4] });
  } else {
    drawProfilePath(profile, camAngle, { fill: camFill, stroke: camStroke, lineWidth: 1.5 });
  }
  if (show.base) {
    drawCircleShape(cx, cy, r0*scale, 'rgba(99,102,241,0.3)', [5,4]);
    Mech.draw.text(ctx, 'r₀='+r0, cx+r0*scale*0.7+6, cy-r0*scale*0.7, { color: 'rgba(99,102,241,0.5)', font: '11px sans-serif', align: 'left' });
  }
  if (show.phase) drawPhaseArcs(camAngle);
  Mech.draw.point(ctx, cx, cy, { color: Mech.colors.accent, r: 3 });
  drawRotationArrow(cx, cy, 14, false);
  Mech.draw.text(ctx, 'ω', cx+18, cy-12, { color: 'rgba(228,228,231,0.5)', font: '11px sans-serif', align: 'left' });

  const s0raw = (e>0)?Math.sqrt(Math.max(0,r0*r0-e*e)):r0;
  const s0 = (followerType === 'roller') ? ((e>0)?Math.sqrt(Math.max(0,(r0+rr)**2-e*e)):(r0+rr)) : s0raw;
  const totalS = s0 + sNow;
  const guideX = cx + e * scale;
  const tipY = cy - totalS * scale;

  if (followerType === 'oscillating') {
    drawOscillatingActual(degNow, psiNow, camAngle);
  } else {
    const guideBlockY = cy - (r0 + h + 30) * scale;
    if (followerType === 'pointed') drawPencilAt(guideX, tipY, guideBlockY);
    else if (followerType === 'roller') drawRollerAt(guideX, tipY, guideBlockY, degNow, camAngle, actualProfile);
    else drawFlatAt(guideX, tipY, guideBlockY, -profile[Math.round(degNow)%360].ds * scale);
  }
  if (show.pressure) drawPressureAnnotation(degNow, camAngle);
}

function drawPhaseArcs(camAngle) {
  const colors = ['rgba(99,102,241,0.25)','rgba(52,211,153,0.25)','rgba(251,191,36,0.25)','rgba(113,113,122,0.1)'];
  const angles = [p1,p2,p3,p4];
  ctx.save(); ctx.translate(cx, cy); if (camAngle) ctx.rotate(camAngle);
  let startA = -PI/2;
  for (let i = 0; i < 4; i++) {
    if (angles[i] > 0) { ctx.beginPath(); ctx.arc(0,0,(r0-3)*scale,startA,startA+angles[i]*DEG); ctx.strokeStyle=colors[i]; ctx.lineWidth=3; ctx.stroke(); }
    startA += angles[i]*DEG;
  }
  ctx.restore();
}

function drawOscillatingActual(degNow, psiNow, camAngle) {
  const L = r0 + armLen;
  const pivot = { x: cx, y: cy - L * scale };
  const cp = getProfilePoint(degNow);
  const cosA = Math.cos(camAngle), sinA = Math.sin(camAngle);
  const contact = { x: cx + (cp.x * cosA + cp.y * sinA) * scale, y: cy + (cp.x * sinA - cp.y * cosA) * scale };
  drawGround(pivot.x, pivot.y - 8, 30);
  ctx.beginPath(); ctx.arc(pivot.x, pivot.y, 5, 0, PI*2); ctx.fillStyle = '#71717a'; ctx.fill();
  ctx.strokeStyle = '#52525b'; ctx.lineWidth = 1; ctx.stroke();
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(pivot.x, pivot.y); ctx.lineTo(contact.x, contact.y); ctx.stroke(); ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.arc(contact.x, contact.y, 2.5, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
}

function drawInversionMode(profile, actualProfile, degNow, sNow, camFill, camStroke) {
  if (anim.isPlaying()) traceUpTo = degNow;
  const s0raw = (e>0)?Math.sqrt(Math.max(0,r0*r0-e*e)):r0;
  const s0 = (followerType === 'roller') ? ((e>0)?Math.sqrt(Math.max(0,(r0+rr)**2-e*e)):(r0+rr)) : s0raw;
  const totalS = s0 + sNow;

  if (show.base) {
    drawCircleShape(cx, cy, r0*scale, 'rgba(99,102,241,0.3)', [5,4]);
    Mech.draw.text(ctx, 'r₀='+r0, cx+r0*scale*0.7+6, cy-r0*scale*0.7, { color: 'rgba(99,102,241,0.5)', font: '11px sans-serif', align: 'left' });
  }
  if (show.offset && e>0 && followerType!=='oscillating' && followerType!=='flat') {
    drawCircleShape(cx, cy, e*scale, 'rgba(239,68,68,0.25)', [3,3]);
    Mech.draw.text(ctx, 'e='+e, cx+e*scale+4, cy+2, { color: 'rgba(239,68,68,0.4)', font: '10px sans-serif', align: 'left' });
  }
  if (show.phase) drawPhaseArcs(0);

  if (followerType === 'roller') {
    drawPartialProfile(actualProfile, traceUpTo, show.actual ? '#f97316' : null, 'rgba(249,115,22,0.5)', 'rgba(71,85,105,0.35)');
    if (show.theory) {
      ctx.save(); ctx.translate(cx, cy); ctx.setLineDash([5, 4]); ctx.beginPath();
      for (let i = 0; i <= profile.length; i++) {
        const p = profile[i % profile.length];
        if (i === 0) ctx.moveTo(p.x * scale, -p.y * scale); else ctx.lineTo(p.x * scale, -p.y * scale);
      }
      ctx.closePath(); ctx.strokeStyle = 'rgba(251,191,36,0.5)'; ctx.lineWidth = 1; ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }
  } else {
    drawPartialProfile(profile, traceUpTo, show.theory ? '#fbbf24' : null, 'rgba(148,163,184,0.4)', 'rgba(71,85,105,0.35)');
  }

  Mech.draw.point(ctx, cx, cy, { color: Mech.colors.accent, r: 3 });

  // 从动件（反转坐标系内）
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(-degNow * DEG);
  if (followerType === 'oscillating') {
    const psi = getPsi(degNow), L = r0 + armLen;
    const pivotX = 0, pivotY = -L * scale;
    const tipX = pivotX + armLen * Math.sin(psi) * scale;
    const tipY = pivotY + armLen * Math.cos(psi) * scale;
    drawGround(pivotX, pivotY - 8, 30);
    ctx.beginPath(); ctx.arc(pivotX, pivotY, 4, 0, PI*2); ctx.fillStyle='#71717a'; ctx.fill();
    ctx.strokeStyle='#34d399'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(tipX, tipY); ctx.stroke(); ctx.lineCap='butt';
    ctx.beginPath(); ctx.arc(tipX, tipY, 2.5, 0, PI*2); ctx.fillStyle='#f97316'; ctx.fill();
  } else {
    const guideLocalX = e * scale, tipLocalY = -totalS * scale;
    const guideBlockLocalY = -(r0 + h + 30) * scale;
    if (followerType === 'pointed') drawPencilInLocal(guideLocalX, tipLocalY, guideBlockLocalY);
    else if (followerType === 'roller') drawRollerInLocal(guideLocalX, tipLocalY, guideBlockLocalY);
    else drawFlatInLocal(guideLocalX, tipLocalY, guideBlockLocalY, -profile[Math.round(degNow)%360].ds * scale);
  }
  ctx.restore();

  // 滚子接触点（全局坐标）
  if (followerType === 'roller') {
    const cpMath = getRollerContactMath(degNow, actualProfile);
    const contactGx = cx + cpMath.x * scale, contactGy = cy - cpMath.y * scale;
    ctx.beginPath(); ctx.arc(contactGx, contactGy, 3, 0, PI*2); ctx.fillStyle = '#fbbf24'; ctx.fill();
  }

  drawRotationArrow(cx, cy, 20, true);
  Mech.draw.text(ctx, '-ω', cx+24, cy-16, { color: 'rgba(228,228,231,0.5)', font: '10px sans-serif', align: 'left' });
  if (show.pressure) drawPressureAnnotation(degNow, 0);
}

function drawPressureAnnotation(degNow, camAngle) {
  const alpha = getPressureAngle(degNow);
  const alphaDeg = alpha * 180 / PI;
  if (alphaDeg < 1 || alphaDeg > 89) return;
  const pt = getProfilePoint(degNow);
  const cosA = Math.cos(camAngle), sinA = Math.sin(camAngle);
  const gx = cx + (pt.x*cosA + pt.y*sinA)*scale;
  const gy = cy - (-pt.x*sinA + pt.y*cosA)*scale;
  const prev = getProfilePoint(degNow-0.5), next = getProfilePoint(degNow+0.5);
  const tCamX=next.x-prev.x, tCamY=next.y-prev.y;
  const tLen=Math.sqrt(tCamX*tCamX+tCamY*tCamY);
  if(tLen<0.001) return;
  let nCamX=tCamY/tLen, nCamY=-tCamX/tLen;
  const midR=Math.sqrt(pt.x*pt.x+pt.y*pt.y);
  if(Math.sqrt((pt.x+nCamX*2)**2+(pt.y+nCamY*2)**2)<midR){nCamX=-nCamX;nCamY=-nCamY;}
  const nRX=nCamX*cosA+nCamY*sinA, nRY=-nCamX*sinA+nCamY*cosA;
  const nGx=nRX*20, nGy=-nRY*20;
  ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+nGx,gy+nGy);
  ctx.strokeStyle=alphaDeg>45?'#ef4444':'rgba(251,191,36,0.7)'; ctx.lineWidth=1;
  ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
  Mech.draw.text(ctx, 'α='+alphaDeg.toFixed(1)+'°', gx+nGx+4, gy+nGy-2,
    { color: alphaDeg>45?'#ef4444':'#fbbf24', font: '10px sans-serif', align: 'left' });
}

function drawSDiagram(degNow, w, ch) {
  const dw=Math.min(160,w*0.25), dh=Math.min(100,ch*0.15);
  const dx=w-dw-16, dy=ch-dh-16;
  ctx.fillStyle='rgba(15,17,23,0.85)'; ctx.strokeStyle='#252833'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(dx,dy,dw,dh,8); ctx.fill(); ctx.stroke();
  const pad=24, pw=dw-pad-10, ph=dh-pad-10, ox=dx+pad, oy=dy+dh-pad;
  const isOsc=followerType==='oscillating';
  Mech.draw.text(ctx, isOsc?'ψ-δ':'s-δ', ox, dy+14, { color: '#71717a', font: '10px sans-serif', align: 'left' });
  ctx.strokeStyle='#3a3d47'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(ox,dy+20); ctx.lineTo(ox,oy); ctx.lineTo(ox+pw,oy); ctx.stroke();
  const phases=[p1,p2,p3,p4];
  const pColors=['rgba(99,102,241,0.08)','rgba(52,211,153,0.08)','rgba(251,191,36,0.08)','rgba(113,113,122,0.05)'];
  let px=ox;
  for(let i=0;i<4;i++){const ww=phases[i]/360*pw;ctx.fillStyle=pColors[i];ctx.fillRect(px,dy+20,ww,ph);px+=ww;}
  ctx.beginPath();
  for(let d=0;d<=360;d+=2){const val=isOsc?getPsi(d)/(psiMax*DEG):getS(d)/Math.max(h,1);const x=ox+(d/360)*pw,y=oy-val*ph;if(d===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.strokeStyle='rgba(228,228,231,0.5)'; ctx.lineWidth=1; ctx.stroke();
  const val=isOsc?getPsi(degNow)/(psiMax*DEG):getS(degNow)/Math.max(h,1);
  const cpx=ox+(degNow/360)*pw, cpy=oy-val*ph;
  Mech.draw.point(ctx, cpx, cpy, { color: '#ef4444', r: 4 });
  ctx.beginPath(); ctx.arc(cpx, cpy, 2, 0, PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.setLineDash([2,2]); ctx.strokeStyle='rgba(239,68,68,0.3)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(cpx,cpy); ctx.lineTo(cpx,oy); ctx.moveTo(cpx,cpy); ctx.lineTo(ox,cpy); ctx.stroke(); ctx.setLineDash([]);
  Mech.draw.text(ctx, '0°', ox-2, oy+10, { color: '#52525b', font: '9px sans-serif', align: 'left' });
  Mech.draw.text(ctx, '360°', ox+pw-10, oy+10, { color: '#52525b', font: '9px sans-serif', align: 'left' });
}

// ===== 信息更新 =====
const ui = {};
function updateInfo(degNow, sNow, psiNow, phaseNow) {
  ui.infoDelta.textContent = degNow.toFixed(1)+'°';
  const isOsc = followerType==='oscillating';
  ui.infoDispLabel.textContent = isOsc?'摆角 ψ':'位移 s';
  ui.infoDisp.textContent = isOsc?(psiNow*180/PI).toFixed(1)+'°':sNow.toFixed(1);
  const alphaDeg = getPressureAngle(degNow)*180/PI;
  ui.infoAlpha.textContent = alphaDeg.toFixed(1)+'°';
  ui.infoAlpha.style.color = alphaDeg>50?'#f87171':'';
  ui.infoPhase.textContent = phaseNow;
  ui.infoPhase.style.color = phaseNow==='推程'?'#a5b4fc':phaseNow==='远休止'?'#6ee7b7':phaseNow==='回程'?'#fbbf24':'#a1a1aa';
  ui.angleSlider.value = degNow;
  ui.angleVal.textContent = Math.round(degNow)+'°';
  updateTip(degNow, alphaDeg, phaseNow);
}

function updateTip(degNow, alphaDeg, phaseNow) {
  if (mode==='inversion') {
    if (alphaDeg>50){ui.tip.textContent='压力角α='+alphaDeg.toFixed(1)+'°过大！传力效果差，建议增大基圆半径r₀。';ui.tip.style.borderLeftColor='#ef4444';}
    else if(phaseNow==='推程'){ui.tip.textContent='推程阶段：凸轮轮廓推动从动件远离基圆。观察从动件尖端轨迹，即为凸轮理论廓线。';ui.tip.style.borderLeftColor='#6366f1';}
    else if(phaseNow==='回程'){ui.tip.textContent='回程阶段：从动件返回。凸轮顺时针转动时，从动件导路逆时针反转（-ω）。';ui.tip.style.borderLeftColor='#fbbf24';}
    else if(phaseNow==='远休止'){ui.tip.textContent='远休止：从动件保持在最高位置，廓线为以(r₀+h)为半径的圆弧。';ui.tip.style.borderLeftColor='#34d399';}
    else{ui.tip.textContent='近休止：从动件在基圆上不动，廓线就是基圆。';ui.tip.style.borderLeftColor='#6366f1';}
  } else {
    if(alphaDeg>50){ui.tip.textContent='压力角α过大，传动效率低。切换反转法可直观理解。';ui.tip.style.borderLeftColor='#ef4444';}
    else{ui.tip.textContent='实际运动：凸轮以ω顺时针转动，推动从动件按简谐运动往复。切换"反转法"查看廓线设计过程。';ui.tip.style.borderLeftColor='#6366f1';}
  }
}

// ===== UI 构建 =====
const toolbar = document.getElementById('toolbar');
const playBtn = Mech.ui.button(toolbar, { text: '⏸ 暂停', variant: 'primary', onClick: () => {
  if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
  else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
}});
Mech.ui.button(toolbar, { text: '◀', variant: 'secondary', onClick: () => stepAngle(-10) });
Mech.ui.button(toolbar, { text: '▶', variant: 'secondary', onClick: () => stepAngle(10) });
Mech.ui.slider(toolbar, { label: '速度', min: 0.1, max: 3, value: 1, step: 0.1, format: v => v.toFixed(1)+'x', onChange: v => { speed = v; } });

function stepAngle(deg) { anim.pause(); playBtn.textContent = '▶ 播放'; delta = ((delta+deg*DEG)%(PI*2)+PI*2)%(PI*2); traceUpTo = ((delta*180/PI)%360+360)%360; }

// 侧边栏
const sidebar = document.getElementById('sidebar');

// 模式切换
const modePanel = Mech.ui.panel(sidebar, '模式');
const modeToggle = document.createElement('div');
modeToggle.style.cssText = 'display:flex;gap:6px;';
const modeBtns = {};
['inversion','actual'].forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'btn ' + (m === mode ? 'btn-primary' : 'btn-secondary');
  btn.textContent = m === 'inversion' ? '反转法' : '实际运动';
  btn.style.flex = '1';
  btn.addEventListener('click', () => {
    mode = m;
    modeBtns.inversion.className = 'btn ' + (mode==='inversion'?'btn-primary':'btn-secondary');
    modeBtns.actual.className = 'btn ' + (mode==='actual'?'btn-primary':'btn-secondary');
    if (mode === 'inversion') traceUpTo = delta * 180 / PI;
  });
  modeBtns[m] = btn;
  modeToggle.appendChild(btn);
});
modePanel.appendChild(modeToggle);

// 运动规律
const lawPanel = Mech.ui.panel(sidebar, '运动规律');
const lawBadge = document.createElement('span');
lawBadge.className = 'warning-badge';
lawBadge.style.display = 'inline-block';
lawBadge.textContent = '简谐运动 (SHM)';
lawPanel.appendChild(lawBadge);

// 从动件类型
const typePanel = Mech.ui.panel(sidebar, '从动件类型');
const typeTabs = document.createElement('div');
typeTabs.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;';
const typeBtns = {};
['pointed','roller','oscillating','flat'].forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'btn ' + (t === followerType ? 'btn-primary' : 'btn-secondary');
  btn.textContent = { pointed:'尖底', roller:'滚子', oscillating:'摆动', flat:'平底' }[t];
  btn.style.flex = '1'; btn.style.fontSize = '12px';
  btn.addEventListener('click', () => setFollowerType(t));
  typeBtns[t] = btn;
  typeTabs.appendChild(btn);
});
typePanel.appendChild(typeTabs);

function setFollowerType(t) {
  followerType = t;
  Object.entries(typeBtns).forEach(([k, b]) => { b.className = 'btn ' + (k===t?'btn-primary':'btn-secondary'); });
  const isTranslating = (t==='pointed'||t==='roller'||t==='flat');
  ui.pgH.style.display = isTranslating ? '' : 'none';
  ui.pgPsi.style.display = isTranslating ? 'none' : '';
  ui.pgE.style.display = isTranslating ? '' : 'none';
  ui.pgRr.style.display = t==='roller' ? '' : 'none';
  ui.pgL.style.display = t==='oscillating' ? '' : 'none';
  traceUpTo = 0;
}

// 参数设置
const paramPanel = Mech.ui.panel(sidebar, '参数设置');
ui.pgR0 = Mech.ui.sidebarSlider(paramPanel, { label: '基圆半径 r₀', min: 20, max: 80, value: 40, onChange: v => { r0 = v; } });
ui.pgH = Mech.ui.sidebarSlider(paramPanel, { label: '行程 h', min: 5, max: 50, value: 25, onChange: v => { h = v; } });
ui.pgPsi = Mech.ui.sidebarSlider(paramPanel, { label: '摆角 ψ', min: 10, max: 60, value: 18, format: v => v + '°', onChange: v => { psiMax = v; } });
ui.pgPsi.el.style.display = 'none';
ui.pgE = Mech.ui.sidebarSlider(paramPanel, { label: '偏距 e', min: 0, max: 35, value: 0, onChange: v => { e = v; show.offset = e > 0; } });
ui.pgRr = Mech.ui.sidebarSlider(paramPanel, { label: '滚子半径 rr', min: 3, max: 20, value: 8, onChange: v => { rr = v; } });
ui.pgRr.el.style.display = 'none';
ui.pgL = Mech.ui.sidebarSlider(paramPanel, { label: '摆臂长度 l', min: 40, max: 140, value: 80, onChange: v => { armLen = v; } });
ui.pgL.el.style.display = 'none';

// 运动角分配
const phasePanel = Mech.ui.panel(sidebar, '运动角分配');
ui.slP1 = Mech.ui.sidebarSlider(phasePanel, { label: '推程角 δ₁', min: 30, max: 180, value: 120, format: v => v + '°', onChange: updatePhases });
ui.slP2 = Mech.ui.sidebarSlider(phasePanel, { label: '远休止角 δ₂', min: 0, max: 180, value: 60, format: v => v + '°', onChange: updatePhases });
ui.slP3 = Mech.ui.sidebarSlider(phasePanel, { label: '回程角 δ₃', min: 30, max: 180, value: 120, format: v => v + '°', onChange: updatePhases });
const p4Row = document.createElement('div');
p4Row.className = 'slider-group';
p4Row.innerHTML = `<div class="slider-header"><span class="slider-label">近休止角 δ₄</span><span class="slider-value" id="valP4">60°</span></div>`;
phasePanel.appendChild(p4Row);
ui.valP4 = p4Row.querySelector('#valP4');

function updatePhases() {
  p1 = +ui.slP1.input.value; p2 = +ui.slP2.input.value; p3 = +ui.slP3.input.value;
  p4 = Math.max(0, 360 - p1 - p2 - p3);
  ui.valP4.textContent = p4 + '°';
}

// 显示选项
const optPanel = Mech.ui.panel(sidebar, '显示选项');
Mech.ui.checkbox(optPanel, { label: '基圆', checked: true, onChange: v => { show.base = v; } });
Mech.ui.checkbox(optPanel, { label: '理论廓线', checked: true, onChange: v => { show.theory = v; } });
Mech.ui.checkbox(optPanel, { label: '实际廓线', checked: true, onChange: v => { show.actual = v; } });
Mech.ui.checkbox(optPanel, { label: '偏距圆', checked: false, onChange: v => { show.offset = v; } });
Mech.ui.checkbox(optPanel, { label: '压力角', checked: true, onChange: v => { show.pressure = v; } });
Mech.ui.checkbox(optPanel, { label: '运动区间', checked: true, onChange: v => { show.phase = v; } });
Mech.ui.checkbox(optPanel, { label: 's-δ位移图', checked: true, onChange: v => { show.sd = v; } });

// 角度控制
const anglePanel = Mech.ui.panel(sidebar, '角度控制');
const angleGroup = document.createElement('div');
angleGroup.className = 'slider-group';
angleGroup.innerHTML = `<div class="slider-header"><span class="slider-label">角度 δ</span><span class="slider-value">0°</span></div><input type="range" min="0" max="360" value="0" step="0.5">`;
anglePanel.appendChild(angleGroup);
ui.angleSlider = angleGroup.querySelector('input');
ui.angleVal = angleGroup.querySelector('.slider-value');
ui.angleSlider.addEventListener('input', () => {
  const d = +ui.angleSlider.value;
  delta = d * DEG; traceUpTo = d; anim.pause(); playBtn.textContent = '▶ 播放';
});

// 实时信息
const infoPanel = Mech.ui.panel(sidebar, '实时信息');
const infoGrid = document.createElement('div');
infoGrid.className = 'info-grid';
infoGrid.innerHTML = `
  <div class="info-item"><div class="label">当前角度 δ</div><div class="value" id="infoDelta">0°</div></div>
  <div class="info-item"><div class="label" id="infoDispLabel">位移 s</div><div class="value" id="infoDisp">0</div></div>
  <div class="info-item"><div class="label">压力角 α</div><div class="value" id="infoAlpha">0°</div></div>
  <div class="info-item"><div class="label">当前阶段</div><div class="value" id="infoPhase">近休止</div></div>`;
infoPanel.appendChild(infoGrid);
ui.infoDelta = infoGrid.querySelector('#infoDelta');
ui.infoDispLabel = infoGrid.querySelector('#infoDispLabel');
ui.infoDisp = infoGrid.querySelector('#infoDisp');
ui.infoAlpha = infoGrid.querySelector('#infoAlpha');
ui.infoPhase = infoGrid.querySelector('#infoPhase');

// 知识点提示
const tipPanel = Mech.ui.panel(sidebar, '知识点提示');
ui.tip = document.createElement('div');
ui.tip.className = 'tip';
ui.tip.textContent = '反转法：给整个凸轮机构加一个与凸轮角速度大小相等、方向相反的转动（-ω），凸轮顺时针转动时，从动件导路绕凸轮中心逆时针反转。从动件尖端的运动轨迹即为凸轮的理论廓线。';
tipPanel.appendChild(ui.tip);

// ===== 启动 =====
window.addEventListener('resize', () => draw());
updatePhases();
anim.play();
console.log('v2.0 loaded (refactored with mech.css + mech.js)');
</script>
