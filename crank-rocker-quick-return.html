<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲柄摇杆急回运动对比</title>
    <style>
        :root {
            --bg-dark: #0f1117;
            --bg-card: #1a1d27;
            --border: #252833;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
            --accent: #6366f1;
            --success: #34d399;
            --warning: #fbbf24;
            --body-color: #e4e4e7;
            --ground-color: #71717a;
            --limit1-color: #a855f7;
            --limit2-color: #f97316;
            --work-color: #3b82f6;
            --return-color: #34d399;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            max-width: 960px;
            width: 100%;
        }
        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 70%;
            margin-bottom: 16px;
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #12141d;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .control-group input[type="range"] {
            width: 100px;
            accent-color: var(--accent);
        }
        .control-group .value {
            font-size: 0.8rem;
            color: var(--text);
            min-width: 30px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: #4f46e5;
        }
        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: #3a3d4d;
        }
        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            padding: 14px;
            background: var(--bg-dark);
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .info-item {
            text-align: center;
        }
        .info-item .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 2px;
        }
        .info-item .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }
        .info-item.work .value { color: var(--work-color); }
        .info-item.return .value { color: var(--return-color); }
        .status-panel {
            padding: 14px;
            background: var(--bg-dark);
            border-radius: 10px;
            text-align: center;
            margin-bottom: 12px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: border-color 0.3s;
        }
        .status-panel .status-text {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 4px;
        }
        .status-panel .status-detail {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .status-panel.paused {
            border: 1px solid var(--warning);
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            padding: 10px;
            background: var(--bg-dark);
            border-radius: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .legend-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.2rem; }
            .controls { flex-direction: column; }
            .control-group input[type="range"] { width: 80px; }
        }
    </style>
</head>
<body>
    <a href="ch3-linkage.html" class="back-btn">← 返回章节</a>
    
    <div class="header">
        <h1>曲柄摇杆急回运动对比</h1>
        <p>直观展示工作行程（慢）与空回行程（快）的差异</p>
    </div>
    
    <div class="container">
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="status-panel" id="statusPanel">
            <div class="status-text" id="statusText">点击"播放动画"开始演示</div>
            <div class="status-detail" id="statusDetail">动画将在到达极位时自动暂停，展示急回特性</div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" id="playBtn">▶ 播放动画</button>
            <button class="btn btn-secondary" id="resetBtn">重置</button>
            <div class="control-group">
                <label>曲柄 r₁:</label>
                <input type="range" id="crankSlider" min="35" max="70" value="50">
                <span class="value" id="crankValue">50</span>
            </div>
            <div class="control-group">
                <label>摇杆 r₃:</label>
                <input type="range" id="rockerSlider" min="90" max="140" value="110">
                <span class="value" id="rockerValue">110</span>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="info-item">
                <div class="label">极位夹角 θ</div>
                <div class="value" id="thetaValue">0°</div>
            </div>
            <div class="info-item">
                <div class="label">行程速比系数 K</div>
                <div class="value" id="kValue">1.00</div>
            </div>
            <div class="info-item work">
                <div class="label">工作行程 φ₁</div>
                <div class="value" id="workAngle">180°+θ</div>
            </div>
            <div class="info-item return">
                <div class="label">空回行程 φ₂</div>
                <div class="value" id="returnAngle">180°-θ</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="dot" style="background: #e4e4e7;"></div>
                <span>机构杆件</span>
            </div>
            <div class="legend-item">
                <div class="dot" style="background: #71717a;"></div>
                <span>机架</span>
            </div>
            <div class="legend-item">
                <div class="dot" style="background: #a855f7;"></div>
                <span>极位1 (C₁)</span>
            </div>
            <div class="legend-item">
                <div class="dot" style="background: #f97316;"></div>
                <span>极位2 (C₂)</span>
            </div>
            <div class="legend-item">
                <div class="dot" style="background: #3b82f6;"></div>
                <span>工作行程（慢）</span>
            </div>
            <div class="legend-item">
                <div class="dot" style="background: #34d399;"></div>
                <span>空回行程（快）</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let params = {
            r1: 50, r2: 160, r3: 110, r4: 170,
            speed: 0.008
        };
        
        let state = {
            angle: 0,
            isPlaying: false,
            animationId: null,
            limitAngles: [],
            phase: 0,        // 0=初始, 1=工作行程中, 2=空回行程中
            paused: false,
            pauseReason: '',
            startAngle: 0
        };
        
        let A = { x: 0, y: 0 };
        let D = { x: 0, y: 0 };
        
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            const cx = rect.width / 2;
            const cy = rect.height / 2 + 20;
            A = { x: cx - params.r4 / 2, y: cy };
            D = { x: cx + params.r4 / 2, y: cy };
        }
        
        function solveFourBar(theta) {
            const B = {
                x: A.x + params.r1 * Math.cos(theta),
                y: A.y - params.r1 * Math.sin(theta)
            };
            
            const dx = D.x - B.x;
            const dy = D.y - B.y;
            const bd = Math.sqrt(dx * dx + dy * dy);
            
            const cosAlpha = (params.r2 * params.r2 + bd * bd - params.r3 * params.r3) / (2 * params.r2 * bd);
            if (Math.abs(cosAlpha) > 1) return null;
            
            const alpha = Math.acos(cosAlpha);
            const beta = Math.atan2(dy, dx);
            
            const C = {
                x: B.x + params.r2 * Math.cos(beta - alpha),
                y: B.y + params.r2 * Math.sin(beta - alpha)
            };
            
            return { B, C };
        }
        
        function findLimitAngles() {
            const limits = [];
            // 极位1：曲柄与连杆拉直共线
            const BD1 = params.r2 + params.r3;
            const cosTheta1 = (params.r1 * params.r1 + params.r4 * params.r4 - BD1 * BD1) / (2 * params.r1 * params.r4);
            if (Math.abs(cosTheta1) <= 1) {
                limits.push({ angle: -Math.acos(cosTheta1), type: 1 }); // 极位1
            }
            // 极位2：曲柄与连杆折叠共线
            const BD2 = Math.abs(params.r2 - params.r3);
            const cosTheta2 = (params.r1 * params.r1 + params.r4 * params.r4 - BD2 * BD2) / (2 * params.r1 * params.r4);
            if (Math.abs(cosTheta2) <= 1) {
                limits.push({ angle: Math.acos(cosTheta2), type: 2 }); // 极位2
            }
            return limits;
        }
        
        function normalizeAngle(a) {
            while (a < 0) a += Math.PI * 2;
            while (a >= Math.PI * 2) a -= Math.PI * 2;
            return a;
        }
        
        function angleDiff(a, b) {
            let diff = normalizeAngle(a) - normalizeAngle(b);
            if (diff > Math.PI) diff -= Math.PI * 2;
            if (diff < -Math.PI) diff += Math.PI * 2;
            return diff;
        }
        
        function isNearLimit(current, target, tolerance = 0.08) {
            return Math.abs(angleDiff(current, target)) < tolerance;
        }
        
        function drawGround(x, y) {
            ctx.strokeStyle = '#71717a';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x - 18, y + 2);
            ctx.lineTo(x + 18, y + 2);
            ctx.stroke();
            
            for (let i = -14; i <= 14; i += 6) {
                ctx.beginPath();
                ctx.moveTo(x + i, y + 2);
                ctx.lineTo(x + i - 4, y + 10);
                ctx.stroke();
            }
        }
        
        function drawJoint(x, y, fixed = false) {
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = fixed ? '#71717a' : '#e4e4e7';
            ctx.fill();
            ctx.strokeStyle = '#12141d';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        
        function drawLink(x1, y1, x2, y2, color = '#e4e4e7', width = 2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.stroke();
        }
        
        function drawDashedLine(x1, y1, x2, y2, color, width = 1.5, dash = [5, 5]) {
            ctx.beginPath();
            ctx.setLineDash(dash);
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function drawAngleSector(cx, cy, radius, startAngle, endAngle, color) {
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, -startAngle, -endAngle, true);
            ctx.closePath();
            ctx.fillStyle = color + '25';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        
        function drawAngleArc(cx, cy, radius, startAngle, endAngle, color, label) {
            ctx.beginPath();
            ctx.arc(cx, cy, radius, -startAngle, -endAngle, true);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            if (label) {
                const midAngle = (startAngle + endAngle) / 2;
                const lx = cx + (radius + 14) * Math.cos(midAngle);
                const ly = cy - (radius + 14) * Math.sin(midAngle);
                ctx.fillStyle = color;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, lx, ly);
            }
        }
        
        function draw() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            
            drawGround(A.x, A.y);
            drawGround(D.x, D.y);
            
            // 曲柄轨迹圆（黑色虚线）
            ctx.beginPath();
            ctx.arc(A.x, A.y, params.r1, 0, Math.PI * 2);
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#3a3d4d';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
            
            const limits = state.limitAngles;
            let limit1 = null, limit2 = null;
            
            for (const lim of limits) {
                if (lim.type === 1) limit1 = lim;
                if (lim.type === 2) limit2 = lim;
            }
            
            // 绘制极位连线
            if (limit1) {
                const r = solveFourBar(limit1.angle);
                if (r) {
                    drawDashedLine(D.x, D.y, r.C.x, r.C.y, '#a855f7', 2, [6, 4]);
                    ctx.fillStyle = '#a855f7';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('C₁', r.C.x, r.C.y - 16);
                }
            }
            
            if (limit2) {
                const r = solveFourBar(limit2.angle);
                if (r) {
                    drawDashedLine(D.x, D.y, r.C.x, r.C.y, '#f97316', 2, [6, 4]);
                    ctx.fillStyle = '#f97316';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('C₂', r.C.x, r.C.y - 16);
                }
            }
            
            // 绘制极位夹角 θ
            if (limit1 && limit2) {
                const r1 = solveFourBar(limit1.angle);
                const r2 = solveFourBar(limit2.angle);
                if (r1 && r2) {
                    const a1 = Math.atan2(-(r1.C.y - D.y), r1.C.x - D.x);
                    const a2 = Math.atan2(-(r2.C.y - D.y), r2.C.x - D.x);
                    drawAngleArc(D.x, D.y, 28, Math.min(a1, a2), Math.max(a1, a2), '#fbbf24', 'θ');
                }
            }
            
            // 绘制工作行程/空回行程扇形（在A点）
            if (state.phase === 1 && limit1 && limit2) {
                // 工作行程：从C₂到C₁，曲柄转角 = 180°+θ
                const a2 = normalizeAngle(limit2.angle);
                const a1 = normalizeAngle(limit1.angle);
                // 曲柄从a2逆时针转到a1（经过上方）
                drawAngleSector(A.x, A.y, 30, a2, a1, '#3b82f6');
                
                // 标注
                const midA = (a2 + a1) / 2;
                const labelR = 50;
                ctx.fillStyle = '#3b82f6';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('φ₁=180°+θ', A.x + labelR * Math.cos(midA), A.y - labelR * Math.sin(midA));
                ctx.fillText('(慢)', A.x + labelR * Math.cos(midA), A.y - labelR * Math.sin(midA) + 14);
            }
            
            if (state.phase === 2 && limit1 && limit2) {
                // 空回行程：从C₁到C₂，曲柄转角 = 180°-θ
                const a1 = normalizeAngle(limit1.angle);
                const a2 = normalizeAngle(limit2.angle);
                drawAngleSector(A.x, A.y, 30, a1, a2, '#34d399');
                
                const midA = (a1 + a2) / 2;
                const labelR = 50;
                ctx.fillStyle = '#34d399';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('φ₂=180°-θ', A.x + labelR * Math.cos(midA), A.y - labelR * Math.sin(midA));
                ctx.fillText('(快)', A.x + labelR * Math.cos(midA), A.y - labelR * Math.sin(midA) + 14);
            }
            
            // 绘制机构
            const result = solveFourBar(state.angle);
            if (!result) return;
            
            const { B, C } = result;
            
            drawLink(A.x, A.y, D.x, D.y, '#71717a', 3);
            drawLink(A.x, A.y, B.x, B.y, '#e4e4e7', 2.5);
            drawLink(B.x, B.y, C.x, C.y, '#e4e4e7', 2.5);
            drawLink(D.x, D.y, C.x, C.y, '#e4e4e7', 2.5);
            
            drawJoint(A.x, A.y, true);
            drawJoint(D.x, D.y, true);
            drawJoint(B.x, B.y);
            drawJoint(C.x, C.y);
            
            ctx.fillStyle = '#a1a1aa';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('A', A.x, A.y + 20);
            ctx.fillText('D', D.x, D.y + 20);
            ctx.fillText('B', B.x + 12, B.y - 10);
            ctx.fillText('C', C.x + 12, C.y - 10);
        }
        
        function updateStatus() {
            const panel = document.getElementById('statusPanel');
            const text = document.getElementById('statusText');
            const detail = document.getElementById('statusDetail');
            
            if (state.paused) {
                panel.classList.add('paused');
                if (state.pauseReason === 'limit2') {
                    text.textContent = '⏸ 到达极位2 (C₂) — 准备开始工作行程';
                    detail.textContent = '摇杆将在工作行程中从C₂缓慢运动到C₁（曲柄需转过180°+θ）';
                } else if (state.pauseReason === 'limit1') {
                    text.textContent = '⏸ 到达极位1 (C₁) — 工作行程结束，准备空回行程';
                    detail.textContent = '摇杆将在空回行程中从C₁快速返回C₂（曲柄只需转过180°-θ）';
                }
            } else if (state.phase === 0) {
                panel.classList.remove('paused');
                text.textContent = '点击"播放动画"开始演示';
                detail.textContent = '动画将在到达极位时自动暂停，展示急回特性';
            } else if (state.phase === 1) {
                panel.classList.remove('paused');
                text.textContent = '🔵 工作行程中... 摇杆从C₂缓慢移向C₁';
                detail.textContent = '曲柄匀速转动，但摇杆走得慢（因为曲柄要转更多角度）';
            } else if (state.phase === 2) {
                panel.classList.remove('paused');
                text.textContent = '🟢 空回行程中... 摇杆从C₁快速返回C₂';
                detail.textContent = '曲柄匀速转动，摇杆走得快（因为曲柄转角更小）';
            }
        }
        
        function updateInfoPanel() {
            const limits = state.limitAngles;
            let theta = 0;
            if (limits.length >= 2) {
                const r1 = solveFourBar(limits[0].angle);
                const r2 = solveFourBar(limits[1].angle);
                if (r1 && r2) {
                    const a1 = Math.atan2(-(r1.C.y - D.y), r1.C.x - D.x);
                    const a2 = Math.atan2(-(r2.C.y - D.y), r2.C.x - D.x);
                    theta = Math.abs(a1 - a2) * 180 / Math.PI;
                }
            }
            
            const K = theta > 0.1 ? (180 + theta) / (180 - theta) : 1;
            
            document.getElementById('thetaValue').textContent = theta.toFixed(1) + '°';
            document.getElementById('kValue').textContent = K.toFixed(2);
            document.getElementById('workAngle').textContent = (180 + theta).toFixed(1) + '°';
            document.getElementById('returnAngle').textContent = (180 - theta).toFixed(1) + '°';
        }
        
        function animate() {
            if (!state.isPlaying || state.paused) return;
            
            state.angle += params.speed;
            
            const limits = state.limitAngles;
            let limit1 = null, limit2 = null;
            for (const lim of limits) {
                if (lim.type === 1) limit1 = lim;
                if (lim.type === 2) limit2 = lim;
            }
            
            if (limit1 && limit2) {
                if (state.phase === 0 && isNearLimit(state.angle, limit2.angle)) {
                    // 到达极位2，准备开始工作行程
                    state.phase = 1;
                    state.paused = true;
                    state.pauseReason = 'limit2';
                    state.angle = limit2.angle;
                    updateStatus();
                    draw();
                    return;
                } else if (state.phase === 1 && isNearLimit(state.angle, limit1.angle)) {
                    // 到达极位1，工作行程结束，准备空回
                    state.phase = 2;
                    state.paused = true;
                    state.pauseReason = 'limit1';
                    state.angle = limit1.angle;
                    updateStatus();
                    draw();
                    return;
                } else if (state.phase === 2 && isNearLimit(state.angle, limit2.angle)) {
                    // 回到极位2，空回行程结束，循环
                    state.phase = 1;
                    state.paused = true;
                    state.pauseReason = 'limit2';
                    state.angle = limit2.angle;
                    updateStatus();
                    draw();
                    return;
                }
            }
            
            draw();
            state.animationId = requestAnimationFrame(animate);
        }
        
        document.getElementById('playBtn').addEventListener('click', () => {
            const btn = document.getElementById('playBtn');
            if (state.paused) {
                state.paused = false;
                state.pauseReason = '';
                btn.textContent = '⏸ 暂停';
                updateStatus();
                animate();
            } else if (state.isPlaying) {
                state.isPlaying = false;
                cancelAnimationFrame(state.animationId);
                btn.textContent = '▶ 继续';
            } else {
                state.isPlaying = true;
                btn.textContent = '⏸ 暂停';
                updateStatus();
                animate();
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            state.angle = 0;
            state.phase = 0;
            state.isPlaying = false;
            state.paused = false;
            state.pauseReason = '';
            cancelAnimationFrame(state.animationId);
            document.getElementById('playBtn').textContent = '▶ 播放动画';
            updateStatus();
            draw();
        });
        
        document.getElementById('crankSlider').addEventListener('input', (e) => {
            params.r1 = parseInt(e.target.value);
            document.getElementById('crankValue').textContent = params.r1;
            state.limitAngles = findLimitAngles();
            updateInfoPanel();
            draw();
        });
        
        document.getElementById('rockerSlider').addEventListener('input', (e) => {
            params.r3 = parseInt(e.target.value);
            document.getElementById('rockerValue').textContent = params.r3;
            state.limitAngles = findLimitAngles();
            updateInfoPanel();
            draw();
        });
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });
        
        resizeCanvas();
        state.limitAngles = findLimitAngles();
        updateInfoPanel();
        updateStatus();
        draw();
    </script>
</body>
</html>
