<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>曲柄摇杆急回运动对比</title>
    <link rel="stylesheet" href="mech.css">
</head>
<body>
    <a href="ch3-linkage.html" class="back-btn">← 返回章节</a>

    <div class="header">
        <h1>曲柄摇杆急回运动对比 <span class="version-badge">v6.0</span></h1>
        <p>直观展示工作行程（慢）与空回行程（快）的差异</p>
    </div>

    <div class="container">
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls" id="controls"></div>
        <div id="infoPanel"></div>
        <div id="legend"></div>
    </div>

    <script src="mech.js"></script>
    <script>
    // ===== 模块状态 =====
    const params = { r1: 50, r2: 160, r3: 110, r4: 170, speedFactor: 1.0 };
    let angle = 0;
    let isPush = true;
    const geo = { A: {x:0,y:0}, D: {x:0,y:0}, limit1: null, limit2: null, theta: 0, psi: 0 };

    // ===== Canvas + 动画 =====
    const { ctx, getDimensions, canvas } = Mech.setupCanvas(document.getElementById('canvas'));
    const anim = Mech.createAnimator(
        dt => { angle += 0.48 * params.speedFactor * dt; updatePhase(); },
        () => draw()
    );

    // ===== 机构求解（模块特有）=====
    function solveC(B, D) {
        const dx = D.x - B.x, dy = D.y - B.y;
        const bd = Math.sqrt(dx * dx + dy * dy);
        const cosAlpha = (params.r2 * params.r2 + bd * bd - params.r3 * params.r3) / (2 * params.r2 * bd);
        if (Math.abs(cosAlpha) > 1) return null;
        const alpha = Math.acos(cosAlpha);
        const beta = Math.atan2(dy, dx);
        return { x: B.x + params.r2 * Math.cos(beta - alpha), y: B.y + params.r2 * Math.sin(beta - alpha) };
    }

    function findCfromAC(A, D, acDist, r3) {
        const dx = D.x - A.x, dy = D.y - A.y;
        const ad = Math.sqrt(dx * dx + dy * dy);
        const cosDAC = (acDist * acDist + ad * ad - r3 * r3) / (2 * acDist * ad);
        if (Math.abs(cosDAC) > 1) return null;
        const angleDAC = Math.acos(cosDAC);
        const angleAD = Math.atan2(dy, dx);
        const angleAC = angleAD - angleDAC;
        return { x: A.x + acDist * Math.cos(angleAC), y: A.y + acDist * Math.sin(angleAC) };
    }

    function calculateLimits() {
        const A = geo.A, D = geo.D;
        geo.limit1 = null; geo.limit2 = null;

        // 极位1：曲柄与连杆拉直共线
        const C1 = findCfromAC(A, D, params.r1 + params.r2, params.r3);
        if (C1) {
            const dir1 = Math.atan2(C1.y - A.y, C1.x - A.x);
            const B1 = { x: A.x + params.r1 * Math.cos(dir1), y: A.y + params.r1 * Math.sin(dir1) };
            geo.limit1 = { angle: Math.atan2(-(B1.y - A.y), B1.x - A.x), B: B1, C: C1 };
        }

        // 极位2：曲柄与连杆折叠共线
        const C2 = findCfromAC(A, D, params.r2 - params.r1, params.r3);
        if (C2) {
            const dir2 = Math.atan2(C2.y - A.y, C2.x - A.x);
            const B2 = { x: A.x - params.r1 * Math.cos(dir2), y: A.y - params.r1 * Math.sin(dir2) };
            geo.limit2 = { angle: Math.atan2(-(B2.y - A.y), B2.x - A.x), B: B2, C: C2 };
        }

        // 极位夹角 θ
        if (geo.limit1 && geo.limit2) {
            let diff = Mech.math.diff(geo.limit1.angle, geo.limit2.angle);
            let thetaVal = Math.abs(diff);
            if (thetaVal > Math.PI / 2) thetaVal = Math.PI - thetaVal;
            geo.theta = thetaVal;

            // 摆角 ψ = ∠C₁DC₂
            if (geo.limit1.C && geo.limit2.C) {
                const c1d = Math.atan2(-(geo.limit1.C.y - D.y), geo.limit1.C.x - D.x);
                const c2d = Math.atan2(-(geo.limit2.C.y - D.y), geo.limit2.C.x - D.x);
                geo.psi = Math.abs(Mech.math.diff(c1d, c2d));
            }
        }
    }

    function solveFourBar(theta) {
        const A = geo.A;
        const B = { x: A.x + params.r1 * Math.cos(theta), y: A.y - params.r1 * Math.sin(theta) };
        const C = solveC(B, geo.D);
        return C ? { B, C } : null;
    }

    function updatePhase() {
        if (!geo.limit1 || !geo.limit2) return;
        let d12 = Mech.math.norm(geo.limit2.angle - geo.limit1.angle);
        let rel = Mech.math.norm(angle - geo.limit1.angle);
        if (d12 > Math.PI) { isPush = rel < d12; }
        else { isPush = rel >= d12; }
    }

    // ===== 绘制 =====
    function draw() {
        const { w, h } = getDimensions();
        ctx.clearRect(0, 0, w, h);
        const A = geo.A, D = geo.D;
        const C = Mech.colors;

        // 曲柄轨迹圆
        ctx.beginPath();
        ctx.arc(A.x, A.y, params.r1, 0, Math.PI * 2);
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#3a3d4d';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        // φ₁/φ₂ 弧段（曲柄圆内，细虚线）
        if (geo.limit1 && geo.limit2) {
            const r = params.r1 * 0.7, textR = params.r1 * 0.55;
            let d12 = Mech.math.norm(geo.limit2.angle - geo.limit1.angle);

            if (d12 > Math.PI) {
                // limit1→limit2 = 推程(蓝)，limit2→limit1 = 回程(绿)
                Mech.draw.dashedArc(ctx, A.x, A.y, r, -geo.limit1.angle, -geo.limit2.angle, true, { color: 'rgba(59,130,246,0.6)' });
                Mech.draw.dashedArc(ctx, A.x, A.y, r, -geo.limit2.angle, -geo.limit1.angle, true, { color: 'rgba(52,211,153,0.6)' });
                const m1 = geo.limit1.angle + d12 / 2, m2 = geo.limit2.angle + (2*Math.PI - d12) / 2;
                Mech.draw.text(ctx, 'φ₁', A.x + textR*Math.cos(m1), A.y - textR*Math.sin(m1), { color: 'rgba(59,130,246,0.9)', font: 'bold 12px sans-serif', baseline: 'middle' });
                Mech.draw.text(ctx, 'φ₂', A.x + textR*Math.cos(m2), A.y - textR*Math.sin(m2), { color: 'rgba(52,211,153,0.9)', font: 'bold 12px sans-serif', baseline: 'middle' });
            } else {
                Mech.draw.dashedArc(ctx, A.x, A.y, r, -geo.limit1.angle, -geo.limit2.angle, true, { color: 'rgba(52,211,153,0.6)' });
                Mech.draw.dashedArc(ctx, A.x, A.y, r, -geo.limit2.angle, -geo.limit1.angle, true, { color: 'rgba(59,130,246,0.6)' });
                const m2 = geo.limit1.angle + d12 / 2, m1 = geo.limit2.angle + (2*Math.PI - d12) / 2;
                Mech.draw.text(ctx, 'φ₂', A.x + textR*Math.cos(m2), A.y - textR*Math.sin(m2), { color: 'rgba(52,211,153,0.9)', font: 'bold 12px sans-serif', baseline: 'middle' });
                Mech.draw.text(ctx, 'φ₁', A.x + textR*Math.cos(m1), A.y - textR*Math.sin(m1), { color: 'rgba(59,130,246,0.9)', font: 'bold 12px sans-serif', baseline: 'middle' });
            }
        }

        // C₁-C₂ 摇杆轨迹弧
        if (geo.limit1 && geo.limit2 && geo.limit1.C && geo.limit2.C) {
            const phi1 = Math.atan2(geo.limit1.C.y - D.y, geo.limit1.C.x - D.x);
            const phi2 = Math.atan2(geo.limit2.C.y - D.y, geo.limit2.C.x - D.x);
            Mech.draw.dashedArc(ctx, D.x, D.y, params.r3, phi1, phi2, true, { color: '#a78bfa', width: 1.5, dash: [5, 4] });
        }

        // DC₁ 虚线 + B₁/C₁ 标注
        if (geo.limit1 && geo.limit1.C) {
            Mech.draw.dashedLine(ctx, D.x, D.y, geo.limit1.C.x, geo.limit1.C.y, { color: C.warning, width: 2, dash: [6, 4] });
            Mech.draw.point(ctx, geo.limit1.B.x, geo.limit1.B.y, { color: C.work });
            Mech.draw.text(ctx, 'C₁', geo.limit1.C.x + 8, geo.limit1.C.y - 8, { color: C.warning, font: 'bold 13px sans-serif', align: 'left' });
            Mech.draw.text(ctx, 'B₁', geo.limit1.B.x - 20, geo.limit1.B.y - 8, { color: C.work, font: 'bold 13px sans-serif', align: 'left' });
        }

        // DC₂ 虚线 + B₂/C₂ 标注
        if (geo.limit2 && geo.limit2.C) {
            Mech.draw.dashedLine(ctx, D.x, D.y, geo.limit2.C.x, geo.limit2.C.y, { color: C.orange, width: 2, dash: [6, 4] });
            Mech.draw.point(ctx, geo.limit2.B.x, geo.limit2.B.y, { color: C.work });
            Mech.draw.text(ctx, 'C₂', geo.limit2.C.x + 8, geo.limit2.C.y - 8, { color: C.orange, font: 'bold 13px sans-serif', align: 'left' });
            Mech.draw.text(ctx, 'B₂', geo.limit2.B.x - 20, geo.limit2.B.y - 8, { color: C.work, font: 'bold 13px sans-serif', align: 'left' });
        }

        // AB₁/AB₂ 虚线
        if (geo.limit1 && geo.limit1.B)
            Mech.draw.dashedLine(ctx, A.x, A.y, geo.limit1.B.x, geo.limit1.B.y, { color: 'rgba(251,191,36,0.4)', dash: [4, 4] });
        if (geo.limit2 && geo.limit2.B)
            Mech.draw.dashedLine(ctx, A.x, A.y, geo.limit2.B.x, geo.limit2.B.y, { color: 'rgba(249,115,22,0.4)', dash: [4, 4] });

        // 摆角 ψ（D点处）
        if (geo.limit1 && geo.limit2 && geo.limit1.C && geo.limit2.C) {
            const a1 = Math.atan2(-(geo.limit1.C.y - D.y), geo.limit1.C.x - D.x);
            const a2 = Math.atan2(-(geo.limit2.C.y - D.y), geo.limit2.C.x - D.x);
            Mech.draw.arc(ctx, D.x, D.y, 30, -Math.min(a1, a2), -Math.max(a1, a2), true, { color: C.warning, width: 2 });
            const mid = (a1 + a2) / 2;
            Mech.draw.text(ctx, 'ψ', D.x + 45*Math.cos(mid), D.y - 45*Math.sin(mid), { color: C.warning, font: 'bold 14px sans-serif', baseline: 'middle' });
        }

        // AB₂ 反向延长虚线
        if (geo.limit2 && geo.limit2.B) {
            const extAngle = geo.limit2.angle + Math.PI;
            Mech.draw.dashedLine(ctx, A.x, A.y, A.x + params.r1*Math.cos(extAngle), A.y - params.r1*Math.sin(extAngle), { color: 'rgba(249,115,22,0.3)', dash: [3, 3] });
        }

        // 极位夹角 θ（B₂'与B₁之间，锐角）
        if (geo.limit1 && geo.limit2 && geo.limit1.B && geo.limit2.B && geo.theta > 0.01) {
            const B1 = geo.limit1.B, B2 = geo.limit2.B;
            const B2p = { x: 2*A.x - B2.x, y: 2*A.y - B2.y };
            const aB2p = Math.atan2(B2p.y - A.y, B2p.x - A.x);
            const aB1 = Math.atan2(B1.y - A.y, B1.x - A.x);
            const d = Mech.math.diff(aB1, aB2p);
            Mech.draw.arc(ctx, A.x, A.y, 25, aB2p, aB1, d < 0, { color: C.orange, width: 2 });
            const mid = aB2p + d / 2;
            Mech.draw.text(ctx, 'θ', A.x + 40*Math.cos(mid), A.y + 40*Math.sin(mid), { color: C.orange, font: 'bold 14px sans-serif', baseline: 'middle' });
        }

        // 推程/回程箭头
        if (geo.limit1 && geo.limit2 && geo.limit1.C && geo.limit2.C) {
            const phi1 = Math.atan2(geo.limit1.C.y - D.y, geo.limit1.C.x - D.x);
            const phi2 = Math.atan2(geo.limit2.C.y - D.y, geo.limit2.C.x - D.x);
            const arrowR = params.r3 * 0.55;
            let delta = phi2 - phi1;
            if (delta > 0) delta -= 2 * Math.PI;
            const midPhi = phi1 + delta / 2;
            const mx = D.x + arrowR * Math.cos(midPhi), my = D.y + arrowR * Math.sin(midPhi);
            const arrowSize = 8;
            const hasQR = geo.theta > 0.01;
            const pushLabel = hasQR ? '慢推' : '推', returnLabel = hasQR ? '快回' : '回';

            if (isPush) {
                const tx = Math.sin(midPhi), ty = -Math.cos(midPhi);
                const bx = mx - arrowSize * tx, by = my - arrowSize * ty;
                Mech.draw.arc(ctx, D.x, D.y, arrowR, phi1, phi2, true, { color: C.work, width: 2 });
                ctx.beginPath();
                ctx.moveTo(mx, my);
                ctx.lineTo(bx - arrowSize * 0.5 * (-ty), by - arrowSize * 0.5 * tx);
                ctx.lineTo(bx + arrowSize * 0.5 * (-ty), by + arrowSize * 0.5 * tx);
                ctx.closePath();
                ctx.fillStyle = C.work;
                ctx.fill();
                Mech.draw.text(ctx, pushLabel, D.x + (arrowR+16)*Math.cos(midPhi), D.y + (arrowR+16)*Math.sin(midPhi), { color: C.work, font: 'bold 12px sans-serif', baseline: 'middle' });
            } else {
                const tx = -Math.sin(midPhi), ty = Math.cos(midPhi);
                const bx = mx - arrowSize * tx, by = my - arrowSize * ty;
                Mech.draw.arc(ctx, D.x, D.y, arrowR, phi2, phi1, false, { color: C.return, width: 2 });
                ctx.beginPath();
                ctx.moveTo(mx, my);
                ctx.lineTo(bx - arrowSize * 0.5 * (-ty), by - arrowSize * 0.5 * tx);
                ctx.lineTo(bx + arrowSize * 0.5 * (-ty), by + arrowSize * 0.5 * tx);
                ctx.closePath();
                ctx.fillStyle = C.return;
                ctx.fill();
                Mech.draw.text(ctx, returnLabel, D.x + (arrowR+16)*Math.cos(midPhi), D.y + (arrowR+16)*Math.sin(midPhi), { color: C.return, font: 'bold 12px sans-serif', baseline: 'middle' });
            }
        }

        // 机构杆件
        const result = solveFourBar(angle);
        if (!result) return;
        const { B, C: Cpt } = result;

        // 机架（虚线）+ 铰支座
        Mech.draw.dashedLine(ctx, A.x, A.y, D.x, D.y, { color: C.hinge, width: 2, dash: [6, 4] });
        Mech.draw.hingedSupport(ctx, A.x, A.y);
        Mech.draw.hingedSupport(ctx, D.x, D.y);

        // 曲柄、连杆、摇杆
        Mech.draw.link(ctx, A.x, A.y, B.x, B.y);
        Mech.draw.link(ctx, B.x, B.y, Cpt.x, Cpt.y);
        Mech.draw.link(ctx, D.x, D.y, Cpt.x, Cpt.y);

        // 铰链点
        Mech.draw.fixedHinge(ctx, A.x, A.y);
        Mech.draw.fixedHinge(ctx, D.x, D.y);
        Mech.draw.hinge(ctx, B.x, B.y);
        Mech.draw.hinge(ctx, Cpt.x, Cpt.y);

        // 标签
        Mech.draw.text(ctx, 'A', A.x, A.y + 28);
        Mech.draw.text(ctx, 'D', D.x, D.y + 28);
        Mech.draw.text(ctx, 'B', B.x + 12, B.y - 10, { align: 'left' });
        Mech.draw.text(ctx, 'C', Cpt.x + 12, Cpt.y - 10, { align: 'left' });
    }

    // ===== 信息面板更新 =====
    function updateInfoPanel() {
        const thetaDeg = Mech.math.rad2deg(geo.theta);
        const psiDeg = Mech.math.rad2deg(geo.psi);
        const K = thetaDeg > 0.1 ? (180 + thetaDeg) / (180 - thetaDeg) : 1;
        infoRefs.theta.textContent = thetaDeg.toFixed(1) + '°';
        infoRefs.psi.textContent = psiDeg.toFixed(1) + '°';
        infoRefs.k.textContent = K.toFixed(2);
        infoRefs.work.textContent = (180 + thetaDeg).toFixed(1) + '°';
        infoRefs.return.textContent = (180 - thetaDeg).toFixed(1) + '°';
    }

    // ===== 响应式布局 =====
    function onResize() {
        const { w, h } = getDimensions();
        const cx = w / 2, cy = h / 2 + 20;
        geo.A = { x: cx - params.r4 / 2, y: cy };
        geo.D = { x: cx + params.r4 / 2, y: cy };
        calculateLimits();
    }

    // ===== 初始化 UI =====
    const controls = document.getElementById('controls');
    const playBtn = Mech.ui.button(controls, {
        text: '▶ 播放', variant: 'primary',
        onClick: () => {
            if (anim.isPlaying()) { anim.pause(); playBtn.textContent = '▶ 播放'; }
            else { anim.play(); playBtn.textContent = '⏸ 暂停'; }
        }
    });
    Mech.ui.button(controls, {
        text: '重置', variant: 'secondary',
        onClick: () => { angle = 0; anim.pause(); playBtn.textContent = '▶ 播放'; updatePhase(); draw(); }
    });
    Mech.ui.button(controls, {
        text: '极位₁', variant: 'accent',
        onClick: () => { if (geo.limit1) { anim.pause(); playBtn.textContent = '▶ 播放'; angle = geo.limit1.angle; updatePhase(); draw(); } }
    });
    Mech.ui.button(controls, {
        text: '极位₂', variant: 'accent',
        onClick: () => { if (geo.limit2) { anim.pause(); playBtn.textContent = '▶ 播放'; angle = geo.limit2.angle; updatePhase(); draw(); } }
    });
    Mech.ui.slider(controls, {
        label: '曲柄速度', min: 1, max: 30, value: 8,
        format: v => (v / 8).toFixed(1) + 'x',
        onChange: v => { params.speedFactor = v / 8; }
    });
    Mech.ui.slider(controls, {
        label: '曲柄 r₁', min: 35, max: 70, value: 50,
        onChange: v => { params.r1 = v; calculateLimits(); updateInfoPanel(); updatePhase(); draw(); }
    });
    Mech.ui.slider(controls, {
        label: '摇杆 r₃', min: 90, max: 140, value: 110,
        onChange: v => { params.r3 = v; calculateLimits(); updateInfoPanel(); updatePhase(); draw(); }
    });

    const infoRefs = Mech.ui.infoPanel(document.getElementById('infoPanel'), [
        { id: 'theta', label: '极位夹角 θ' },
        { id: 'psi', label: '摆角 ψ' },
        { id: 'k', label: '行程速比系数 K' },
        { id: 'work', label: '推程转角 φ₁', variant: 'work' },
        { id: 'return', label: '回程转角 φ₂', variant: 'return' },
    ]);

    Mech.ui.legend(document.getElementById('legend'), [
        { color: '#e4e4e7', label: '机构杆件' },
        { color: '#71717a', label: '机架' },
        { color: '#fbbf24', label: 'DC₁ 虚线' },
        { color: '#f97316', label: 'DC₂ 虚线' },
        { color: '#3b82f6', label: '推程（慢）' },
        { color: '#34d399', label: '回程（快）' },
    ]);

    // ===== 启动 =====
    window.addEventListener('resize', () => { onResize(); draw(); });
    onResize();
    updateInfoPanel();
    updatePhase();
    draw();

    console.log('v6.0 loaded (refactored with mech.js)');
    </script>
</body>
</html>
